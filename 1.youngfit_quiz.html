<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영핏 문법 테스트 | 부분표현 + of + 명사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #5B6AF5;
    --primary-light: #EEF0FF;
    --accent: #FF6B6B;
    --green: #22C55E;
    --red: #EF4444;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-800: #1F2937;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(91,106,245,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #f0f2ff 0%, #fafaff 60%, #fff0f0 100%);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--white);
    box-shadow: 0 2px 16px rgba(91,106,245,0.10);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, #5B6AF5 0%, #A78BFA 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(91,106,245,0.35);
  }

  .logo-icon svg { width: 26px; height: 26px; }

  .logo-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 22px;
    background: linear-gradient(90deg, #5B6AF5, #A78BFA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .header-badge {
    margin-left: auto;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* ── HERO SECTION ── */
  .hero {
    max-width: 720px;
    margin: 32px auto 0;
    padding: 0 20px;
    text-align: center;
  }

  .point-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(90deg, #5B6AF5, #A78BFA);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .hero h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--gray-800);
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .hero h1 span {
    color: var(--primary);
  }

  .rule-box {
    background: var(--white);
    border-left: 4px solid var(--primary);
    border-radius: 0 14px 14px 0;
    padding: 16px 20px;
    margin: 18px 0 28px;
    text-align: left;
    box-shadow: var(--shadow);
  }

  .rule-box p {
    font-size: 13.5px;
    color: var(--gray-600);
    line-height: 1.8;
  }

  .rule-box strong { color: var(--primary); }

  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .kw {
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 8px;
  }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    max-width: 720px;
    margin: 0 auto 24px;
    padding: 0 20px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--gray-400);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 7px;
    background: var(--gray-200);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #5B6AF5, #A78BFA);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── QUESTIONS ── */
  .questions-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .q-card {
    background: var(--white);
    border-radius: 18px;
    padding: 20px 22px;
    box-shadow: 0 2px 12px rgba(91,106,245,0.07);
    border: 2px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }

  .q-card:hover {
    box-shadow: 0 6px 24px rgba(91,106,245,0.13);
    transform: translateY(-1px);
  }

  .q-card.correct { border-color: var(--green); background: #F0FDF4; }
  .q-card.wrong   { border-color: var(--red);   background: #FFF5F5; }

  .q-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .q-num {
    width: 30px; height: 30px;
    border-radius: 10px;
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 800;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .q-sentence {
    font-size: 15px;
    color: var(--gray-800);
    line-height: 1.7;
    font-weight: 500;
  }

  .blank { font-weight: 700; color: var(--primary); }

  .options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .opt-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 18px;
    border: 2px solid var(--gray-200);
    border-radius: 12px;
    background: var(--gray-50);
    color: var(--gray-800);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.2px;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }

  .opt-btn.selected-correct {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  .opt-btn.selected-wrong {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  .opt-btn.show-answer {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
    opacity: 0.7;
  }

  .opt-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 600;
    display: none;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 10px;
  }

  .feedback.show { display: flex; }
  .feedback.ok  { background: #DCFCE7; color: #16A34A; }
  .feedback.ng  { background: #FEE2E2; color: #DC2626; }

  /* ── SUBMIT ── */
  .submit-wrap {
    max-width: 720px;
    margin: 32px auto 0;
    padding: 0 20px;
    text-align: center;
  }

  .submit-btn {
    background: linear-gradient(135deg, #5B6AF5 0%, #A78BFA 100%);
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(91,106,245,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.3px;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(91,106,245,0.45);
  }

  /* ── RESULT ── */
  .result-panel {
    max-width: 720px;
    margin: 28px auto 0;
    padding: 0 20px;
    display: none;
  }

  .result-panel.show { display: block; }

  .result-card {
    background: var(--white);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 8px 40px rgba(91,106,245,0.13);
    text-align: center;
  }

  .score-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: conic-gradient(#5B6AF5 var(--pct), #E5E7EB var(--pct));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    position: relative;
  }

  .score-inner {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  .score-num {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }

  .score-label {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 600;
  }

  .result-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--gray-800);
    margin-bottom: 6px;
  }

  .result-sub {
    font-size: 14px;
    color: var(--gray-400);
    margin-bottom: 24px;
  }

  .retry-btn {
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    padding: 13px 36px;
    border-radius: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }

  .retry-btn:hover { background: #dde0ff; }

  .copy-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: #FEE500;
    color: #3C1E1E;
    border: none;
    padding: 14px 36px;
    border-radius: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s;
    margin-bottom: 10px;
    letter-spacing: 0.2px;
  }

  .copy-btn:hover { background: #f5d800; transform: translateY(-1px); }
  .copy-btn:active { transform: scale(0.98); }

  .copy-btn .kakao-icon {
    width: 22px; height: 22px;
    background: #3C1E1E;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .copy-btn .kakao-icon svg { width: 14px; height: 14px; }

  .copy-toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1F2937;
    color: #fff;
    padding: 12px 24px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0;
    white-space: nowrap;
    pointer-events: none;
  }

  .copy-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .btn-row {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 0;
  }

  @media (max-width: 480px) {
    .hero h1 { font-size: 18px; }
    .q-sentence { font-size: 14px; }
    .opt-btn { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a class="logo-wrap" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 3C8.03 3 4 7.03 4 12c0 2.76 1.19 5.24 3.09 6.97L6 22l4.12-1.09A8.95 8.95 0 0013 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z" fill="white" fill-opacity="0.9"/>
        <path d="M9 12h8M13 8v8" stroke="#5B6AF5" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-text">영핏</span>
  </a>
  <span class="header-badge">📝 문법 테스트</span>
</header>

<!-- HERO -->
<div class="hero">
  <div class="point-badge">📌 Point 03</div>
  <h1>부분표현 + <span>of</span> + 명사<br>수일치 테스트</h1>
  <div class="rule-box">
    <p><strong>핵심 규칙:</strong> of 뒤에 나오는 명사의 '부분'을 나타내므로, 그 명사에 동사의 수를 일치시킵니다.</p>
    <div class="keywords">
      <span class="kw">all</span><span class="kw">most</span><span class="kw">half</span>
      <span class="kw">some</span><span class="kw">part</span><span class="kw">percent</span>
      <span class="kw">the rest</span><span class="kw">분수</span><span class="kw">the majority</span>
    </div>
    <p style="margin-top:10px"><strong>⚠️ one + of + 복수명사 →</strong> 주어는 one이므로 <strong>단수</strong>로 수일치!</p>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="prog-text">0 / 20 answered</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- QUESTIONS -->
<div class="questions-wrap" id="questionsWrap"></div>

<!-- SUBMIT -->
<div class="submit-wrap">
  <button class="submit-btn" onclick="submitAll()">채점하기 ✅</button>
</div>

<!-- RESULT -->
<div class="result-panel" id="resultPanel">
  <div class="result-card">
    <div class="score-ring" id="scoreRing">
      <div class="score-inner">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label">/ 20</div>
      </div>
    </div>
    <div class="result-title" id="resultTitle">결과</div>
    <div class="result-sub" id="resultSub"></div>
    <div class="btn-row">
      <button class="copy-btn" onclick="copyResult()">
        <span class="kakao-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3C6.48 3 2 6.69 2 11.25c0 2.88 1.73 5.42 4.35 6.97L5.5 21l4.1-2.05c.78.16 1.58.25 2.4.25 5.52 0 10-3.69 10-8.25S17.52 3 12 3z" fill="#FEE500"/>
          </svg>
        </span>
        카카오톡에 결과 복사하기
      </button>
      <button class="retry-btn" onclick="retry()">🔄 다시 풀기</button>
    </div>
  </div>
</div>
<div class="copy-toast" id="copyToast">✅ 복사 완료! 카톡에 붙여넣기 하세요 💛</div>

<script>
const questions = [
  { sentence: "Half of the students in the class ___ to volunteer for community service.", options: ["want","wants"], answer: "want", feedback: "students(복수) → want" },
  { sentence: "One of the causes of the fires ___ a broken electric wire.", options: ["was","were"], answer: "was", feedback: "one → 단수 was" },
  { sentence: "Only about 2.5 percent of the world's water ___ freshwater.", options: ["is","are"], answer: "is", feedback: "water(불가산) → is" },
  { sentence: "Most of the information about the items on sale ___ been put online.", options: ["has","have"], answer: "has", feedback: "information(불가산) → has" },
  { sentence: "All of the books on the shelf ___ written by the same author.", options: ["was","were"], answer: "were", feedback: "books(복수) → were" },
  { sentence: "Some of the milk in the fridge ___ already expired.", options: ["has","have"], answer: "has", feedback: "milk(불가산) → has" },
  { sentence: "The majority of the employees ___ agreed to the new policy.", options: ["has","have"], answer: "have", feedback: "employees(복수) → have" },
  { sentence: "One of my best friends ___ just moved to Seoul.", options: ["has","have"], answer: "has", feedback: "one → 단수 has" },
  { sentence: "Part of the problem ___ that nobody communicated clearly.", options: ["is","are"], answer: "is", feedback: "problem(단수) → is" },
  { sentence: "Two thirds of the park ___ covered with trees.", options: ["is","are"], answer: "is", feedback: "park(단수) → is" },
  { sentence: "The rest of the students ___ still working on their assignments.", options: ["is","are"], answer: "are", feedback: "students(복수) → are" },
  { sentence: "Most of the furniture in the room ___ very old.", options: ["looks","look"], answer: "looks", feedback: "furniture(불가산) → looks" },
  { sentence: "One of the reasons she ___ late every day is the traffic.", options: ["arrives","arrive"], answer: "arrives", feedback: "one → 단수 arrives" },
  { sentence: "About 60 percent of the survey respondents ___ satisfied with the service.", options: ["was","were"], answer: "were", feedback: "respondents(복수) → were" },
  { sentence: "Half of the cake ___ already been eaten.", options: ["has","have"], answer: "has", feedback: "cake(단수) → has" },
  { sentence: "Some of the advice he gave ___ really helpful.", options: ["was","were"], answer: "was", feedback: "advice(불가산) → was" },
  { sentence: "All of the data ___ been carefully reviewed before publication.", options: ["has","have"], answer: "has", feedback: "data는 여기서 집합체(불가산) → has" },
  { sentence: "The majority of the noise ___ coming from the construction site nearby.", options: ["was","were"], answer: "was", feedback: "noise(불가산) → was" },
  { sentence: "One of the biggest challenges in learning English ___ pronunciation.", options: ["is","are"], answer: "is", feedback: "one → 단수 is" },
  { sentence: "A third of the workers ___ laid off due to budget cuts.", options: ["was","were"], answer: "were", feedback: "workers(복수) → were" },
];

let answered = new Array(20).fill(null);

function render() {
  const wrap = document.getElementById('questionsWrap');
  wrap.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${i}`;

    const optHtml = q.options.map(o => `
      <button class="opt-btn" id="opt-${i}-${o}" onclick="choose(${i},'${o}')">${o}</button>
    `).join('');

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${String(i+1).padStart(2,'0')}</div>
      </div>
      <div class="q-sentence">${q.sentence.replace('___', '<span class="blank">[   ]</span>')}</div>
      <div class="options">${optHtml}</div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    wrap.appendChild(card);
  });
}

function choose(idx, val) {
  answered[idx] = val;
  questions[idx].options.forEach(o => {
    document.getElementById(`opt-${idx}-${o}`).className = 'opt-btn';
  });
  document.getElementById(`opt-${idx}-${val}`).classList.add('selected-temp');
  updateProgress();
}

// temporary highlight before submit
document.addEventListener('click', e => {
  if (e.target.classList.contains('opt-btn') && !e.target.disabled) {
    const [,idx,val] = e.target.id.split('-');
    const q = questions[idx];
    q.options.forEach(o => {
      const btn = document.getElementById(`opt-${idx}-${o}`);
      btn.classList.remove('selected-temp');
    });
    e.target.classList.add('selected-temp');
  }
});

function updateProgress() {
  const count = answered.filter(a => a !== null).length;
  const pct = Math.round(count / 20 * 100);
  document.getElementById('prog-text').textContent = `${count} / 20 answered`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function submitAll() {
  let score = 0;
  questions.forEach((q, i) => {
    const sel = answered[i];
    const card = document.getElementById(`card-${i}`);
    const fb = document.getElementById(`fb-${i}`);
    q.options.forEach(o => {
      const btn = document.getElementById(`opt-${i}-${o}`);
      btn.classList.remove('selected-temp');
      btn.disabled = true;
      if (o === q.answer && sel !== q.answer) {
        btn.classList.add('show-answer');
      }
    });
    if (sel === null) {
      card.classList.add('wrong');
      fb.className = 'feedback show ng';
      fb.innerHTML = `❌ 미응답 — 정답: <strong>${q.answer}</strong> | ${q.feedback}`;
    } else if (sel === q.answer) {
      score++;
      card.classList.add('correct');
      document.getElementById(`opt-${i}-${sel}`).classList.add('selected-correct');
      fb.className = 'feedback show ok';
      fb.innerHTML = `✅ 정답! ${q.feedback}`;
    } else {
      card.classList.add('wrong');
      document.getElementById(`opt-${i}-${sel}`).classList.add('selected-wrong');
      fb.className = 'feedback show ng';
      fb.innerHTML = `❌ 오답 — 정답: <strong>${q.answer}</strong> | ${q.feedback}`;
    }
  });

  const pct = Math.round(score / 20 * 100);
  const ring = document.getElementById('scoreRing');
  ring.style.setProperty('--pct', pct + '%');
  ring.style.background = `conic-gradient(#5B6AF5 ${pct}%, #E5E7EB ${pct}%)`;
  document.getElementById('scoreNum').textContent = score;

  const titles = ['다시 도전해봐요! 💪', '조금 더 연습해요! 📚', '잘하고 있어요! 👍', '훌륭해요! 🌟', '완벽해요! 🏆'];
  const ti = score < 8 ? 0 : score < 13 ? 1 : score < 16 ? 2 : score < 19 ? 3 : 4;
  document.getElementById('resultTitle').textContent = titles[ti];
  document.getElementById('resultSub').textContent = `${score}개 정답 · 정확도 ${pct}%`;

  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });

  document.querySelector('.submit-btn').disabled = true;
  document.querySelector('.submit-btn').style.opacity = '0.5';
}

function copyResult() {
  const score = parseInt(document.getElementById('scoreNum').textContent);
  const pct = Math.round(score / 20 * 100);
  const titles = ['다시 도전해봐요! 💪', '조금 더 연습해요! 📚', '잘하고 있어요! 👍', '훌륭해요! 🌟', '완벽해요! 🏆'];
  const ti = score < 8 ? 0 : score < 13 ? 1 : score < 16 ? 2 : score < 19 ? 3 : 4;
  const emoji = score < 8 ? '😅' : score < 13 ? '🙂' : score < 16 ? '😊' : score < 19 ? '😄' : '🏆';

  const wrongList = questions
    .map((q, i) => ({ q, i, sel: answered[i] }))
    .filter(({ q, sel }) => sel !== q.answer)
    .map(({ q, i, sel }) => `  Q${String(i+1).padStart(2,'0')}. ${sel === null ? '(미응답)' : sel} → 정답: ${q.answer}`)
    .join('\n');

  const lines = [
    `📚 영핏 문법 테스트 결과`,
    `━━━━━━━━━━━━━━━━`,
    `📌 Point 03 | 부분표현 + of + 명사`,
    ``,
    `${emoji} ${titles[ti]}`,
    `✅ 점수: ${score} / 20문항 (${pct}%)`,
    ``,
  ];

  if (wrongList) {
    lines.push(`🔍 틀린 문제`);
    lines.push(wrongList);
    lines.push('');
  } else {
    lines.push(`🎉 모두 정답! 완벽한 실력이에요!`);
    lines.push('');
  }

  lines.push(`━━━━━━━━━━━━━━━━`);
  lines.push(`영핏과 함께 영어 문법 정복! 💜`);

  const text = lines.join('\n');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast();
}

function showToast() {
  const t = document.getElementById('copyToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function retry() {
  answered = new Array(20).fill(null);
  document.getElementById('resultPanel').classList.remove('show');
  document.querySelector('.submit-btn').disabled = false;
  document.querySelector('.submit-btn').style.opacity = '1';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('prog-text').textContent = '0 / 20 answered';
  document.getElementById('prog-pct').textContent = '0%';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// INIT
const style = document.createElement('style');
style.textContent = `.opt-btn.selected-temp { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }`;
document.head.appendChild(style);
render();
</script>
</body>
