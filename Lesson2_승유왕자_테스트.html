<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lesson 2 Let's Make Our Town Better | 영핏 학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #1a2550;
    --navy-light: #2a3a6e;
    --gold: #d4a850;
    --primary: #3b5bdb;
    --primary-light: #e7ecff;
    --accent: #ff6b9d;
    --correct: #22c55e;
    --correct-bg: #dcfce7;
    --wrong: #ef4444;
    --wrong-bg: #fee2e2;
    --text: #1f2937;
    --text-light: #6b7280;
    --bg: #f8f9fc;
    --card: #ffffff;
    --border: #e5e7eb;
  }
  html, body {
    font-family: 'Noto Sans KR', 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  .app { max-width: 600px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; padding-bottom: 32px; }

  /* 헤더 */
  .header {
    background: var(--navy);
    color: white;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(26,37,80,0.15);
  }
  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--gold), #b8902f);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 13px;
    color: var(--navy);
    letter-spacing: -0.3px;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1);
  }
  .header-text { flex: 1; min-width: 0; }
  .header-title {
    font-size: 16px; font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .header-sub {
    font-size: 11px;
    color: var(--gold);
    font-weight: 500;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* 진행바 */
  .progress-wrap {
    background: var(--card);
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
  }
  .progress-info {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .q-counter { font-weight: 700; color: var(--navy); }
  .score-info { color: var(--text-light); font-weight: 500; }
  .score-info .correct-cnt { color: var(--correct); font-weight: 700; }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* 문제 카드 */
  .quiz-area { padding: 20px 18px; }
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 22px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .q-tag {
    display: inline-block;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 99px;
    margin-bottom: 12px;
    letter-spacing: 0.3px;
  }
  .q-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 14px;
    line-height: 1.5;
    word-break: keep-all;
  }
  .q-sentence {
    background: #f3f5fb;
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 15px;
    color: #2a3a6e;
    line-height: 1.6;
    font-weight: 500;
  }
  .q-sentence em {
    font-style: normal;
    background: #fff3cd;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 700;
    color: #b45309;
  }

  /* 선택지 */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: white;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    line-height: 1.5;
    display: flex;
    align-items: center;
    gap: 10px;
    word-break: keep-all;
  }
  .option:active { transform: scale(0.99); }
  .option:hover { border-color: var(--primary); background: #fafbff; }
  .option-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 700;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #166534;
  }
  .option.correct .option-num {
    background: var(--correct);
    color: white;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: #991b1b;
  }
  .option.wrong .option-num {
    background: var(--wrong);
    color: white;
  }
  .option:disabled { cursor: default; }

  /* 피드백 */
  .feedback {
    background: var(--card);
    border-radius: 14px;
    padding: 16px 18px;
    margin-top: 14px;
    display: none;
    animation: slideUp 0.3s ease;
    border: 1px solid var(--border);
  }
  .feedback.show { display: block; }
  .feedback.correct { border-left: 4px solid var(--correct); }
  .feedback.wrong { border-left: 4px solid var(--wrong); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fb-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .fb-title.correct { color: var(--correct); }
  .fb-title.wrong { color: var(--wrong); }
  .fb-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    word-break: keep-all;
  }
  .fb-text strong { color: var(--navy); font-weight: 700; }

  /* 다음 버튼 */
  .next-btn {
    display: none;
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .next-btn.show { display: block; }
  .next-btn:active { transform: scale(0.99); background: var(--navy-light); }

  /* 결과 화면 */
  .result-screen { display: none; padding: 20px 18px; text-align: center; }
  .result-screen.show { display: block; }
  .result-card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 22px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
  }
  .result-emoji { font-size: 56px; margin-bottom: 8px; }
  .result-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .result-sub {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 20px;
  }
  .grade-badge {
    display: inline-block;
    width: 84px; height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 38px;
    font-weight: 900;
    line-height: 84px;
    margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(59,91,219,0.3);
  }
  .score-display {
    font-size: 28px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 6px;
    font-family: 'Nunito', sans-serif;
  }
  .score-display .total { color: var(--text-light); font-size: 22px; font-weight: 600; }
  .accuracy {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 20px;
  }

  /* 문항별 리뷰 */
  .review-section { margin-top: 24px; text-align: left; }
  .review-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .review-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .review-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    color: white;
  }
  .review-cell.correct { background: var(--correct); }
  .review-cell.wrong { background: var(--wrong); }

  .retry-btn {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(59,91,219,0.25);
    transition: all 0.15s;
  }
  .retry-btn:active { transform: scale(0.99); }

  @media (max-width: 380px) {
    .q-text { font-size: 15px; }
    .q-sentence { font-size: 14px; }
    .option { font-size: 14px; padding: 12px 14px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">EngFit</div>
    <div class="header-text">
      <div class="header-title">Lesson 2 마을 가꾸기</div>
      <div class="header-sub">LET'S MAKE OUR TOWN BETTER</div>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-info">
      <span class="q-counter">문제 <span id="qNum">1</span> / <span id="qTotal">15</span></span>
      <span class="score-info"><span class="correct-cnt" id="correctCnt">0</span> 정답</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <main class="quiz-area" id="quizArea">
    <!-- 문제가 여기에 동적으로 들어갑니다 -->
  </main>

  <section class="result-screen" id="resultScreen">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <div class="result-title" id="resultTitle">테스트 완료!</div>
      <div class="result-sub">수고하셨어요</div>
      <div class="grade-badge" id="gradeBadge">A</div>
      <div class="score-display"><span id="finalScore">0</span><span class="total"> / 15</span></div>
      <div class="accuracy" id="accuracy">정답률 0%</div>

      <div class="review-section">
        <div class="review-title">📋 문항별 결과</div>
        <div class="review-grid" id="reviewGrid"></div>
      </div>

      <button class="retry-btn" onclick="retry()">🔄 다시 도전하기</button>
    </div>
  </section>
</div>

<script>
const questions = [
  // ===== Reading 1 [A] =====
  {
    type: '문법 개념',
    q: '다음 문장의 making의 종류는?',
    sentence: 'My parents were <em>making</em> me work on the neighborhood project.',
    options: ['일반동사', '사역동사 (목적어 + 동사원형)', '지각동사', '수동태'],
    answer: 1,
    explain: '<strong>사역동사 make</strong>는 "~에게 ~하게 시키다" 의미로, 목적어 뒤에 <strong>동사원형(work)</strong>을 씁니다. 사역동사: make / have / let'
  },
  {
    type: '비교급 강조',
    q: '비교급(better)을 강조하는 단어가 <strong>아닌</strong> 것은?',
    sentence: 'I had ___ better things to do.',
    options: ['far', 'much', 'very', 'a lot'],
    answer: 2,
    explain: '<strong>very</strong>는 비교급을 강조할 수 없습니다. 비교급 강조 단어: <strong>even, still, much, far, a lot</strong> (= 훨씬 더 ~한). very는 원급(very tall)에만 사용해요.'
  },
  {
    type: '간접의문문',
    q: '괄호 안 단어를 바르게 배열한 것은?',
    sentence: 'I didn\'t understand [ we / working / on / why / this / were ] place.',
    options: [
      'why we were working on this',
      'why were we working on this',
      'why working we were on this',
      'we why were working on this'
    ],
    answer: 0,
    explain: '<strong>간접의문문</strong>은 의문사 + 주어 + 동사 어순. why(의문사) + we(주어) + were working(동사)이 정답이에요.'
  },
  {
    type: '관계대명사 생략',
    q: '다음 문장에서 생략된 that의 역할은?',
    sentence: 'It was full of every other kind of dirty trash <em>(that)</em> you can imagine.',
    options: ['접속사 that', '관계대명사 that (목적격)', '지시대명사 that', '강조의 that'],
    answer: 1,
    explain: '<strong>관계대명사 that(목적격)</strong>이 생략됨. 뒤 문장에 동사 imagine의 목적어가 비어 있으므로 (you can imagine ___), 선행사 trash를 받는 목적격 관계대명사 that이 생략된 거예요. 목적격 관계대명사는 생략 가능!'
  },
  {
    type: '접속사 as',
    q: '다음 문장에서 as의 의미는?',
    sentence: '<em>As</em> I looked at it that first morning, I thought, "I bet there are snakes in there."',
    options: ['~할 때', '~ 때문에', '~듯이(~대로)', '~로서'],
    answer: 0,
    explain: '<strong>~할 때</strong>의 의미. 첫날 아침에 그곳을 봤을 때라는 시간을 나타냅니다. as의 4가지 의미: ① ~할 때 ② ~하면서 ③ ~ 때문에 ④ ~듯이(~대로)'
  },
  {
    type: '의문사 + to부정사',
    q: '다음 문장에서 \'where to start\'의 구조는?',
    sentence: 'We were all wondering <em>where to start</em>.',
    options: ['관계부사', '의문사 + to부정사', '명사절 접속사', '부사절'],
    answer: 1,
    explain: '<strong>의문사 + to부정사</strong> = "어디에서 ~할지" 의미. where to start = 어디에서부터 시작해야 할지. (what to do, how to solve 등도 같은 구조)'
  },

  // ===== Reading 2 [A] =====
  {
    type: '과거완료 시제',
    q: '다음 문장에서 had made의 시제는?',
    sentence: 'By lunchtime I was glad that my dad <em>had made</em> me wear gloves.',
    options: ['단순 과거', '현재완료', '과거완료', '과거진행'],
    answer: 2,
    explain: '<strong>과거완료(had + p.p.)</strong>. "기뻐했다(was glad)"는 과거 시점보다 더 이전에 "장갑을 끼게 시킨" 일이 일어났음을 나타냅니다. 과거완료 = 과거의 특정 시점보다 더 이전에 일어난 일.'
  },
  {
    type: '접속사 As',
    q: '다음 문장에서 As의 의미는?',
    sentence: '<em>As</em> we pulled and pulled, dust filled the air and made us sneeze.',
    options: ['~할 때(~하면서)', '~ 때문에', '~듯이', '~로서'],
    answer: 0,
    explain: '<strong>~할 때 / ~하면서</strong>의 의미. 잡초를 뽑고 또 뽑으면서 동시에 먼지가 공기를 가득 채운 상황을 나타내요.'
  },
  {
    type: 'stop + ~ing/to부정사',
    q: '다음 문장의 의미로 알맞은 것은?',
    sentence: 'After about two weeks I <em>stopped complaining</em>.',
    options: [
      '약 2주 후, 나는 불평하기를 멈췄다',
      '약 2주 후, 나는 불평하기 위해 멈췄다',
      '약 2주 후, 나는 불평하면서 멈췄다',
      '약 2주 후, 나는 불평을 시작했다'
    ],
    answer: 0,
    explain: '<strong>stop + 동사ing = 하던 것을 멈추다</strong>. 즉 불평하던 것을 멈췄다는 의미. 반면 <strong>stop + to 동사원형 = ~하기 위해 멈추다</strong>예요. (Ex. He stopped to smoke. = 담배를 피우기 위해 멈췄다)'
  },
  {
    type: '형태 고르기',
    q: '괄호 안에서 옳은 것은?',
    sentence: '... when I found the plants <em>[ started / had started ]</em> popping up!',
    options: ['started', 'had started'],
    answer: 1,
    explain: '<strong>had started</strong>가 정답. 발견한 시점(found, 과거)보다 식물들이 싹 트기 시작한 일이 더 이전이므로 <strong>과거완료(had + p.p.)</strong>를 써요.'
  },

  // ===== Reading 3 [A] =====
  {
    type: '관용 표현',
    q: '다음 문장에서 \'it suddenly hit me\'의 의미는?',
    sentence: 'Tonight, <em>it suddenly hit me</em> - what a beautiful garden we did!',
    options: [
      '그것이 갑자기 나를 때렸다',
      '갑자기 떠올랐다 / 깨달았다',
      '갑자기 나를 흔들었다',
      '갑자기 나에게 부딪혔다'
    ],
    answer: 1,
    explain: '<strong>it suddenly hit me = 갑자기 떠올랐다 / 깨달았다</strong>. = it suddenly came to me / it just popped into my head 와 같은 의미예요.'
  },
  {
    type: '감탄문',
    q: '다음 문장은 어떤 종류의 문장인가?',
    sentence: '<em>What a beautiful garden</em> we did!',
    options: ['직접의문문', '간접의문문', '감탄문', '명령문'],
    answer: 2,
    explain: '<strong>감탄문</strong>. <strong>What (a/an) + 형용사 + 명사 (+ 주어 + 동사)!</strong> 형식. (How로 시작하는 감탄문은: How + 형용사/부사 + 주어 + 동사!)'
  },

  // ===== Practice Grammar - 과거완료 =====
  {
    type: '과거완료 형태',
    q: '괄호 안 동사를 바르게 활용한 것은?',
    sentence: 'I (find) somebody (put) a piece of cake on my desk.',
    options: [
      'find / put',
      'found / had put',
      'finds / puts',
      'had found / put'
    ],
    answer: 1,
    explain: '<strong>found / had put</strong>이 정답. 발견한 일(found, 과거)보다 케이크를 놓아둔 일이 더 이전에 일어났으므로 <strong>과거완료(had put)</strong>을 써요.'
  },
  {
    type: '과거완료 형태',
    q: '괄호 안 동사를 바르게 활용한 것은?',
    sentence: 'When I (arrive) at the cafe, she (already / leave).',
    options: [
      'arrived / had already left',
      'had arrived / already left',
      'arrived / has already left',
      'arrives / already leaves'
    ],
    answer: 0,
    explain: '<strong>arrived / had already left</strong>가 정답. 도착한 시점(과거)보다 그녀가 떠난 일이 더 이전이므로 과거완료(had + p.p.)를 사용해요. already/just/yet은 had와 p.p. 사이에 위치합니다.'
  },
  {
    type: '종합 어법',
    q: '다음 문장에서 어법상 <strong>틀린</strong> 부분은?',
    sentence: 'He <em>(A) had lived</em> in this town <em>(B) until</em> last month, but now he <em>(C) live</em> in Seoul.',
    options: [
      '(A) had lived → 맞음',
      '(B) until → 맞음',
      '(C) live → lives로 고쳐야 함',
      '모두 어법상 옳음'
    ],
    answer: 2,
    explain: '<strong>(C) live → lives</strong>. 주어가 he(3인칭 단수)이고 현재 시점("now")이므로 동사에 -s를 붙여야 해요. (A) had lived는 과거의 특정 시점(last month)까지 영향을 미친 일을 나타내는 과거완료로 적절함.'
  }
];

let currentQ = 0;
let correctCount = 0;
const results = [];

function renderQuestion() {
  const q = questions[currentQ];
  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="question-card">
      <span class="q-tag">${q.type}</span>
      <div class="q-text">${q.q}</div>
      <div class="q-sentence">${q.sentence}</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <div class="fb-title" id="fbTitle"></div>
        <div class="fb-text" id="fbText"></div>
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${currentQ === questions.length - 1 ? '결과 보기 →' : '다음 문제 →'}
      </button>
    </div>
  `;

  const optsDiv = document.getElementById('options');
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-num">${idx + 1}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(idx);
    optsDiv.appendChild(btn);
  });

  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('qTotal').textContent = questions.length;
  document.getElementById('progressFill').style.width = ((currentQ) / questions.length * 100) + '%';
}

function selectOption(idx) {
  const q = questions[currentQ];
  const buttons = document.querySelectorAll('.option');
  const fb = document.getElementById('feedback');
  const fbTitle = document.getElementById('fbTitle');
  const fbText = document.getElementById('fbText');
  const nextBtn = document.getElementById('nextBtn');

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    if (i === idx && i !== q.answer) b.classList.add('wrong');
  });

  const isCorrect = idx === q.answer;
  results.push(isCorrect);

  if (isCorrect) {
    correctCount++;
    fb.className = 'feedback show correct';
    fbTitle.className = 'fb-title correct';
    fbTitle.innerHTML = '✓ 정답입니다!';
  } else {
    fb.className = 'feedback show wrong';
    fbTitle.className = 'fb-title wrong';
    fbTitle.innerHTML = '✗ 아쉬워요!';
  }
  fbText.innerHTML = q.explain;

  document.getElementById('correctCnt').textContent = correctCount;
  document.getElementById('progressFill').style.width = ((currentQ + 1) / questions.length * 100) + '%';

  // 정답 시 자동 진행 (1.6초 후)
  if (isCorrect) {
    setTimeout(() => {
      if (currentQ < questions.length - 1) {
        nextQuestion();
      } else {
        nextBtn.classList.add('show');
      }
    }, 1600);
  } else {
    setTimeout(() => nextBtn.classList.add('show'), 300);
  }
}

function nextQuestion() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('resultScreen').classList.add('show');

  const score = correctCount;
  const total = questions.length;
  const pct = Math.round(score / total * 100);

  let grade, emoji, title;
  if (pct >= 90) { grade = 'S'; emoji = '🏆'; title = '완벽해요!'; }
  else if (pct >= 75) { grade = 'A'; emoji = '🌟'; title = '훌륭해요!'; }
  else if (pct >= 60) { grade = 'B'; emoji = '😊'; title = '잘했어요!'; }
  else if (pct >= 45) { grade = 'C'; emoji = '🙂'; title = '조금만 더 노력!'; }
  else { grade = 'D'; emoji = '💪'; title = '다시 한 번 도전!'; }

  document.getElementById('gradeBadge').textContent = grade;
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('accuracy').textContent = `정답률 ${pct}%`;

  const grid = document.getElementById('reviewGrid');
  grid.innerHTML = '';
  results.forEach((ok, i) => {
    const cell = document.createElement('div');
    cell.className = 'review-cell ' + (ok ? 'correct' : 'wrong');
    cell.textContent = i + 1;
    grid.appendChild(cell);
  });
}

function retry() {
  currentQ = 0;
  correctCount = 0;
  results.length = 0;
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('correctCnt').textContent = '0';
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 시작
renderQuestion();
</script>
