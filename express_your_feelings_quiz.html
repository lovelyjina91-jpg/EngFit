<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express Your Feelings | 중3 영어 퀴즈</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
:root {
  --green:  #1B4332;
  --green2: #103826;
  --green3: #0D2B1E;
  --green-light: #E8F5EE;
  --green-pale:  #F2FAF6;
  --blue: #1D4ED8;
  --blue-light: #EFF6FF;
  --amber: #B45309;
  --amber-light: #FFFBEB;
  --red: #B91C1C;
  --red-light: #FEF2F2;
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --border: #E3E2DC;
  --border2: #C8C7BF;
  --text: #141410;
  --text2: #5A5A52;
  --text3: #9A9A92;
  --radius: 10px;
  --radius-lg: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ─── HEADER ─── */
.site-header {
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  padding: 12px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.header-icon {
  width: 38px; height: 38px;
  background: var(--green);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.header-text h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
.header-text p { font-size: 11px; color: var(--text3); margin-top: 1px; letter-spacing: 0.01em; font-weight: 400; }
.header-score-row {
  margin-left: auto;
  display: flex; gap: 10px;
}
.score-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  letter-spacing: -0.01em;
}
.score-pill.active { background: var(--green-light); border-color: var(--green); color: var(--green); }

/* ─── TABS ─── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 13px 10px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text3);
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  letter-spacing: -0.01em;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.tab-count {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 99px;
  background: var(--border);
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}
.tab-btn.active .tab-count { background: var(--green-light); color: var(--green2); }

/* ─── MAIN ─── */
main { max-width: 680px; margin: 0 auto; padding: 22px 16px 80px; }

/* ─── PROGRESS ─── */
.progress-wrap { margin-bottom: 20px; }
.progress-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--text3); margin-bottom: 8px;
}
.progress-label { font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; font-size: 11px; }
.progress-num { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: var(--text2); }
.pb { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.pb-inner { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* ─── CARD ─── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 20px;
  margin-bottom: 14px;
  animation: fadeUp 0.25s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.q-scene {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text3); margin-bottom: 6px; font-weight: 600;
}
.type-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 99px; margin-bottom: 14px;
  letter-spacing: 0.02em;
}
.badge-order { background: var(--green-light); color: var(--green2); }
.badge-subj  { background: var(--blue-light); color: var(--blue); }
.q-ko {
  font-size: 14px; color: var(--text2);
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 8px;
  border-left: 3px solid var(--border2);
  line-height: 1.65;
}
.q-ko::before { content: "🇰🇷 "; }

/* ─── WORD ORDER ─── */
.section-lbl {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text3); font-weight: 700; margin-bottom: 7px;
}
.word-pool {
  display: flex; flex-wrap: wrap; gap: 7px;
  min-height: 52px; padding: 12px;
  background: var(--bg);
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  margin-bottom: 8px;
  align-content: flex-start;
}
.ans-area {
  display: flex; flex-wrap: wrap; gap: 7px;
  min-height: 54px; padding: 12px;
  background: var(--green-pale);
  border: 1.5px solid var(--green);
  border-radius: var(--radius);
  margin-bottom: 10px;
  align-content: flex-start;
  transition: background 0.2s;
}
.chip {
  display: inline-flex; align-items: center;
  padding: 6px 13px;
  border: 1.5px solid var(--border2);
  border-radius: 7px;
  background: var(--surface);
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  transition: all 0.12s;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.chip:hover { border-color: var(--green); background: var(--green-light); color: var(--green2); transform: translateY(-1px); }
.chip.placed { background: var(--green-light); border-color: var(--green); color: var(--green2); }
.chip.placed:hover { background: #c8eddf; }
.chip.disabled { cursor: default; pointer-events: none; }
.chip.chip-ok { background: #D1FAE5; border-color: #059669; color: #065F46; }
.chip.chip-ng { background: #FEE2E2; border-color: #DC2626; color: #7F1D1D; }
.chip-empty { font-size: 13px; color: var(--text3); align-self: center; font-style: italic; }
.word-counter {
  font-size: 12px; color: var(--text3);
  margin-bottom: 8px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -0.01em;
}
.word-counter .cnt { color: var(--green); font-weight: 700; }
.word-counter .tot { color: var(--text2); }
.warn-msg { font-size: 12px; color: var(--amber); margin-top: 4px; display: none; }
.warn-msg.show { display: block; }

/* ─── SUBJECTIVE ─── */
.blank-line {
  font-size: 19px; line-height: 1.85; margin-bottom: 14px;
  word-break: keep-all;
  font-weight: 500;
}
.blank-slot {
  display: inline-block;
  border-bottom: 2.5px solid var(--blue);
  min-width: 90px; padding: 0 8px;
  text-align: center;
  color: var(--blue);
  font-family: 'JetBrains Mono', monospace;
}
.ans-input {
  width: 100%; padding: 12px 15px;
  font-size: 16px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius);
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.2s, background 0.2s;
  font-weight: 500;
  letter-spacing: 0.01em;
}
.ans-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
.ans-input.inp-ok { border-color: #059669; background: #F0FDF4; color: #065F46; }
.ans-input.inp-ng { border-color: #DC2626; background: #FEF2F2; color: #7F1D1D; }
.hint-toggle {
  font-size: 12px; padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 99px;
  background: var(--surface);
  cursor: pointer;
  color: var(--amber);
  font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
  margin-top: 10px;
  transition: 0.15s; display: inline-flex; align-items: center; gap: 4px;
  font-weight: 600; letter-spacing: -0.01em;
}
.hint-toggle:hover { background: var(--amber-light); border-color: var(--amber); }
.hint-box {
  margin-top: 8px; padding: 10px 14px;
  background: var(--amber-light);
  border: 1.5px solid #FDE68A;
  border-radius: 8px;
  font-size: 13px;
  color: #92400E;
  display: none;
  line-height: 1.6;
}
.hint-box.show { display: block; animation: fadeUp 0.15s ease; }

/* ─── FEEDBACK ─── */
.feedback {
  margin-top: 12px; font-size: 14px; font-weight: 600;
  padding: 10px 14px; border-radius: 8px;
  display: none; align-items: center; gap: 8px;
}
.feedback.show { display: flex; animation: fadeUp 0.2s ease; }
.feedback.fb-ok { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
.feedback.fb-ng { background: #FEE2E2; color: #7F1D1D; border: 1px solid #FCA5A5; }
.ans-reveal { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: inherit; }

/* ─── NAV ─── */
.nav-row {
  display: flex; align-items: center;
  gap: 8px; flex-wrap: wrap;
}
.btn {
  padding: 10px 20px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
  color: var(--text);
  transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 5px;
  letter-spacing: -0.01em;
}
.btn:hover { background: var(--bg); border-color: var(--text2); }
.btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
.btn.primary:hover { background: var(--green2); }
.btn.ghost { color: var(--text3); border-color: var(--border); }
.btn.ghost:hover { border-color: var(--border2); color: var(--text); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
.q-counter {
  font-size: 13px; color: var(--text3); margin-left: auto;
  font-family: 'JetBrains Mono', monospace; font-weight: 500;
  letter-spacing: -0.01em;
}

/* ─── SCORE ─── */
.score-screen {
  text-align: center; padding: 2.5rem 1rem 3rem;
  animation: fadeUp 0.4s ease;
}
.score-ring {
  width: 140px; height: 140px;
  border-radius: 50%;
  background: conic-gradient(var(--green) calc(var(--pct)*1%), var(--border) 0);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  position: relative;
}
.score-ring::before {
  content: '';
  position: absolute;
  inset: 14px;
  background: var(--surface);
  border-radius: 50%;
}
.score-inner { position: relative; z-index: 1; text-align: center; }
.score-n { font-size: 38px; font-weight: 700; color: var(--green); font-family: 'JetBrains Mono', monospace; line-height: 1; }
.score-d { font-size: 13px; color: var(--text3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.score-msg { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.03em; }
.score-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; font-weight: 400; }
.score-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 10px; max-width: 360px; margin: 0 auto 28px;
}
.stat-box {
  background: var(--bg); border-radius: var(--radius);
  padding: 14px 8px; border: 1.5px solid var(--border);
}
.stat-n { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.stat-ok .stat-n { color: var(--green); }
.stat-ng .stat-n { color: var(--red); }
.stat-pct .stat-n { color: var(--blue); }
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; font-weight: 600; letter-spacing: 0.02em; }

/* ─── SUMMARY TABLE ─── */
.summary-wrap { max-width: 680px; margin: 24px auto 0; }
.summary-wrap h3 { font-size: 13px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.summary-list { display: flex; flex-direction: column; gap: 6px; }
.summary-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  font-size: 13px; background: var(--surface); border: 1px solid var(--border);
}
.summary-item.s-ok { border-color: #6EE7B7; background: #F0FDF4; }
.summary-item.s-ng { border-color: #FCA5A5; background: #FEF2F2; }
.s-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.s-ko { color: var(--text2); margin-bottom: 2px; }
.s-ans { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; }
.s-ans.correct { color: #065F46; }
.s-ans.wrong { color: #7F1D1D; }
.s-correct-lbl { font-size: 11px; color: var(--text3); }

/* ─── RESPONSIVE ─── */
@media(max-width:480px) {
  .header-score-row { display: none; }
  .blank-line { font-size: 17px; }
  .chip { font-size: 14px; padding: 5px 11px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-icon">🧩</div>
  <div class="header-text">
    <h1>영핏 · Express Your Feelings</h1>
    <p>중3 영어 · 천재(정사열) · STEP2 커뮤니케이션</p>
  </div>
  <div class="header-score-row">
    <div class="score-pill" id="pill-order">📝 순서 — / 30</div>
    <div class="score-pill" id="pill-subj">✏️ 주관식 — / 30</div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" id="tab-order" onclick="switchTab('order')">
    📝 순서 맞추기 <span class="tab-count">30</span>
  </button>
  <button class="tab-btn" id="tab-subj" onclick="switchTab('subj')">
    ✏️ 주관식 <span class="tab-count">30</span>
  </button>
</div>

<main id="qmain"></main>

<script>
// ══════════════════════════════════════════════════════════
//  ① 순서 맞추기 데이터 (30문제)
// ══════════════════════════════════════════════════════════
const OQ = [
  {s:"Dialogue 1", ko:"기분이 좋아 보이지 않는구나.", w:["You","don't","look","happy."]},
  {s:"Dialogue 1", ko:"내 강아지가 아파.", w:["My","dog","is","sick."]},
  {s:"Dialogue 1", ko:"그는 아무것도 먹으려 하지 않아.", w:["He","won't","eat","at","all."]},
  {s:"Dialogue 2", ko:"오늘 점심 메뉴 좀 봐.", w:["Take","a","look","at","today's","lunch","menu."]},
  {s:"Dialogue 2", ko:"닭튀김을 먹게 되어 기뻐!", w:["I'm","glad","to","eat","fried","chicken!"]},
  {s:"Dialogue 2", ko:"점심시간이 무척 기다려져.", w:["I","can't","wait","for","lunch","break."]},
  {s:"Dialogue 3", ko:"기분이 어떠세요?", w:["How","are","you","feeling?"]},
  {s:"Dialogue 3", ko:"몇몇 학생들이 학교 청소하는 것을 돕고 있어요.", w:["Some","students","are","helping","me","clean","the","school."]},
  {s:"Dialogue 3", ko:"그 말을 들으니 기쁘군요.", w:["I'm","glad","to","hear","that."]},
  {s:"Dialogue 4", ko:"엄마가 방과 후에 축구하는 것을 허락하지 않으셔.", w:["My","mom","won't","let","me","play","soccer","after","school."]},
  {s:"Dialogue 4", ko:"한 번 더 말씀드려 보지 그러니?", w:["Why","don't","you","ask","her","one","more","time?"]},
  {s:"Dialogue 5", ko:"완전 새로운 나라에 가게 되어 흥분돼.", w:["I'm","excited","to","go","to","a","whole","new","world."]},
  {s:"Dialogue 5", ko:"나는 너를 걱정했어.", w:["I","was","worried","about","you."]},
  {s:"Dialogue 5", ko:"너희 모두를 많이 그리워할 거야.", w:["I'll","miss","all","of","you","a","lot."]},
  {s:"Dialogue 5", ko:"온라인으로 계속 연락하자.", w:["Let's","keep","in","touch","online."]},
  {s:"Dialogue 5", ko:"자주 화상 채팅하자.", w:["Let's","have","video","chats","often."]},
  {s:"Dialogue 6", ko:"그 애가 많이 보고 싶을 거야.", w:["I'm","going","to","miss","him","a","lot."]},
  {s:"Dialogue 6", ko:"그가 우리를 초대할 거야.", w:["He","is","going","to","invite","us."]},
  {s:"Dialogue 6", ko:"새로운 나라로 여행할 기회를 얻게 되어 기뻐.", w:["I'm","glad","to","have","a","chance","to","travel","to","a","new","country."]},
  {s:"Dialogue 7", ko:"내 가장 친한 친구인 지훈이가 멀리 이사 간대.", w:["My","best","friend","Jihun","is","moving","away."]},
  {s:"Dialogue 7", ko:"작별 선물로 지훈이에게 사진책을 만들어 주는 게 어때?", w:["Why","don't","we","make","him","a","photo","book","as","a","goodbye","gift?"]},
  {s:"Dialogue 7", ko:"뭔가 의미 있는 것을 그에게 줄 수 있어서 기뻐.", w:["I'm","glad","to","give","him","something","meaningful."]},
  {s:"Dialogue 9", ko:"생일 선물을 받아서 정말 기뻐.", w:["I'm","really","glad","to","get","a","present","for","my","birthday."]},
  {s:"Dialogue 9", ko:"그게 얼마나 높이 날 수 있는지 궁금하다.", w:["I","wonder","how","high","it","can","fly."]},
  {s:"Dialogue 10", ko:"내가 가장 좋아하는 음식을 요리해서 정말 기뻐.", w:["I'm","really","glad","to","cook","my","favorite","food."]},
  {s:"Dialogue 10", ko:"그건 잡채인데, 맛있고 건강에도 좋아.", w:["It's","japchae,","which","is","delicious","and","healthy."]},
  {s:"Dialogue 11", ko:"우리 반에 새 학생이 한 명 왔어.", w:["We","have","a","new","student","in","our","class."]},
  {s:"Dialogue 11", ko:"그가 너희 팀에 합류하길 바랄게.", w:["I","hope","he","joins","your","team."]},
  {s:"Dialogue 11", ko:"어떤 때보다 행복해, 나리야.", w:["I'm","happier","than","ever,","Nari."]},
  {s:"Dialogue 11", ko:"우리는 정말 재미있을 거야!", w:["We're","going","to","have","lots","of","fun!"]}
];

// ══════════════════════════════════════════════════════════
//  ② 주관식 데이터 (30문제)
// ══════════════════════════════════════════════════════════
const SQ = [
  {s:"Key Function", ko:"기분이 어떠니?", q:"How are you ___?", a:"feeling", h:"기분을 묻는 핵심 표현 (How are you ~?)"},
  {s:"Key Function", ko:"나는 매우 행복해.", q:"I'm ___ very happy.", a:"feeling", h:"I'm feeling ~: ~한 기분이다 (현재진행형으로 감정 표현)"},
  {s:"Key Function – 위로", ko:"정말 안됐구나.", q:"That's too ___.", a:"bad", h:"상대방을 위로할 때 쓰는 표현"},
  {s:"Key Function – 위로", ko:"그 말을 들으니 유감이야.", q:"I'm sorry to ___ that.", a:"hear", h:"I'm sorry to R: ~해서 유감이다 (to부정사 부사적 용법)"},
  {s:"Key Function – 공감", ko:"그 말을 들으니 나도 기뻐.", q:"I'm ___ to hear that.", a:"glad", h:"I'm glad to R: ~해서 기쁘다 (to부정사 부사적 용법)"},
  {s:"Dialogue 2", ko:"닭튀김을 먹게 되어 기뻐!", q:"I'm glad to ___ fried chicken!", a:"eat", h:"glad to + 동사원형 (to부정사의 동사는 원형)"},
  {s:"Dialogue 2", ko:"점심시간이 무척 기다려져.", q:"I can't ___ for lunch break.", a:"wait", h:"can't wait for ~: ~이 무척 기다려지다"},
  {s:"Dialogue 1", ko:"그는 아무것도 먹으려 하지 않아.", q:"He won't eat at ___.", a:"all", h:"not ~ at all: 전혀 ~하지 않다 (강조 부정)"},
  {s:"Dialogue 2", ko:"오늘 점심 메뉴 좀 봐.", q:"___ a look at today's lunch menu.", a:"Take", h:"take a look at: ~을 (한번, 좀) 보다"},
  {s:"Dialogue 5", ko:"온라인으로 계속 연락하자.", q:"Let's keep in ___ online.", a:"touch", h:"keep in touch: 연락하다 / keep in touch with ~: ~와 연락을 유지하다"},
  {s:"Dialogue 6", ko:"새로운 나라로 여행할 기회를 얻게 되어 기뻐.", q:"I'm glad to have a ___ to travel.", a:"chance", h:"have a chance to R: ~할 기회가 있다"},
  {s:"Dialogue 7", ko:"뭔가 의미 있는 것을 그에게 줄 수 있어서 기뻐.", q:"I'm glad to give him something ___.", a:"meaningful", h:"something + 형용사: ~(형용사)한 어떤 것 (형용사가 명사 뒤에 위치)"},
  {s:"Dialogue 4", ko:"엄마가 방과 후에 축구하는 것을 허락하지 않으셔.", q:"My mom won't ___ me play soccer after school.", a:"let", h:"let(사역동사) + 목적어 + 원형부정사 → let me play"},
  {s:"Dialogue 3", ko:"몇몇 학생들이 학교 청소하는 것을 돕고 있어요.", q:"Some students are helping me ___ the school.", a:"clean", h:"help(준사역동사) + 목적어 + 원형부정사(또는 to부정사) → help me clean"},
  {s:"Dialogue 10", ko:"그건 잡채인데, 맛있고 건강에도 좋아.", q:"It's japchae, ___ is delicious and healthy.", a:"which", h:"관계대명사 계속적 용법: , which = and it (선행사: japchae)"},
  {s:"Dialogue 10", ko:"그것이 무엇인지 알고 싶어.", q:"I want to know what it ___.", a:"is", h:"간접의문문: what + 주어 + 동사 어순 (직접의문문과 어순 다름)"},
  {s:"Dialogue 9", ko:"그게 얼마나 높이 날 수 있는지 궁금하다.", q:"I wonder how ___ it can fly.", a:"high", h:"how + 형용사/부사: 얼마나 ~한/하게 (의문부사 how가 부사 high 수식)"},
  {s:"Dialogue 11", ko:"어떤 때보다 행복해.", q:"I'm happier ___ ever.", a:"than", h:"비교급 + than + 비교 대상 (happier than ever: 어느 때보다 더 행복한)"},
  {s:"Dialogue 11", ko:"우리는 정말 재미있을 거야!", q:"We're going ___ have lots of fun!", a:"to", h:"be going to부정사: ~할 예정이다 (가까운 미래 예정)"},
  {s:"Dialogue 11", ko:"그가 너희 팀에 합류하길 바랄게.", q:"I ___ he joins your team.", a:"hope", h:"S hope (that) S + V: ~하기를 바라다"},
  {s:"Dialogue 5", ko:"지훈아, 너 다음 주에 다른 나라로 이사 가지.", q:"Jihun, you're ___ to another country next week.", a:"moving", h:"이동 동사(move)의 현재진행형 → 가까운 미래의 예정 표현"},
  {s:"Dialogue 5", ko:"나는 너를 걱정했어.", q:"I was ___ about you.", a:"worried", h:"be worried about: ~을 걱정하다 (worried: 형용사)"},
  {s:"Dialogue 11", ko:"너도 알다시피, 우리 팀은 선수가 한 명 필요해.", q:"As you ___, my team needs a player.", a:"know", h:"접속사 As: ~하듯이, ~대로 (as you know: 너도 알다시피)"},
  {s:"Dialogue 11", ko:"내가 마침내 VTS 콘서트 표를 4장 예매했어!", q:"I finally ___ four tickets for the VTS concert!", a:"booked", h:"book: 예약하다, 예매하다 (동사로 사용될 때)"},
  {s:"Dialogue 11", ko:"너 해냈구나, 그렇지?", q:"You did it, ___ you?", a:"didn't", h:"부가의문문: 긍정문 뒤 → 부정 부가의문문 / did → didn't"},
  {s:"Dialogue 5", ko:"너희 모두를 많이 그리워할 거야.", q:"I'll miss ___ of you a lot.", a:"all", h:"all of + 목적어: ~모두 / all of you: 너희 모두"},
  {s:"Dialogue 4", ko:"기분이 언짢아 보인다.", q:"You ___ upset.", a:"look", h:"look + 형용사: ~하게 보이다 (감각동사 look, feel, sound, smell, taste)"},
  {s:"Dialogue 8", ko:"드디어 너희 집을 방문하게 되어서 기뻐.", q:"I'm glad to ___ your house finally.", a:"visit", h:"glad to + 동사원형: ~하게 되어 기쁘다 (to부정사 부사적 용법)"},
  {s:"Dialogue 9", ko:"이 드론인데, 우리 할아버지가 내 생일에 보내 주셨어.", q:"It's this drone, ___ our grandpa sent for my birthday.", a:"which", h:"관계대명사 계속적 용법: , which = and it (선행사: this drone)"},
  {s:"Dialogue 6", ko:"나도 슬퍼, 하지만 기쁘기도 해.", q:"I'm sad, too, but I'm also ___.", a:"happy", h:"also: ~또한, 역시 / but I'm also happy: 하지만 기쁘기도 하다"}
];

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let mode = 'order';
const OS = { idx:0, score:0, done:false, submitted:[], userIdx:[], shuffled:[], history:[] };
const SS = { idx:0, score:0, done:false, submitted:[], userAns:[], history:[] };

function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function initAll() {
  OS.idx=0;OS.score=0;OS.done=false;
  OS.submitted=new Array(OQ.length).fill(null);
  OS.userIdx=OQ.map(()=>[]);
  OS.shuffled=OQ.map(q=>shuffle(q.w));
  OS.history=new Array(OQ.length).fill(null);
  SS.idx=0;SS.score=0;SS.done=false;
  SS.submitted=new Array(SQ.length).fill(null);
  SS.userAns=new Array(SQ.length).fill('');
  SS.history=new Array(SQ.length).fill(null);
}

function resetOrder() {
  OS.idx=0;OS.score=0;OS.done=false;
  OS.submitted=new Array(OQ.length).fill(null);
  OS.userIdx=OQ.map(()=>[]);
  OS.shuffled=OQ.map(q=>shuffle(q.w));
  OS.history=new Array(OQ.length).fill(null);
}
function resetSubj() {
  SS.idx=0;SS.score=0;SS.done=false;
  SS.submitted=new Array(SQ.length).fill(null);
  SS.userAns=new Array(SQ.length).fill('');
  SS.history=new Array(SQ.length).fill(null);
}

// ── UPDATE HEADER PILLS ──
function updatePills() {
  const op=document.getElementById('pill-order');
  const sp=document.getElementById('pill-subj');
  const oDone=OS.submitted.filter(x=>x!==null).length;
  const sDone=SS.submitted.filter(x=>x!==null).length;
  op.textContent=`📝 순서 ${oDone?OS.score+'점':'—'} / 30`;
  sp.textContent=`✏️ 주관식 ${sDone?SS.score+'점':'—'} / 30`;
  op.className='score-pill'+(mode==='order'?' active':'');
  sp.className='score-pill'+(mode==='subj'?' active':'');
}

// ══════════════════════════════════════════════════════════
//  TAB
// ══════════════════════════════════════════════════════════
function switchTab(t) {
  mode=t;
  document.getElementById('tab-order').classList.toggle('active',t==='order');
  document.getElementById('tab-subj').classList.toggle('active',t==='subj');
  updatePills();
  render();
}

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function render() {
  const el=document.getElementById('qmain');
  if(mode==='order'){
    el.innerHTML=OS.done ? scoreHTML('order') : orderHTML(OS.idx);
  } else {
    el.innerHTML=SS.done ? scoreHTML('subj') : subjHTML(SS.idx);
  }
  updatePills();
  // auto-focus input in subj
  if(mode==='subj' && !SS.done && SS.submitted[SS.idx]===null){
    const inp=document.getElementById('sinp');
    if(inp) { inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); }
  }
}

// ══════════════════════════════════════════════════════════
//  ORDER RENDER
// ══════════════════════════════════════════════════════════
function orderHTML(qi) {
  const q=OQ[qi];
  const sub=OS.submitted[qi];
  const placed=OS.userIdx[qi];
  const sh=OS.shuffled[qi];
  const placedSet=new Set(placed);
  const total=q.w.length;
  const cnt=placed.length;
  const pct=Math.round(qi/OQ.length*100);
  const correctSent=q.w.join(' ');
  const userSent=placed.map(si=>sh[si]).join(' ');
  const isCorrect=sub!==null && userSent.toLowerCase()===correctSent.toLowerCase();

  // Pool
  let poolInner='';
  sh.forEach((w,si)=>{
    if(!placedSet.has(si)){
      if(sub!==null) poolInner+=`<span class="chip disabled">${w}</span>`;
      else poolInner+=`<span class="chip" onclick="oPlace(${qi},${si})">${w}</span>`;
    }
  });
  if(!poolInner) poolInner=`<span class="chip-empty">✓ 모든 단어를 배치했습니다</span>`;

  // Answer area
  let ansInner='';
  if(placed.length===0){
    ansInner=`<span class="chip-empty">↑ 단어를 클릭해서 순서대로 배치하세요</span>`;
  } else {
    placed.forEach((si,ai)=>{
      const w=sh[si];
      let cls='chip';
      if(sub!==null) cls+= isCorrect ? ' disabled chip-ok' : ' disabled chip-ng';
      else cls+=' placed';
      const click=sub===null ? `onclick="oRemove(${qi},${ai})"` : '';
      ansInner+=`<span class="${cls}" ${click}>${w}</span>`;
    });
  }

  // Feedback
  let fbHTML='';
  if(sub!==null){
    if(isCorrect) fbHTML=`<div class="feedback fb-ok show">✓ 정답! 완벽해요!</div>`;
    else fbHTML=`<div class="feedback fb-ng show">✗ 오답 → 정답: <span class="ans-reveal">${correctSent}</span></div>`;
  }

  // Buttons
  let btns='';
  if(sub===null){
    btns=`<button class="btn primary" onclick="oSubmit(${qi})" ${cnt<total?'disabled':''}>확인 ✓</button>
          <button class="btn ghost" onclick="oClear(${qi})">지우기</button>`;
  } else if(qi<OQ.length-1){
    btns=`<button class="btn primary" onclick="oGo(${qi+1})">다음 →</button>`;
  } else {
    btns=`<button class="btn primary" onclick="oFinish()">결과 보기 →</button>`;
  }

  const warnShow=cnt>0&&cnt<total&&sub===null?' show':'';

  return `
<div class="progress-wrap">
  <div class="progress-row">
    <span class="progress-label">순서 맞추기</span>
    <span class="progress-num">${qi+1} / ${OQ.length} &nbsp;·&nbsp; 정답 ${OS.score}개</span>
  </div>
  <div class="pb"><div class="pb-inner" style="width:${pct}%"></div></div>
</div>
<div class="card">
  <div class="q-scene">${q.s} · Q${qi+1}</div>
  <span class="type-badge badge-order">📝 순서 맞추기</span>
  <div class="q-ko">${q.ko}</div>
  <div class="section-lbl">WORD BANK — 클릭하여 배치</div>
  <div class="word-pool">${poolInner}</div>
  <div class="word-counter">배치: <span class="cnt">${cnt}</span> / <span class="tot">${total}</span>개 &nbsp;·&nbsp; 배치된 단어를 클릭하면 취소됩니다</div>
  <div class="section-lbl">내 답안</div>
  <div class="ans-area">${ansInner}</div>
  <div class="warn-msg${warnShow}">⚠ 단어를 모두 배치해야 확인할 수 있어요 (${cnt}/${total})</div>
  ${fbHTML}
</div>
<div class="nav-row">
  <button class="btn" onclick="oGo(${qi-1})" ${qi===0?'disabled':''}>← 이전</button>
  ${btns}
  <span class="q-counter">${qi+1} / ${OQ.length}</span>
</div>`;
}

function oPlace(qi,si){ OS.userIdx[qi].push(si); render(); }
function oRemove(qi,ai){ OS.userIdx[qi].splice(ai,1); render(); }
function oClear(qi){ OS.userIdx[qi]=[]; render(); }
function oSubmit(qi){
  const sh=OS.shuffled[qi];
  const placed=OS.userIdx[qi];
  if(placed.length<OQ[qi].w.length) return;
  const userSent=placed.map(si=>sh[si]).join(' ');
  OS.submitted[qi]=userSent;
  const correct=userSent.toLowerCase()===OQ[qi].w.join(' ').toLowerCase();
  if(correct) OS.score++;
  OS.history[qi]={user:userSent, correct};
  render();
}
function oGo(qi){ OS.idx=qi; render(); }
function oFinish(){ OS.done=true; render(); }

// ══════════════════════════════════════════════════════════
//  SUBJ RENDER
// ══════════════════════════════════════════════════════════
function subjHTML(qi) {
  const q=SQ[qi];
  const sub=SS.submitted[qi];
  const val=SS.userAns[qi]||'';
  const pct=Math.round(qi/SQ.length*100);
  const correct=sub!==null && val.trim().toLowerCase()===q.a.toLowerCase();

  let inpCls='';
  let fbHTML='';
  if(sub!==null){
    inpCls=correct?'inp-ok':'inp-ng';
    if(correct) fbHTML=`<div class="feedback fb-ok show">✓ 정답! 🎉</div>`;
    else fbHTML=`<div class="feedback fb-ng show">✗ 오답 → 정답: <span class="ans-reveal">${q.a}</span></div>`;
  }

  let btns='';
  if(sub===null){
    btns=`<button class="btn primary" onclick="sSubmit(${qi})">확인 ✓</button>`;
  } else if(qi<SQ.length-1){
    btns=`<button class="btn primary" onclick="sGo(${qi+1})">다음 →</button>`;
  } else {
    btns=`<button class="btn primary" onclick="sFinish()">결과 보기 →</button>`;
  }

  const safeVal=val.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

  return `
<div class="progress-wrap">
  <div class="progress-row">
    <span class="progress-label">주관식</span>
    <span class="progress-num">${qi+1} / ${SQ.length} &nbsp;·&nbsp; 정답 ${SS.score}개</span>
  </div>
  <div class="pb"><div class="pb-inner" style="width:${pct}%"></div></div>
</div>
<div class="card">
  <div class="q-scene">${q.s} · Q${qi+1}</div>
  <span class="type-badge badge-subj">✏️ 주관식 빈칸</span>
  <div class="q-ko">${q.ko}</div>
  <div class="blank-line">${q.q.replace('___','<span class="blank-slot">___</span>')}</div>
  <input class="ans-input ${inpCls}" id="sinp" type="text" value="${safeVal}"
    placeholder="빈칸에 알맞은 단어를 입력하세요" ${sub!==null?'disabled':''}
    oninput="sUpdate(${qi},this.value)"
    onkeydown="if(event.key==='Enter')sSubmit(${qi})"
    autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" />
  <button class="hint-toggle" onclick="toggleHint(this)">💡 힌트 보기</button>
  <div class="hint-box">${q.h}</div>
  ${fbHTML}
</div>
<div class="nav-row">
  <button class="btn" onclick="sGo(${qi-1})" ${qi===0?'disabled':''}>← 이전</button>
  ${btns}
  <span class="q-counter">${qi+1} / ${SQ.length}</span>
</div>`;
}

function toggleHint(btn){
  const box=btn.nextElementSibling;
  box.classList.toggle('show');
  btn.textContent=box.classList.contains('show')?'💡 힌트 숨기기':'💡 힌트 보기';
}
function sUpdate(qi,v){ SS.userAns[qi]=v; }
function sSubmit(qi){
  const v=(SS.userAns[qi]||'').trim();
  if(!v) return;
  SS.submitted[qi]=v;
  const correct=v.toLowerCase()===SQ[qi].a.toLowerCase();
  if(correct) SS.score++;
  SS.history[qi]={user:v,correct};
  render();
}
function sGo(qi){ SS.idx=qi; render(); }
function sFinish(){ SS.done=true; render(); }

// ══════════════════════════════════════════════════════════
//  SCORE SCREEN
// ══════════════════════════════════════════════════════════
function scoreHTML(type) {
  const isOrder=(type==='order');
  const st=isOrder?OS:SS;
  const qs=isOrder?OQ:SQ;
  const score=st.score;
  const total=qs.length;
  const wrong=total-score;
  const pct=Math.round(score/total*100);
  const msg=pct===100?'🎉 만점! 완벽해요!':pct>=80?'👍 훌륭해요!':pct>=60?'🙂 잘했어요!':pct>=40?'📖 조금 더 연습해요!':'📚 본문을 다시 복습해 봐요!';

  // Summary list
  let summaryHTML='';
  st.history.forEach((h,i)=>{
    if(!h) return;
    const ko=qs[i].ko;
    const correctAns=isOrder?OQ[i].w.join(' '):SQ[i].a;
    const cls=h.correct?'s-ok':'s-ng';
    const icon=h.correct?'✅':'❌';
    summaryHTML+=`
    <div class="summary-item ${cls}">
      <span class="s-icon">${icon}</span>
      <div>
        <div class="s-ko">${ko}</div>
        ${!h.correct?`<div class="s-correct-lbl">정답: <span class="s-ans correct">${correctAns}</span></div>`:''}
      </div>
    </div>`;
  });

  return `
<div class="score-screen">
  <div class="score-ring" style="--pct:${pct}">
    <div class="score-inner">
      <div class="score-n">${score}</div>
      <div class="score-d">/ ${total}</div>
    </div>
  </div>
  <div class="score-msg">${msg}</div>
  <div class="score-sub">${isOrder?'순서 맞추기':'주관식'} · 정답률 ${pct}%</div>
  <div class="score-stats">
    <div class="stat-box stat-ok"><div class="stat-n">${score}</div><div class="stat-lbl">정답</div></div>
    <div class="stat-box stat-ng"><div class="stat-n">${wrong}</div><div class="stat-lbl">오답</div></div>
    <div class="stat-box stat-pct"><div class="stat-n">${pct}%</div><div class="stat-lbl">정답률</div></div>
  </div>
  <button class="btn primary" style="margin:0 auto;display:inline-flex" onclick="restart('${type}')">↺ 다시 풀기</button>
</div>
${summaryHTML?`<div class="summary-wrap"><h3>틀린 문제 복습</h3><div class="summary-list">${summaryHTML}</div></div>`:''}`;
}

function restart(type){
  if(type==='order'){resetOrder();switchTab('order');}
  else{resetSubj();switchTab('subj');}
}

// ══════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════
initAll();
render();
</script>
</body>
</html>
