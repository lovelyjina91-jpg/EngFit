<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lesson 1 문법 시험 - Express Your Feelings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0f172a; color: #f1f5f9; font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; min-height: 100vh; }
    .hidden { display: none !important; }

    #s-home {
      min-height: 100vh;
      background: linear-gradient(145deg, #0f172a 0%, #16213e 55%, #0f172a 100%);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .home-inner { max-width: 420px; width: 100%; }
    .home-eyebrow { font-size: 11px; letter-spacing: 5px; color: #475569; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
    .home-title { font-size: 28px; font-weight: 800; color: #f8fafc; text-align: center; line-height: 1.3; margin-bottom: 6px; }
    .home-sub { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 32px; }
    .home-label { font-size: 12px; color: #64748b; margin-bottom: 6px; }
    #inp-name { width: 100%; padding: 14px 16px; font-size: 16px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; outline: none; margin-bottom: 18px; transition: border-color .2s; }
    #inp-name:focus { border-color: #818cf8; }
    .btn-start { width: 100%; padding: 18px; border-radius: 14px; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; }
    .home-info { margin-top: 20px; padding: 14px 18px; border-radius: 12px; background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.15); font-size: 13px; color: #64748b; line-height: 1.9; }
    .topic-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tc { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(99,102,241,0.3); color: #818cf8; }

    #s-quiz { min-height: 100vh; background: #0f172a; }
    .qz-header { position: sticky; top: 0; z-index: 20; background: #1e293b; border-bottom: 1px solid #2d3f55; padding: 10px 16px; }
    .qz-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .qz-qnum { font-size: 13px; color: #64748b; }
    .qz-meta { font-size: 13px; color: #475569; font-variant-numeric: tabular-nums; }
    .prog-track { height: 4px; background: #2d3f55; border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 2px; transition: width .3s; }

    .qz-body { max-width: 440px; margin: 0 auto; padding: 18px 16px 110px; }

    .q-card { background: #1e293b; border-radius: 16px; padding: 20px 18px 16px; margin-bottom: 12px; border: 1px solid #2d3f55; }
    .q-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
    .q-tag { font-size: 12px; color: #818cf8; font-weight: 700; letter-spacing: 1px; flex-shrink: 0; }
    .q-topic { font-size: 11px; color: #818cf8; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: rgba(99,102,241,0.12); }
    .q-grammar { display: none; }
    .q-sentence { font-size: 16px; color: #e2e8f0; line-height: 1.85; word-break: keep-all; white-space: pre-line; }
    .q-note { font-size: 12px; color: #94a3b8; margin-top: 10px; font-style: italic; }

    .opts-wrap { display: grid; gap: 8px; }
    .opts-wrap.cols2 { grid-template-columns: 1fr 1fr; }
    .opts-wrap.cols1 { grid-template-columns: 1fr; }
    .opt-btn { padding: 15px 12px; border-radius: 12px; border: 1.5px solid #334155; background: #1e293b; color: #cbd5e1; font-size: 15px; font-weight: 500; cursor: pointer; transition: all .12s; text-align: center; line-height: 1.4; word-break: keep-all; }
    .opt-btn.sel { border-color: #6366f1; background: rgba(99,102,241,0.13); color: #f1f5f9; font-weight: 700; }
    .ox-o { font-size: 26px; font-weight: 800; padding: 20px; color: #64748b; }
    .ox-x { font-size: 26px; font-weight: 800; padding: 20px; color: #64748b; }
    .ox-o.sel { border-color: #22c55e; background: rgba(34,197,94,0.1); color: #22c55e; }
    .ox-x.sel { border-color: #ef4444; background: rgba(239,68,68,0.1); color: #ef4444; }

    .qz-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a2438; border-top: 1px solid #2d3f55; padding: 12px 16px; display: flex; gap: 8px; }
    .btn-prev { flex: 0 0 auto; padding: 13px 16px; border-radius: 10px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-prev:disabled { color: #334155; border-color: #253047; cursor: default; }
    .btn-next { flex: 1; padding: 13px; border-radius: 10px; border: none; background: #6366f1; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-submit { flex: 0 0 auto; padding: 13px 14px; border-radius: 10px; border: none; background: #16a34a; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: #1e293b; border-radius: 20px; padding: 28px 24px; max-width: 360px; width: 100%; border: 1px solid #334155; }
    .modal h3 { font-size: 18px; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
    .modal-warn { font-size: 14px; color: #f97316; margin-bottom: 10px; }
    .modal-desc { font-size: 14px; color: #64748b; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 8px; }
    .btn-mc { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #475569; background: transparent; color: #e2e8f0; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-mo { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #16a34a; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }

    #s-result { min-height: 100vh; background: #0f172a; padding: 20px 16px; }
    .res-inner { max-width: 440px; margin: 0 auto; padding-top: 16px; padding-bottom: 32px; }
    .score-card { background: #1e293b; border-radius: 20px; padding: 30px 24px; text-align: center; margin-bottom: 16px; border: 1px solid #2d3f55; }
    .sc-label { font-size: 12px; color: #475569; letter-spacing: 2px; margin-bottom: 4px; }
    .sc-name { font-size: 18px; color: #e2e8f0; font-weight: 700; margin-bottom: 14px; }
    .sc-grade { font-size: 64px; font-weight: 800; line-height: 1; }
    .sc-score { font-size: 38px; font-weight: 700; color: #f8fafc; margin-top: 8px; }
    .sc-denom { font-size: 20px; color: #475569; }
    .sc-pct { font-size: 15px; color: #64748b; margin-top: 4px; }
    .sc-bar { margin: 18px auto 0; width: 180px; height: 10px; background: #2d3f55; border-radius: 5px; overflow: hidden; }
    .sc-bar-fill { height: 100%; border-radius: 5px; }

    .topic-summary { background: #1e293b; border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; border: 1px solid #2d3f55; }
    .ts-title { font-size: 13px; font-weight: 700; color: #94a3b8; margin-bottom: 12px; }
    .ts-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(30,58,92,.3); }
    .ts-row:last-child { border-bottom: none; }
    .ts-topic { font-size: 13px; color: #cbd5e1; }
    .ts-score { font-size: 13px; font-weight: 700; }

    .btn-copy-toggle { width: 100%; padding: 15px; border-radius: 14px; border: none; background: #d97706; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; margin-bottom: 14px; }
    #copy-area { margin-bottom: 14px; }
    .copy-tip { font-size: 12px; color: #d97706; margin-bottom: 7px; font-weight: 600; }
    #copy-ta { width: 100%; min-height: 160px; padding: 14px; font-size: 13px; border-radius: 12px; border: 1px solid rgba(217,119,6,.35); background: #0a1628; color: #e2e8f0; font-family: monospace; line-height: 1.65; resize: none; outline: none; }

    .wrong-card { background: #1e293b; border-radius: 16px; padding: 20px; border: 1px solid #2d3f55; margin-bottom: 16px; }
    .wc-title { font-size: 15px; font-weight: 700; color: #f87171; margin-bottom: 12px; }
    .wi { padding: 13px 14px; border-radius: 10px; margin-bottom: 8px; background: rgba(0,0,0,.3); }
    .wi-topic { font-size: 11px; color: #818cf8; font-weight: 600; margin-bottom: 5px; }
    .wi-sent { font-size: 13px; color: #94a3b8; margin-bottom: 8px; line-height: 1.65; white-space: pre-line; }
    .wi-ans-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
    .wi-yours { font-size: 13px; color: #f87171; }
    .wi-arr { font-size: 13px; color: #475569; }
    .wi-correct { font-size: 13px; color: #4ade80; font-weight: 700; }
    .wi-corrform { font-size: 12px; color: #34d399; margin-bottom: 5px; }
    .wi-exp { font-size: 12px; color: #64748b; line-height: 1.55; }
    .wi-exp-rule { font-size: 13px; color: #94a3b8; font-weight: 600; margin-bottom: 6px; line-height: 1.5; }
    .wi-exp-examples { margin-top: 8px; }
    .wi-exp-ex { font-size: 12px; color: #64748b; line-height: 1.6; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .wi-exp-ex:last-child { border-bottom: none; }
    .wi-exp-ex b { color: #818cf8; }

    .res-btns { display: flex; gap: 8px; }
    .btn-home { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #475569; background: transparent; color: #e2e8f0; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-retry { flex: 1; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>

<div id="s-home">
  <div class="home-inner">
    <div class="home-eyebrow">Lesson 1 · Express Your Feelings</div>
    <div class="home-title">문법 시험</div>
    <div class="home-sub" id="home-sub">문법 36문항 · 선택형</div>
    <div class="home-label">이름</div>
    <input id="inp-name" type="text" placeholder="이름을 입력하세요" autocomplete="off">
    <button class="btn-start" onclick="startQuiz()">시험 시작</button>
    <div class="home-info">
      · 간접의문문 · 현재/과거분사 · with분사구 · 관계대명사
      <div class="topic-chips">
        <span class="tc">O/X 어법 판단</span>
        <span class="tc">2지선다 선택</span>
        <span class="tc">오답 해설 제공</span>
        <span class="tc">영역별 결과</span>
      </div>
    </div>
  </div>
</div>

<div id="s-quiz" class="hidden">
  <div class="qz-header">
    <div class="qz-header-row">
      <span class="qz-qnum" id="qz-qnum">1 / 36</span>
      <span class="qz-meta" id="qz-meta">0:00 · 0개 응답</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="qz-body">
    <div class="q-card">
      <div class="q-top">
        <span class="q-tag" id="q-tag">Q1</span>
        <span class="q-topic" id="q-topic"></span>
      </div>
      <div class="q-grammar" id="q-grammar"></div>
      <div class="q-sentence" id="q-sentence"></div>
      <div class="q-note hidden" id="q-note"></div>
    </div>
    <div id="opts-container"></div>
  </div>
  <div class="qz-footer">
    <button class="btn-prev" id="btn-prev" onclick="goPrev()" disabled>이전</button>
    <button class="btn-next" id="btn-next" onclick="goNext()">다음</button>
    <button class="btn-submit" onclick="openConfirm()">제출 <span id="ans-count">0</span>/<span id="total-count">36</span></button>
  </div>
</div>

<div class="overlay hidden" id="modal">
  <div class="modal">
    <h3>시험을 제출할까요?</h3>
    <div class="modal-warn hidden" id="modal-warn"></div>
    <div class="modal-desc">제출하면 답을 수정할 수 없습니다.</div>
    <div class="modal-btns">
      <button class="btn-mc" onclick="closeConfirm()">돌아가기</button>
      <button class="btn-mo" onclick="finishQuiz()">제출하기</button>
    </div>
  </div>
</div>

<div id="s-result" class="hidden">
  <div class="res-inner">
    <div class="score-card">
      <div class="sc-label">LESSON 1 · 문법 시험</div>
      <div class="sc-name hidden" id="sc-name"></div>
      <div class="sc-grade" id="sc-grade"></div>
      <div class="sc-score"><span id="sc-correct"></span><span class="sc-denom" id="sc-denom"></span></div>
      <div class="sc-pct" id="sc-pct"></div>
      <div class="sc-bar"><div class="sc-bar-fill" id="sc-bar-fill"></div></div>
    </div>
    <div class="topic-summary" id="topic-summary"></div>
    <button class="btn-copy-toggle" id="btn-copy" onclick="showCopy()">📋 카톡 전송용 텍스트 보기</button>
    <div id="copy-area" class="hidden">
      <div class="copy-tip">꾹 눌러서 전체선택 → 복사 → 카톡 붙여넣기</div>
      <textarea id="copy-ta" readonly onfocus="this.select()"></textarea>
    </div>
    <div class="wrong-card hidden" id="wrong-card">
      <div class="wc-title" id="wc-title"></div>
      <div id="wrong-list"></div>
    </div>
    <div class="res-btns">
      <button class="btn-home" onclick="goHome()">처음으로</button>
      <button class="btn-retry" onclick="startQuiz()">다시 풀기</button>
    </div>
  </div>
</div>

<script>
const Q = [
  // 간접의문문 O/X
  { topic:"간접의문문", grammar:"", type:"ox",
    sent:"Could you tell me where the nearest subway station is?",
    note:"이 문장의 어법이 맞으면 O, 틀리면 X", answer:0, cf:null,
    exp:`<div class="wi-exp-rule">✓ 올바른 문장입니다.<br>간접의문문 어순: 의문사 + 주어 + 동사 (평서문 어순)</div><div class="wi-exp-examples"><div class="wi-exp-ex">1. Could you tell me <b>where the station is</b>? (O) ← 의문사+주어+동사</div><div class="wi-exp-ex">2. Do you know <b>what time it starts</b>? (O)</div><div class="wi-exp-ex">3. I wonder <b>who she is</b>. (O)</div><div class="wi-exp-ex">4. She asked me <b>where I lived</b>. (O)</div><div class="wi-exp-ex">5. Tell me <b>why you are late</b>. (O)</div></div>` },
  { topic:"간접의문문", grammar:"", type:"ox",
    sent:"I don't know why did she leave the meeting early.",
    note:"이 문장의 어법이 맞으면 O, 틀리면 X", answer:1, cf:"→ I don't know why she left the meeting early.",
    exp:`<div class="wi-exp-rule">✗ 틀린 문장입니다.<br>간접의문문에서는 조동사 did를 쓰지 않습니다. "did + 동사원형"을 "동사 과거형"으로 바꿔야 합니다.</div><div class="wi-exp-examples"><div class="wi-exp-ex">1. I don't know why <b>did she leave</b>. (✗) → why <b>she left</b>. (✓)</div><div class="wi-exp-ex">2. Do you know where <b>did he go</b>? (✗) → where <b>he went</b>? (✓)</div><div class="wi-exp-ex">3. She wonders what <b>did I say</b>. (✗) → what <b>I said</b>. (✓)</div><div class="wi-exp-ex">4. Tell me when <b>did the bus arrive</b>. (✗) → when <b>the bus arrived</b>. (✓)</div><div class="wi-exp-ex">5. I wonder how <b>did they find it</b>. (✗) → how <b>they found it</b>. (✓)</div></div>` },
  { topic:"간접의문문", grammar:"", type:"ox",
    sent:"Do you remember what time the movie starts?",
    note:"이 문장의 어법이 맞으면 O, 틀리면 X", answer:0, cf:null,
    exp:`<div class="wi-exp-rule">✓ 올바른 문장입니다.<br>간접의문문 어순: 의문사(구) + 주어 + 동사. "what time"이 의문사구로 쓰였습니다.</div><div class="wi-exp-examples"><div class="wi-exp-ex">1. Do you know <b>what time the store closes</b>? (O)</div><div class="wi-exp-ex">2. I wonder <b>how long the trip takes</b>. (O)</div><div class="wi-exp-ex">3. She asked me <b>which bus I should take</b>. (O)</div><div class="wi-exp-ex">4. Nobody knows <b>how many people were there</b>. (O)</div><div class="wi-exp-ex">5. He asked <b>whose bag this was</b>. (O)</div></div>` },
  { topic:"간접의문문", grammar:"", type:"ox",
    sent:"Why you didn't answer my message yesterday?",
    note:"이 문장의 어법이 맞으면 O, 틀리면 X", answer:1, cf:"→ Why didn't you answer my message yesterday?",
    exp:`<div class="wi-exp-rule">✗ 틀린 문장입니다.<br>이것은 직접의문문으로, 어순은 "의문사 + 조동사 + 주어 + 동사"여야 합니다.</div><div class="wi-exp-examples"><div class="wi-exp-ex">1. Why <b>you didn't come</b>? (✗) → Why <b>didn't you come</b>? (✓)</div><div class="wi-exp-ex">2. Where <b>she is going</b>? (✗) → Where <b>is she going</b>? (✓)</div><div class="wi-exp-ex">3. What <b>he wants</b>? (✗) → What <b>does he want</b>? (✓)</div><div class="wi-exp-ex">4. How <b>you solved this</b>? (✗) → How <b>did you solve this</b>? (✓)</div><div class="wi-exp-ex">5. When <b>they arrived</b>? (✗) → When <b>did they arrive</b>? (✓)</div></div>` },
  { topic:"간접의문문", grammar:"", type:"binary",
    sent:"When does the school festival start? (직접)\n→ Do you know when the school festival ___?",
    options:["does start","starts"], answer:1, cf:null,
    exp:`<div class="wi-exp-rule">간접의문문에서는 조동사 does를 제거하고, 동사에 -s를 붙입니다.<br>"does + 동사원형" → "동사-s"</div><div class="wi-exp-examples"><div class="wi-exp-ex">1. When does it open? → Do you know when it <b>opens</b>?</div><div class="wi-exp-ex">2. Where does she live? → I wonder where she <b>lives</b>.</div><div class="wi-exp-ex">3. What does he want? → Tell me what he <b>wants</b>.</div><div class="wi-exp-ex">4. How does it work? → Do you know how it <b>works</b>?</div><div class="wi-exp-ex">5. Why does the sky look red? → She explained why the sky <b>looks</b> red.</div></div>` },
  { topic:"간접의문문", grammar:"", type:"binary",
    sent:"What is the capital of France? (직접)\n→ Everybody knows what the capital of France ___.",
    options:["does","is"], answer:1, cf:null,
    exp:`<div class="wi-exp-rule">be동사가 있는 의문문을 간접의문문으로 바꿀 때: "의문사 + be동사 + 주어?" → "의문사 + 주어 + be동사"<br>be동사를 주어 뒤로 이동시킵니다.</div><div class="wi-exp-examples"><div class="wi-exp-ex">1. What is her name? → I know what her name <b>is</b>.</div><div class="wi-exp-ex">2. Where is the bus stop? → Do you know where the bus stop <b>is</b>?</div><div class="wi-exp-ex">3. Who is that man? → I wonder who that man <b>is</b>.</div><div class="wi-exp-ex">4. How old is she? → Tell me how old she <b>is</b>.</div><div class="wi-exp-ex">5. When is the exam? → He asked me when the exam <b>was</b>.</div></div>` },
  { topic:"간접의문문", grammar:"", type:"binary",
    sent:"Why is the sky blue? (직접)\n→ She explains ___ the sky is blue.",
    options:["why","what"], answer:0, cf:null,
    exp:`<div class="wi-exp-rule">의문사는 그 문장이 묻고 있는 내용에 따라 결정됩니다. why는 이유, what은 무엇, where는 장소, when은 시간, how는 방법.</div><div class="wi-exp-examples"><div class="wi-exp-ex">1. Why does it rain? → She explains <b>why</b> it rains. (이유)</div><div class="wi-exp-ex">2. What is he doing? → I wonder <b>what</b> he is doing. (무엇)</div><div class="wi-exp-ex">3. Where do they live? → I know <b>where</b> they live. (장소)</div><div class="wi-exp-ex">4. When did she leave? → He told me <b>when</b> she left. (시간)</div><div class="wi-exp-ex">5. How does this work? → Show me <b>how</b> this works. (방법)</div></div>` },
  { topic:"간접의문문", grammar:"", type:"binary",

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let questions=[], curQ=0, userAnswers={}, startTime=null, timerID=null, playerName="";

function show(id) {
  ['s-home','s-quiz','s-result'].forEach(s =>
    document.getElementById(s).classList.toggle('hidden', s !== id));
}

function startQuiz() {
  playerName = document.getElementById('inp-name').value.trim();
  questions = shuffle(Q);
  curQ = 0; userAnswers = {};
  clearInterval(timerID);
  startTime = Date.now();
  timerID = setInterval(updateMeta, 1000);
  document.getElementById('total-count').textContent = questions.length;
  show('s-quiz'); renderQ();
}

function renderQ() {
  const q = questions[curQ], total = questions.length;
  document.getElementById('qz-qnum').textContent = `${curQ+1} / ${total}`;
  document.getElementById('q-tag').textContent = `Q${curQ+1}`;
  document.getElementById('q-topic').textContent = q.topic;
  document.getElementById('q-grammar').textContent = q.grammar;
  document.getElementById('q-sentence').textContent = q.sent;
  const ne = document.getElementById('q-note');
  if (q.note) { ne.textContent = q.note; ne.classList.remove('hidden'); }
  else ne.classList.add('hidden');

  const container = document.getElementById('opts-container');
  container.innerHTML = '';
  const wrap = document.createElement('div');

  if (q.type === 'ox') {
    wrap.className = 'opts-wrap cols2';
    [['O','ox-o',0],['X','ox-x',1]].forEach(([lbl,cls,idx]) => {
      const btn = document.createElement('button');
      btn.className = `opt-btn ${cls}${userAnswers[curQ]===idx?' sel':''}`;
      btn.textContent = lbl;
      btn.onclick = () => selectAnswer(idx);
      wrap.appendChild(btn);
    });
  } else {
    const long = q.options.some(o => o.length > 10);
    wrap.className = `opts-wrap ${long ? 'cols1' : 'cols2'}`;
    q.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = `opt-btn${userAnswers[curQ]===idx?' sel':''}`;
      btn.textContent = opt;
      btn.onclick = () => selectAnswer(idx);
      wrap.appendChild(btn);
    });
  }
  container.appendChild(wrap);

  const answered = Object.keys(userAnswers).length;
  document.getElementById('prog-fill').style.width = `${answered/total*100}%`;
  document.getElementById('btn-prev').disabled = curQ === 0;
  document.getElementById('btn-next').textContent = curQ < total-1 ? '다음' : '마지막 문제';
  document.getElementById('ans-count').textContent = answered;
  window.scrollTo(0,0);
}

function selectAnswer(idx) { userAnswers[curQ] = idx; renderQ(); }
function goNext() { if (curQ < questions.length-1) { curQ++; renderQ(); } }
function goPrev() { if (curQ > 0) { curQ--; renderQ(); } }

function updateMeta() {
  const s = Math.floor((Date.now()-startTime)/1000);
  const mm = Math.floor(s/60), ss = String(s%60).padStart(2,'0');
  document.getElementById('qz-meta').textContent =
    `${mm}:${ss} · ${Object.keys(userAnswers).length}개 응답`;
}

function openConfirm() {
  const un = questions.length - Object.keys(userAnswers).length;
  const we = document.getElementById('modal-warn');
  if (un > 0) { we.textContent=`아직 ${un}문제를 풀지 않았습니다.`; we.classList.remove('hidden'); }
  else we.classList.add('hidden');
  document.getElementById('modal').classList.remove('hidden');
}
function closeConfirm() { document.getElementById('modal').classList.add('hidden'); }

function getLabel(q, idx) {
  if (idx===undefined) return '미응답';
  if (q.type==='ox') return idx===0 ? 'O' : 'X';
  return q.options[idx];
}

function finishQuiz() {
  clearInterval(timerID); closeConfirm();
  const timeSec = Math.floor((Date.now()-startTime)/1000);
  const timeStr = `${Math.floor(timeSec/60)}분 ${timeSec%60}초`;
  let correct=0; const wrongs=[], topicStats={};

  questions.forEach((q,i) => {
    if (!topicStats[q.topic]) topicStats[q.topic]={total:0,correct:0};
    topicStats[q.topic].total++;
    const ua = userAnswers[i];
    if (ua!==undefined && ua===q.answer) { correct++; topicStats[q.topic].correct++; }
    else wrongs.push({q, userAns:ua});
  });

  const total=questions.length, pct=Math.round(correct/total*100);
  let grade,gc;
  if (pct>=95){grade='A+';gc='#22c55e';}else if(pct>=90){grade='A';gc='#4ade80';}
  else if(pct>=85){grade='B+';gc='#3b82f6';}else if(pct>=80){grade='B';gc='#60a5fa';}
  else if(pct>=70){grade='C';gc='#f97316';}else{grade='D';gc='#ef4444';}

  const ne=document.getElementById('sc-name');
  if(playerName){ne.textContent=playerName;ne.classList.remove('hidden');}else ne.classList.add('hidden');
  const ge=document.getElementById('sc-grade'); ge.textContent=grade; ge.style.color=gc;
  document.getElementById('sc-correct').textContent=correct;
  document.getElementById('sc-denom').textContent=`/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}% · ${timeStr}`;
  const bf=document.getElementById('sc-bar-fill'); bf.style.width=`${pct}%`; bf.style.background=gc;

  // Topic summary
  const ts=document.getElementById('topic-summary');
  ts.innerHTML='<div class="ts-title">📊 영역별 결과</div>';
  Object.entries(topicStats).forEach(([topic,s]) => {
    const p=Math.round(s.correct/s.total*100);
    const c=p>=80?'#4ade80':p>=60?'#f97316':'#f87171';
    const row=document.createElement('div'); row.className='ts-row';
    row.innerHTML=`<span class="ts-topic">${topic}</span><span class="ts-score" style="color:${c}">${s.correct}/${s.total} (${p}%)</span>`;
    ts.appendChild(row);
  });

  // Copy text
  const date=new Date().toLocaleDateString('ko-KR');
  let txt=`[Lesson 1 문법 시험]\n`;
  txt+=`${playerName?playerName+' | ':''}${date}\n`;
  txt+=`${correct}/${total} (${pct}%) | ${timeStr}\n\n[영역별]\n`;
  Object.entries(topicStats).forEach(([t,s])=>{txt+=`· ${t}: ${s.correct}/${s.total}\n`;});
  if(wrongs.length>0){
    txt+=`\n[오답 ${wrongs.length}개]\n`;
    wrongs.forEach((w,i)=>{
      txt+=`${i+1}. [${w.q.topic}] ${getLabel(w.q,w.userAns)} → 정답: ${getLabel(w.q,w.q.answer)}\n`;
    });
  } else txt+=`\n만점! 전부 정답! 🎉`;
  document.getElementById('copy-ta').value=txt;

  // Wrong list
  const wc=document.getElementById('wrong-card');
  if(wrongs.length>0){
    wc.classList.remove('hidden');
    document.getElementById('wc-title').textContent=`오답 목록 (${wrongs.length}개)`;
    const wl=document.getElementById('wrong-list'); wl.innerHTML='';
    wrongs.forEach(w=>{
      const div=document.createElement('div'); div.className='wi';
      const cf=w.q.cf?`<div class="wi-corrform">${w.q.cf}</div>`:'';
      div.innerHTML=`<div class="wi-topic">${w.q.topic}</div>
        <div class="wi-sent">${w.q.sent}</div>
        <div class="wi-ans-row">
          <span class="wi-yours">✗ ${getLabel(w.q,w.userAns)}</span>
          <span class="wi-arr">→</span>
          <span class="wi-correct">✓ ${getLabel(w.q,w.q.answer)}</span>
        </div>${cf}<div class="wi-exp">${w.q.exp}</div>`;
      wl.appendChild(div);
    });
  } else wc.classList.add('hidden');

  document.getElementById('copy-area').classList.add('hidden');
  document.getElementById('btn-copy').classList.remove('hidden');
  show('s-result'); window.scrollTo(0,0);
}

function showCopy() {
  document.getElementById('btn-copy').classList.add('hidden');
  document.getElementById('copy-area').classList.remove('hidden');
  setTimeout(()=>{const ta=document.getElementById('copy-ta');ta.focus();ta.select();},100);
}

function goHome() { show('s-home'); }
document.getElementById('home-sub').textContent=`문법 ${Q.length}문항 · 선택형`;
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
</body>
</html>
