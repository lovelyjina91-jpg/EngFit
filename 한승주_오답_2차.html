<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>영핏 영어 - 한승주 오답 2차</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2550;
    --gold: #D4A843;
    --green: #27ae60;
    --red: #e74c3c;
    --light-bg: #f0f3fb;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --sub: #6b7280;
    --border: #e2e8f0;
    --radius: 16px;
    --shadow: 0 4px 20px rgba(26,37,80,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--light-bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* HEADER */
  .header {
    background: var(--navy);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo { height: 38px; filter: brightness(0) invert(1); }
  .header-title { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.2; }
  .header-title span { display: block; font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.7); margin-top: 1px; }
  .q-counter {
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
  }

  /* PROGRESS */
  .progress-bar-wrap {
    background: rgba(255,255,255,0.2);
    height: 4px;
    width: 100%;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.4s ease;
  }

  /* MAIN */
  .main { padding: 16px; max-width: 560px; margin: 0 auto; }

  /* SECTION BADGE */
  .section-badge {
    display: inline-block;
    background: var(--navy);
    color: var(--gold);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
    display: none;
  }
  .q-card.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .q-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--sub);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .q-type-label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .q-type-mc { background: #e8f0fe; color: #1a2550; }
  .q-type-sa { background: #fff3cd; color: #856404; }

  .q-text {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 14px;
    color: var(--text);
  }

  /* PASSAGE */
  .passage {
    background: #f8f9ff;
    border-left: 3px solid var(--navy);
    border-radius: 0 10px 10px 0;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.8;
    color: #333;
    white-space: pre-line;
  }
  .passage b { color: var(--navy); }

  /* TABLE */
  .q-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 14px;
    font-size: 13px;
  }
  .q-table th {
    background: var(--navy);
    color: #fff;
    padding: 7px 10px;
    text-align: center;
    font-weight: 700;
    font-size: 12px;
  }
  .q-table td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: center;
  }
  .q-table tr:nth-child(even) td { background: #f8f9ff; }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: var(--light-bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    color: var(--text);
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }
  .option-btn:active { transform: scale(0.98); }
  .option-btn:hover:not(:disabled) { border-color: var(--navy); background: #e8ecf8; }
  .option-btn .opt-num {
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    flex-shrink: 0;
    margin-top: 0px;
  }
  .option-btn.correct { background: #d4edda; border-color: var(--green); color: #155724; }
  .option-btn.correct .opt-num { background: var(--green); }
  .option-btn.wrong { background: #f8d7da; border-color: var(--red); color: #721c24; }
  .option-btn.wrong .opt-num { background: var(--red); }
  .option-btn.reveal-correct { background: #d4edda; border-color: var(--green); color: #155724; opacity: 0.8; }
  .option-btn.reveal-correct .opt-num { background: var(--green); }
  .option-btn:disabled { cursor: default; }

  /* SHORT ANSWER */
  .sa-wrap { display: flex; flex-direction: column; gap: 12px; }
  .sa-row { display: flex; flex-direction: column; gap: 6px; }
  .sa-label { font-size: 13px; font-weight: 700; color: var(--navy); }
  .sa-input-row { display: flex; gap: 8px; }
  .sa-input {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: var(--light-bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .sa-input:focus { border-color: var(--navy); background: #fff; }
  .sa-input.correct { border-color: var(--green); background: #d4edda; color: #155724; }
  .sa-input.wrong { border-color: var(--red); background: #f8d7da; color: #721c24; }
  .sa-check-btn {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .sa-check-btn:hover { background: #2a3a7a; }
  .sa-check-btn:disabled { background: #aaa; cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #d4edda; border: 1px solid var(--green); color: #155724; }
  .feedback.wrong-fb { background: #f8d7da; border: 1px solid var(--red); color: #721c24; }
  .feedback .fb-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
  .feedback .fb-answer { font-weight: 700; color: var(--navy); }
  .feedback .fb-exp { color: #444; margin-top: 6px; font-size: 12.5px; }

  /* NEXT BTN */
  .next-btn {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 14px;
    display: none;
    transition: background 0.2s, transform 0.1s;
  }
  .next-btn:active { transform: scale(0.98); }
  .next-btn.show { display: block; }
  .next-btn:hover { background: #2a3a7a; }

  /* RESULT */
  #result-screen {
    display: none;
    padding: 20px;
    max-width: 560px;
    margin: 0 auto;
    animation: fadeIn 0.5s ease;
  }
  #result-screen.show { display: block; }
  .result-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 20px;
  }
  .result-emoji { font-size: 56px; margin-bottom: 12px; }
  .result-name { font-size: 16px; font-weight: 700; color: var(--sub); margin-bottom: 4px; }
  .result-grade {
    font-size: 42px;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    margin: 10px 0 4px;
  }
  .result-score-text { font-size: 15px; color: var(--sub); font-weight: 500; }
  .result-bar-wrap { background: var(--border); border-radius: 8px; height: 10px; margin: 18px 0 10px; overflow: hidden; }
  .result-bar-fill { height: 100%; border-radius: 8px; transition: width 1s ease 0.3s; }

  .review-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--navy);
  }
  .review-item {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-left: 4px solid var(--border);
  }
  .review-item.r-correct { border-left-color: var(--green); }
  .review-item.r-wrong { border-left-color: var(--red); }
  .review-item-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .review-q-num {
    font-size: 11px;
    font-weight: 700;
    background: var(--navy);
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .review-result-icon { font-size: 16px; }
  .review-q-text { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .review-answer { font-size: 12px; color: var(--sub); }
  .review-answer span { font-weight: 700; color: var(--navy); }

  .retry-btn {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 8px;
  }
  .retry-btn:hover { background: #2a3a7a; }

  /* INTRO */
  #intro-screen {
    padding: 24px 20px;
    max-width: 560px;
    margin: 0 auto;
  }
  .intro-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .intro-logo { height: 60px; margin-bottom: 20px; }
  .intro-title { font-size: 20px; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
  .intro-sub { font-size: 14px; color: var(--sub); margin-bottom: 20px; }
  .intro-info {
    background: var(--light-bg);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    text-align: left;
  }
  .intro-info-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .intro-info-row:last-child { border-bottom: none; }
  .intro-info-row .label { color: var(--sub); font-weight: 500; }
  .intro-info-row .value { font-weight: 700; color: var(--navy); }
  .start-btn {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #2a3a7a; }
</style>

    explanation: "Bailey의 계획은 Jin이 스마트폰에서 관심을 돌려 자신과 놀아주게 하려는 것이었다. '그녀가 폰을 내려놓았고, 우리는 동네를 산책했다'고 했으므로 계획이 성공했음을 알 수 있다."

    passage: `• I'm really _______ learning foreign languages these days.
• My brother is _______ playing online games, so he spends a lot of time on his computer.`,

    explanation: "둘 다 빈칸 뒤에 관심 있는 대상, 폭 빠진 대상이 있으므로 '~에 폭 빠지다(be into)'를 완성하는 into가 들어가야 한다."

let current = 0;
let score = 0;
let results = [];

function startQuiz() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion(0);
  updateHeader();
}

function updateHeader() {
  document.getElementById('q-counter').textContent = current + '/' + questions.length;
  document.getElementById('progress-bar').style.width = (current / questions.length * 100) + '%';
}

function renderQuestion(idx) {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  const q = questions[idx];
  
  const card = document.createElement('div');
  card.className = 'q-card active';
  card.id = 'qcard-' + idx;
  
  let html = `
    <div class="section-badge">${q.section}</div>
    <div class="q-num">문제 ${idx+1} / ${questions.length}
      <span class="q-type-label ${q.type === 'mc' ? 'q-type-mc' : 'q-type-sa'}">${q.type === 'mc' ? '객관식' : '주관식'}</span>
    </div>
    <div class="q-text">${q.num}. ${q.text}</div>
  `;
  
  if (q.passage) {
    html += `<div class="passage">${q.passage}</div>`;
  }
  
  if (q.type === 'mc') {
    html += '<div class="options">';
    q.options.forEach((opt, i) => {
      html += `<button class="option-btn" onclick="checkMC(${idx}, ${i})" id="opt-${idx}-${i}">
        <span class="opt-num">${i+1}</span>
        <span>${opt}</span>
      </button>`;
    });
    html += '</div>';
  } else {
    // Short answer
    html += '<div class="sa-wrap">';
    q.parts.forEach((part, pi) => {
      html += `<div class="sa-row">
        <div class="sa-label">${part.label}</div>
        <div class="sa-input-row">
          <input type="text" class="sa-input" id="sa-input-${idx}-${pi}" placeholder="${part.placeholder}" onkeydown="handleSAKey(event, ${idx})">
        </div>
      </div>`;
    });
    html += `</div>
    <button class="sa-check-btn" id="sa-check-${idx}" onclick="checkSA(${idx})" style="margin-top:12px;width:100%;">정답 확인</button>`;
  }
  
  html += `<div class="feedback" id="feedback-${idx}"></div>`;
  html += `<button class="next-btn" id="next-btn-${idx}" onclick="nextQuestion(${idx})">다음 문제 →</button>`;
  
  card.innerHTML = html;
  container.appendChild(card);
  
  // Set focus on first SA input
  if (q.type === 'sa') {
    setTimeout(() => {
      const inp = document.getElementById(`sa-input-${idx}-0`);
      if (inp) inp.focus();
    }, 300);
  }
}

function handleSAKey(event, idx) {
  if (event.key === 'Enter') {
    const btn = document.getElementById(`sa-check-${idx}`);
    if (btn && !btn.disabled) checkSA(idx);
  }
}

function checkMC(qIdx, chosen) {
  const q = questions[qIdx];
  const isCorrect = chosen === q.answer;
  
  // Disable all buttons
  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`opt-${qIdx}-${i}`);
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('reveal-correct');
  }
  
  const chosenBtn = document.getElementById(`opt-${qIdx}-${chosen}`);
  chosenBtn.classList.remove('reveal-correct');
  chosenBtn.classList.add(isCorrect ? 'correct' : 'wrong');
  
  showFeedback(qIdx, isCorrect, q);
  if (isCorrect) score++;
  results.push({ num: q.num, correct: isCorrect, type: 'mc', text: q.text });
  
  document.getElementById(`next-btn-${qIdx}`).classList.add('show');
  updateHeader();
}

function checkSA(qIdx) {
  const q = questions[qIdx];
  let allCorrect = true;
  let anyWrong = false;
  
  q.parts.forEach((part, pi) => {
    const input = document.getElementById(`sa-input-${qIdx}-${pi}`);
    const userVal = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
    const correctVal = part.answer.toLowerCase();
    const isCorrect = userVal === correctVal;
    if (!isCorrect) { allCorrect = false; anyWrong = true; }
    input.classList.add(isCorrect ? 'correct' : 'wrong');
    input.disabled = true;
  });
  
  document.getElementById(`sa-check-${qIdx}`).disabled = true;
  
  showFeedback(qIdx, allCorrect, q);
  if (allCorrect) score++;
  results.push({ num: q.num, correct: allCorrect, type: 'sa', text: q.text });
  
  document.getElementById(`next-btn-${qIdx}`).classList.add('show');
  updateHeader();
}

function showFeedback(qIdx, isCorrect, q) {
  const fb = document.getElementById(`feedback-${qIdx}`);
  fb.classList.add('show');
  
  let answerText = '';
  if (q.type === 'mc') {
    answerText = `정답: ${q.answer + 1}번 — ${q.options[q.answer]}`;
  } else {
    answerText = '정답: ' + q.parts.map((p, i) => `${p.label} ${p.answer}`).join(' / ');
  }
  
  if (isCorrect) {
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `<div class="fb-title">✅ 정답입니다!</div>
      <div class="fb-exp">${q.explanation}</div>`;
  } else {
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `<div class="fb-title">❌ 틀렸습니다</div>
      <div class="fb-answer">${answerText}</div>
      <div class="fb-exp">${q.explanation}</div>`;
  }
}

function nextQuestion(idx) {
  current = idx + 1;
  updateHeader();
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion(current);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');
  
  const pct = Math.round(score / questions.length * 100);
  
  let grade, emoji, color;
  if (pct >= 90) { grade = '최우수'; emoji = '🌟'; color = '#D4A843'; }
  else if (pct >= 70) { grade = '우수'; emoji = '😊'; color = '#27ae60'; }
  else if (pct >= 50) { grade = '보통'; emoji = '💪'; color = '#2196F3'; }
  else { grade = '계속 도전!'; emoji = '📚'; color = '#e74c3c'; }
  
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-grade').style.color = color;
  document.getElementById('result-score-text').textContent = `${score} / ${questions.length} 정답 (${pct}%)`;
  
  setTimeout(() => {
    document.getElementById('result-bar').style.width = pct + '%';
    document.getElementById('result-bar').style.background = color;
  }, 100);
  
  const reviewList = document.getElementById('review-list');
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'review-item ' + (r.correct ? 'r-correct' : 'r-wrong');
    div.innerHTML = `<div class="review-item-top">
      <span class="review-q-num">${r.num}번</span>
      <span class="review-result-icon">${r.correct ? '✅' : '❌'}</span>
    </div>
    <div class="review-q-text">${r.text.length > 40 ? r.text.substring(0,40)+'...' : r.text}</div>
    <div class="review-answer">결과: <span>${r.correct ? '정답' : '오답'}</span></div>`;
    reviewList.appendChild(div);
  });
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
