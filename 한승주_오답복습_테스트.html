<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한승주 오답 복습 | 영핏</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2550;--gold:#f0a500;--green:#22c55e;--red:#ef4444;--bg:#f4f6fb;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,37,80,.3);}
.header img{height:38px;filter:brightness(0) invert(1);}
.header-title{color:white;font-size:15px;font-weight:700;line-height:1.3;}
.header-title span{display:block;font-size:11px;font-weight:400;color:rgba(255,255,255,.65);margin-top:1px;}
.progress-wrap{background:#e2e8f0;height:6px;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),#ffd166);transition:width .4s ease;border-radius:0 3px 3px 0;}
.container{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
.screen{display:none;}.screen.active{display:block;}
.start-card{background:var(--card);border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 4px 24px rgba(26,37,80,.10);margin-top:20px;}
.start-badge{display:inline-block;background:rgba(240,165,0,.12);color:var(--gold);border:1.5px solid var(--gold);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin-bottom:16px;letter-spacing:.5px;}
.start-name{font-size:26px;font-weight:900;color:var(--navy);margin-bottom:6px;letter-spacing:-.5px;}
.start-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
.info-row{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
.info-chip{background:#f1f5f9;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--navy);}
.info-chip span{color:var(--gold);font-weight:900;}
.btn-start{width:100%;padding:16px;background:var(--navy);color:white;border:none;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;letter-spacing:-.3px;}
.btn-start:active{transform:scale(.98);background:#111c40;}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.q-num{font-size:13px;font-weight:700;color:var(--muted);}
.q-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(26,37,80,.08);color:var(--navy);}
.q-card{background:var(--card);border-radius:18px;padding:22px 20px 20px;box-shadow:0 2px 16px rgba(26,37,80,.08);margin-bottom:14px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-section{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--gold);margin-bottom:10px;text-transform:uppercase;}
.q-text{font-size:15px;font-weight:700;line-height:1.65;color:var(--navy);margin-bottom:14px;word-break:keep-all;white-space:pre-wrap;}
.passage-box{background:#f8fafc;border-left:3px solid var(--navy);border-radius:0 10px 10px 0;padding:12px 14px;font-size:13px;line-height:1.8;color:#334155;margin-bottom:14px;}
.passage-box .spk{font-weight:700;color:var(--navy);}
.options{display:flex;flex-direction:column;gap:9px;}
.option{background:#f8fafc;border:2px solid var(--border);border-radius:12px;padding:13px 16px;font-size:14px;font-weight:500;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:10px;line-height:1.5;word-break:keep-all;-webkit-tap-highlight-color:transparent;}
.option .on{min-width:22px;height:22px;border-radius:50%;background:var(--border);color:var(--muted);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.option.correct{border-color:var(--green);background:rgba(34,197,94,.08);}
.option.correct .on{background:var(--green);color:white;}
.option.wrong{border-color:var(--red);background:rgba(239,68,68,.06);}
.option.wrong .on{background:var(--red);color:white;}
.feedback{border-radius:14px;padding:16px;margin-top:14px;font-size:13px;line-height:1.7;word-break:keep-all;display:none;}
.feedback.show{display:block;animation:fadeUp .3s ease;}
.feedback.ok{background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.3);}
.feedback.ng{background:rgba(239,68,68,.06);border:1.5px solid rgba(239,68,68,.2);}
.feedback.info{background:rgba(26,37,80,.05);border:1.5px solid rgba(26,37,80,.15);}
.fh{display:flex;align-items:center;gap:7px;font-weight:800;font-size:14px;margin-bottom:8px;}
.feedback.ok .fh{color:#16a34a;}.feedback.ng .fh{color:#dc2626;}.feedback.info .fh{color:var(--navy);}
.ans-line{font-weight:700;color:var(--navy);margin-bottom:6px;font-size:13px;}
.exp-text{color:#475569;font-size:13px;}
.btn-next{width:100%;padding:15px;background:var(--gold);color:var(--navy);border:none;border-radius:13px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:14px;transition:all .2s;display:none;}
.btn-next.show{display:block;animation:fadeUp .25s ease;}
.btn-next:active{transform:scale(.98);}
.btn-reveal{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:12px;transition:all .2s;}
.btn-reveal:active{transform:scale(.98);}
.subj-hint{background:#f1f5f9;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--muted);border:1.5px dashed var(--border);margin-top:4px;line-height:1.6;}
.result-card{background:var(--card);border-radius:20px;padding:34px 24px;text-align:center;box-shadow:0 4px 24px rgba(26,37,80,.10);margin-top:20px;}
.re{font-size:52px;margin-bottom:14px;}
.rg{font-size:13px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:6px;}
.rs{font-size:44px;font-weight:900;color:var(--navy);line-height:1;margin-bottom:6px;font-family:'Nunito',sans-serif;}
.rt{font-size:16px;color:var(--muted);margin-bottom:20px;}
.rm{background:#f8fafc;border-radius:14px;padding:16px;font-size:14px;line-height:1.7;color:#475569;margin-bottom:24px;word-break:keep-all;}
.rev-title{font-size:15px;font-weight:800;color:var(--navy);text-align:left;margin-bottom:12px;}
.rev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.rev-item{display:flex;align-items:center;gap:10px;background:#f8fafc;border-radius:10px;padding:10px 14px;font-size:13px;}
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rdot.ok{background:var(--green);}.rdot.fail{background:var(--red);}.rdot.info{background:var(--gold);}
.rq{font-weight:700;color:var(--navy);min-width:48px;}
.ra{color:var(--muted);font-size:12px;flex:1;}
.btn-retry{width:100%;padding:15px;background:var(--navy);color:white;border:none;border-radius:13px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.btn-retry:active{transform:scale(.98);}
</style>
</head>

const Q=[
{num:3,sec:"1-1. COMMUNICATION",type:"mc",
text:"다음 대화를 읽고, '춤'에 관심이 있고 즐기는 사람은 누구인가?",
passage:[["Kate","What are you doing, Junho?"],["Junho","I'm writing on my blog. I like writing about my everyday life."],["Alex","How often do you write?"],["Junho","I try to write something on my blog every day."],["Kate","That's a lot! How about you, Alex? What do you do in your free time?"],["Alex","I enjoy dancing. I like all kinds of dance."],["Junho","That sounds fun! Maybe you can teach us some dance moves sometime."],["Kate","Yeah! Oh, I can make you a video of our new dance. I usually make videos in my free time."],["Alex","Really? That would be great!"],["Junho","Wow! I can't wait!"]],
opts:["① Kate","② Junho","③ Alex","④ Kate and Junho","⑤ None of them"],ans:2,
exp:"Alex가 \"I enjoy dancing(나는 춤추는 것을 즐겨)\"이라고 말한 것을 통해 춤에 관심이 있고 즐기는 사람은 Alex라는 것을 알 수 있다."},

{num:8,sec:"1-1. COMMUNICATION",type:"subj",
text:"다음 질문에 대한 답변 문장을 영작하시오.\n(단, 주어는 대명사로 쓸 것)\n\nQ: What kinds of dance does Alex like?\n→ ___________________________",
passage:null,
ans:"He likes all kinds of dance.",
exp:"질문은 'Alex는 어떤 종류의 춤을 좋아하는가?'이다. Alex는 '나는 모든 종류의 춤을 좋아해'라고 했으므로 '그는 모든 종류의 춤을 좋아한다'를 영작해야 한다."},

{num:18,sec:"1-3. READING",type:"mc",
text:"다음 글의 내용으로 미루어 볼 때, '퍼즐'과 '베이킹'의 공통점으로 가장 적절한 것은?",
passage:[["","[퍼즐] Now, take a break with puzzles. Carefully put the pieces together, and you will forget about your worries. Doing puzzles is good for clearing your mind. And guess what? When you put in the last piece, you will feel great. It will give you a sense of success."],["","[베이킹] Lastly, head to the kitchen for some baking. You can make your own cookies. Follow the recipes, but don't be afraid to get creative. Just express yourself! And here is the highlight of baking. It gives you the joy of sharing. Bake something special for your friends or family."]],
opts:["① 활동의 결과물을 다른 사람과 나누는 것이 중요하다.","② 명확한 규칙을 따라야 하는 활동들이다.","③ 참여자가 긍정적인 감정을 느낄 수 있는 활동들이다.","④ 창의적인 자기표현의 기회를 제공하는 것을 목표로 한다.","⑤ 두 활동 모두 걱정을 잊게 만드는 효과가 있다."],ans:2,
exp:"퍼즐은 '기분이 좋을 것', '성취감'을 주고, 베이킹은 '창의적 표현', '나눔의 기쁨' 등 긍정적인 감정적 보상을 준다. ① 나눔은 베이킹에서만 강조. ② 베이킹은 창의성·유연성 강조. ④ 창의적 자기표현은 베이킹에서만 명시. ⑤ 걱정을 잊게 함은 퍼즐에서만 명시."},

{num:20,sec:"1-3. READING",type:"mc",

let cur=0,score=0,results=[],answered=false;

function go(){cur=0;score=0;results=[];answered=false;
  document.getElementById('ss').classList.remove('active');
  document.getElementById('qs').classList.add('active');
  render();}

function render(){
  answered=false;
  const q=Q[cur];
  document.getElementById('qn').textContent=(cur+1)+' / '+Q.length;
  document.getElementById('qb').textContent=q.type==='mc'?'객관식':'서술형';
  document.getElementById('fb').className='feedback';
  document.getElementById('fb').innerHTML='';
  const bn=document.getElementById('bn');
  bn.className='btn-next';
  document.getElementById('pb').style.width=(cur/Q.length*100)+'%';

  let h='<div class="q-section">'+q.sec+'</div>';
  h+='<div class="q-text">'+q.text.replace(/\n/g,'<br>')+'</div>';

  if(q.passage){
    h+='<div class="passage-box">';
    q.passage.forEach(([sp,tx])=>{
      if(sp) h+='<div><span class="spk">'+sp+':</span> '+tx+'</div>';
      else h+='<div>'+tx.replace(/\n/g,'<br>')+'</div>';
    });
    h+='</div>';
  }

  if(q.type==='mc'){
    h+='<div class="options" id="od">';
    q.opts.forEach((o,i)=>{h+='<div class="option" id="o'+i+'" onclick="pick('+i+')"><span class="on">'+(i+1)+'</span><span>'+o+'</span></div>';});
    h+='</div>';
  } else {
    h+='<div class="subj-hint">✏️ 머릿속으로 답을 생각해본 후 정답을 확인하세요.</div>';
    h+='<button class="btn-reveal" onclick="revSubj()">정답 확인하기 →</button>';
  }
  document.getElementById('qc').innerHTML=h;
}

function pick(i){
  if(answered)return;
  answered=true;
  const q=Q[cur];
  const ok=i===q.ans;
  if(ok)score++;
  results.push({num:q.num,correct:ok,ans:q.opts[q.ans]});
  document.querySelectorAll('.option').forEach((el,j)=>{
    if(j===q.ans)el.classList.add('correct');
    else if(j===i&&!ok)el.classList.add('wrong');
  });
  showFB(ok,q);
}

function revSubj(){
  const q=Q[cur];
  results.push({num:q.num,correct:null,ans:q.ans});
  document.querySelector('.btn-reveal')&&document.querySelector('.btn-reveal').remove();
  showFB(null,q);
  const bn=document.getElementById('bn');
  bn.className='btn-next show';
  bn.textContent=cur<Q.length-1?'다음 문제 →':'결과 보기 →';
}

function showFB(ok,q){
  const fb=document.getElementById('fb');
  let cls,icon,title;
  if(ok===null){cls='info';icon='📖';title='정답 및 해설';}
  else if(ok){cls='ok';icon='✅';title='정답입니다!';}
  else{cls='ng';icon='❌';title='오답입니다';}
  const ansText=q.type==='mc'?q.opts[q.ans]:q.ans.replace(/\n/g,'<br>');
  fb.className='feedback '+cls+' show';
  fb.innerHTML='<div class="fh"><span>'+icon+'</span>'+title+'</div><div class="ans-line">정답: '+ansText+'</div><div class="exp-text">'+q.exp+'</div>';
  if(q.type==='mc'){
    const bn=document.getElementById('bn');
    bn.className='btn-next show';
    bn.textContent=cur<Q.length-1?'다음 문제 →':'결과 보기 →';
  }
}

function nx(){
  cur++;
  if(cur<Q.length)render();
  else showResult();
}

function showResult(){
  document.getElementById('qs').classList.remove('active');
  document.getElementById('rs').classList.add('active');
  document.getElementById('pb').style.width='100%';
  const mc=results.filter(r=>r.correct!==null);
  const ok=mc.filter(r=>r.correct).length;
  const subj=results.filter(r=>r.correct===null).length;
  document.getElementById('rsc').textContent=ok;
  document.getElementById('rt').textContent='/ '+mc.length+' 정답 (서술형 '+subj+'문제 별도)';
  const p=mc.length?ok/mc.length:0;
  let g,e,m;
  if(p===1){g='완벽해요! 🏆';e='🌟';m='모든 객관식 오답 문제를 다 맞혔어요! 내일 시험 완전 자신있겠는데요? 파이팅!';}
  else if(p>=.8){g='훌륭해요!';e='🎉';m='거의 다 맞혔어요! 틀린 부분만 한 번 더 확인하면 완벽할 것 같아요!';}
  else if(p>=.5){g='잘하고 있어요!';e='👍';m='반 이상 맞혔네요! 해설을 꼼꼼히 읽고 오늘 밤 한 번 더 복습해봐요!';}
  else{g='더 노력해봐요!';e='📚';m='아직 헷갈리는 부분이 있네요. 해설을 꼼꼼히 읽고 다시 도전해봐요! 할 수 있어요!';}
  document.getElementById('re').textContent=e;
  document.getElementById('rg').textContent=g;
  document.getElementById('rm').textContent=m;
  const rl=document.getElementById('rl');
  rl.innerHTML='';
  results.forEach(r=>{
    const d=document.createElement('div');
    d.className='rev-item';
    const dot=r.correct===null?'info':(r.correct?'ok':'fail');
    const lbl=r.correct===null?'확인':(r.correct?'정답':'오답');
    const a=typeof r.ans==='string'&&r.ans.length>35?r.ans.substring(0,35)+'…':r.ans;
    d.innerHTML='<div class="rdot '+dot+'"></div><div class="rq">문제 '+r.num+'</div><div class="ra">['+lbl+'] '+a+'</div>';
    rl.appendChild(d);
  });
}

function retry(){
  document.getElementById('rs').classList.remove('active');
  document.getElementById('ss').classList.add('active');
  document.getElementById('pb').style.width='0%';
}
</script>
