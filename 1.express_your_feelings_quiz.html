<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Express Your Feelings | 중3 영어 퀴즈</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
:root{--g:#1B4332;--g2:#103826;--gl:#E8F5EE;--gp:#F2FAF6;--bl:#1D4ED8;--bll:#EFF6FF;--am:#B45309;--aml:#FFFBEB;--rd:#B91C1C;--bg:#F8F7F4;--sf:#FFFFFF;--br:#E3E2DC;--br2:#C8C7BF;--tx:#141410;--tx2:#5A5A52;--tx3:#9A9A92;--r:10px;--rl:16px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:15px;line-height:1.6}
.site-header{background:var(--sf);border-bottom:1.5px solid var(--br);padding:12px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.hicon{width:38px;height:38px;background:var(--g);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.htxt h1{font-size:15px;font-weight:700;letter-spacing:-0.02em}
.htxt p{font-size:11px;color:var(--tx3);margin-top:1px;font-weight:400}
.hpills{margin-left:auto;display:flex;gap:10px}
.pill{display:flex;align-items:center;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;border:1.5px solid var(--br);background:var(--sf);color:var(--tx2)}
.pill.active{background:var(--gl);border-color:var(--g);color:var(--g)}
.tabs{display:flex;background:var(--sf);border-bottom:1.5px solid var(--br)}
.tab{flex:1;padding:13px 10px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--tx3);border-bottom:3px solid transparent;transition:all .2s;font-family:'Pretendard Variable','Pretendard',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:-0.01em}
.tab:hover{color:var(--tx)}.tab.active{color:var(--g);border-bottom-color:var(--g)}
.tcnt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--br);color:var(--tx3);font-family:'JetBrains Mono',monospace}
.tab.active .tcnt{background:var(--gl);color:var(--g2)}
main{max-width:680px;margin:0 auto;padding:22px 16px 80px}
.pw{margin-bottom:20px}
.pr{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--tx3);margin-bottom:8px}
.pl{font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:11px}
.pn{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--tx2)}
.pb{height:5px;background:var(--br);border-radius:99px;overflow:hidden}
.pbi{height:100%;border-radius:99px;background:var(--g);transition:width .5s cubic-bezier(.4,0,.2,1)}
.card{background:var(--sf);border:1.5px solid var(--br);border-radius:var(--rl);padding:22px 20px;margin-bottom:14px;animation:fu .25s ease both}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qs{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:6px;font-weight:600}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;margin-bottom:14px;letter-spacing:.02em}
.bo{background:var(--gl);color:var(--g2)}.bs{background:var(--bll);color:var(--bl)}
.qko{font-size:14px;color:var(--tx2);margin-bottom:16px;padding:10px 14px;background:var(--bg);border-radius:8px;border-left:3px solid var(--br2);line-height:1.65}
.qko::before{content:"🇰🇷 "}
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);font-weight:700;margin-bottom:7px}
.lpool{display:flex;flex-direction:column;gap:8px;min-height:60px;padding:12px;background:var(--bg);border:1.5px dashed var(--br2);border-radius:var(--r);margin-bottom:8px}
.lans{display:flex;flex-direction:column;gap:8px;min-height:60px;padding:12px;background:var(--gp);border:1.5px solid var(--g);border-radius:var(--r);margin-bottom:10px}
.lc{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--sf);border:1.5px solid var(--br2);border-radius:8px;cursor:pointer;transition:all .12s;animation:fu .15s ease}
.lc:hover{border-color:var(--g);background:var(--gl);transform:translateX(3px)}
.lc.placed{background:var(--gl);border-color:var(--g)}
.lc.placed:hover{background:#c8eddf}
.lc.ldis{cursor:default;pointer-events:none}
.lc.lok{background:#D1FAE5;border-color:#059669}
.lc.lng{background:#FEE2E2;border-color:#DC2626}
.spk{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:22px;padding:0 6px;border-radius:5px;border:1.5px solid;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0;white-space:nowrap;margin-top:2px}
.lt{font-size:14px;color:var(--tx);line-height:1.65;font-family:'JetBrains Mono',monospace;font-weight:500}
.onum{min-width:22px;height:22px;background:var(--g);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:2px}
.le{font-size:13px;color:var(--tx3);padding:4px;font-style:italic}
.wcnt{font-size:12px;color:var(--tx3);margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.wcnt .cnt{color:var(--g);font-weight:700}
.warn{font-size:12px;color:var(--am);margin-top:4px;display:none}.warn.show{display:block}
.blank-line{font-size:19px;line-height:1.85;margin-bottom:14px;word-break:keep-all;font-weight:500}
.blank-slot{display:inline-block;border-bottom:2.5px solid var(--bl);min-width:90px;padding:0 8px;text-align:center;color:var(--bl);font-family:'JetBrains Mono',monospace;font-weight:500}
.ans-input{width:100%;padding:12px 15px;font-size:16px;border:1.5px solid var(--br2);border-radius:var(--r);outline:none;font-family:'JetBrains Mono',monospace;background:var(--sf);color:var(--tx);transition:border-color .2s,background .2s;font-weight:500}
.ans-input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.ans-input.iok{border-color:#059669;background:#F0FDF4;color:#065F46}
.ans-input.ing{border-color:#DC2626;background:#FEF2F2;color:#7F1D1D}
.hbtn{font-size:12px;padding:5px 12px;border:1.5px solid var(--br);border-radius:99px;background:var(--sf);cursor:pointer;color:var(--am);font-family:'Pretendard Variable','Pretendard',sans-serif;margin-top:10px;transition:.15s;display:inline-flex;align-items:center;gap:4px;font-weight:600}
.hbtn:hover{background:var(--aml);border-color:var(--am)}
.hbox{margin-top:8px;padding:10px 14px;background:var(--aml);border:1.5px solid #FDE68A;border-radius:8px;font-size:13px;color:#92400E;display:none;line-height:1.6}
.hbox.show{display:block;animation:fu .15s ease}
.fb{margin-top:12px;font-size:14px;font-weight:600;padding:10px 14px;border-radius:8px;display:none;gap:8px}
.fb.show{display:flex;animation:fu .2s ease}
.fbok{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;align-items:center}
.fbng{background:#FEE2E2;color:#7F1D1D;border:1px solid #FCA5A5;flex-direction:column;align-items:flex-start}
.ar{font-family:'JetBrains Mono',monospace;font-weight:700;color:inherit}
.nav-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{padding:10px 20px;border:1.5px solid var(--br2);border-radius:var(--r);background:var(--sf);font-size:14px;font-weight:600;cursor:pointer;font-family:'Pretendard Variable','Pretendard',sans-serif;color:var(--tx);transition:all .15s;display:inline-flex;align-items:center;gap:5px;letter-spacing:-0.01em}
.btn:hover{background:var(--bg);border-color:var(--tx2)}
.btnp{background:var(--g);border-color:var(--g);color:#fff}.btnp:hover{background:var(--g2)}
.btng{color:var(--tx3);border-color:var(--br)}.btng:hover{border-color:var(--br2);color:var(--tx)}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.qcnt{font-size:13px;color:var(--tx3);margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:500}
.ss{text-align:center;padding:2.5rem 1rem 3rem;animation:fu .4s ease}
.sring{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--g) calc(var(--pct)*1%),var(--br) 0);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative}
.sring::before{content:'';position:absolute;inset:14px;background:var(--sf);border-radius:50%}
.sinner{position:relative;z-index:1;text-align:center}
.sn{font-size:38px;font-weight:700;color:var(--g);font-family:'JetBrains Mono',monospace;line-height:1}
.sd{font-size:13px;color:var(--tx3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.smsg{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-0.03em}
.ssub{font-size:14px;color:var(--tx2);margin-bottom:28px}
.sstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;max-width:360px;margin:0 auto 28px}
.stb{background:var(--bg);border-radius:var(--r);padding:14px 8px;border:1.5px solid var(--br)}
.stn{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stok .stn{color:var(--g)}.stng .stn{color:var(--rd)}.stpct .stn{color:var(--bl)}
.stl{font-size:11px;color:var(--tx3);margin-top:3px;font-weight:600;letter-spacing:.02em}
.sw{max-width:680px;margin:24px auto 0}
.sw h3{font-size:13px;color:var(--tx2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.sl{display:flex;flex-direction:column;gap:6px}
.si{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;font-size:13px;background:var(--sf);border:1px solid var(--br)}
.si.sok{border-color:#6EE7B7;background:#F0FDF4}.si.sng{border-color:#FCA5A5;background:#FEF2F2}
.sico{font-size:14px;flex-shrink:0;margin-top:1px}
.sko{color:var(--tx2);margin-bottom:2px}
@media(max-width:480px){.hpills{display:none}.blank-line{font-size:17px}.lt{font-size:13px}}
</style>
</head>
<body>
<header class="site-header">
  <div class="hicon">📖</div>
  <div class="htxt">
    <h1>영핏 · Express Your Feelings</h1>
    <p>중3 영어 · 천재(정사열) · STEP2 커뮤니케이션</p>
  </div>
  <div class="hpills">
    <div class="pill" id="pill-order">💬 대화순서 — / 18</div>

</header>
<div class="tabs">
  <button class="tab active" id="tab-order" onclick="switchTab('order')">💬 대화 순서 맞추기 <span class="tcnt">18</span></button>
  <button class="tab" id="tab-subj" onclick="switchTab('subj')">✏️ 주관식 <span class="tcnt">30</span></button>
</div>
<main id="qmain"></main>
<script>
const OQ=[
  {s:"Dialogue 1",ko:"강아지가 아픈 친구를 위로하는 상황",lines:[
    {spk:"B",text:"You don't look happy. Are you all right?"},
    {spk:"G",text:"No, I'm really sad. My dog is sick. He won't eat at all."},
    {spk:"B",text:"That's too bad."}]},
  {s:"Dialogue 2",ko:"점심 메뉴를 보며 기대하는 상황",lines:[
    {spk:"B",text:"It'll be a good day today! Take a look at today's lunch menu."},
    {spk:"G",text:"Wow! I'm glad to eat fried chicken! I can't wait for lunch break."}]},
  {s:"Dialogue 3",ko:"학교 청소를 도와주는 학생들이 기쁜 선생님",lines:[
    {spk:"W",text:"Good morning, Mr. Lee. How are you feeling?"},
    {spk:"M",text:"I'm feeling very happy this morning. Some students are helping me clean the school."},
    {spk:"W",text:"I'm glad to hear that."}]},
  {s:"Dialogue 4",ko:"방과 후 축구를 못 하게 된 친구 위로",lines:[
    {spk:"G",text:"You look upset. Are you all right?"},
    {spk:"B",text:"My mom won't let me play soccer after school."},
    {spk:"G",text:"Why don't you ask her one more time?"}]},
  {s:"Dialogue 5 – Part 1",ko:"이사 가는 지훈이의 기분 묻기",lines:[
    {spk:"G",text:"Jihun, you're moving to another country next week. How are you feeling?"},
    {spk:"B",text:"I'm excited to go to a whole new world, Yunju."},
    {spk:"G",text:"I'm glad to hear that. I was worried about you."}]},
  {s:"Dialogue 5 – Part 2",ko:"이별 앞두고 연락 방법 약속하기",lines:[
    {spk:"B",text:"Actually, I'm sad, too. I'll miss all of you a lot."},
    {spk:"G",text:"Let's keep in touch online."},
    {spk:"B",text:"Okay. Let's have video chats often."}]},
  {s:"Dialogue 6",ko:"지훈이 이사와 아부다비 방문 기대",lines:[
    {spk:"G",text:"Minsu, Jihun is moving to Abu Dhabi in the UAE next week. How are you feeling?"},
    {spk:"B",text:"I'm sad. I'm going to miss him a lot."},
    {spk:"G",text:"I'm sad, too, but I'm also happy. We can visit Abu Dhabi. He is going to invite us. He promised."},
    {spk:"B",text:"That's great! I'm glad to have a chance to travel to a new country."}]},
  {s:"Dialogue 7 – Part 1",ko:"이사 가는 친구 때문에 슬픈 예나",lines:[
    {spk:"B",text:"Yena, how are you feeling?"},
    {spk:"G",text:"I'm feeling very sad, Seho. My best friend Jihun is moving away."},
    {spk:"B",text:"Really? I'm sorry. But don't be so sad. You two can have video chats online."}]},
  {s:"Dialogue 7 – Part 2",ko:"지훈이에게 이별 선물 만들기 제안",lines:[
    {spk:"G",text:"You're right."},
    {spk:"B",text:"Why don't we make him a photo book as a goodbye gift?"},
    {spk:"G",text:"Great idea. I'm glad to give him something meaningful."}]},
  {s:"Dialogue 8",ko:"친구 집 방문 인사 나누기",lines:[
    {spk:"A",text:"I'm glad to visit your house finally. How are you feeling?"},
    {spk:"B",text:"I'm excited, too."}]},
  {s:"Dialogue 9 – Part 1",ko:"생일 선물 드론 이야기 (전반부)",lines:[
    {spk:"G",text:"How are you feeling today?"},
    {spk:"B",text:"I'm really glad to get a present for my birthday."},
    {spk:"G",text:"What is the present?"},
    {spk:"B",text:"It's this drone, which our grandpa sent for my birthday."}]},
  {s:"Dialogue 9 – Part 2",ko:"드론을 직접 날려 보이는 상황",lines:[
    {spk:"G",text:"Wow! I wonder how high it can fly."},
    {spk:"B",text:"Let me show you."},
    {spk:"G",text:"Thanks."}]},
  {s:"Dialogue 10 – Part 1",ko:"좋아하는 음식 요리하는 기쁨 (전반부)",lines:[
    {spk:"G",text:"How are you feeling?"},
    {spk:"M",text:"I'm really glad to cook my favorite food."},
    {spk:"G",text:"I want to know what it is."}]},
  {s:"Dialogue 10 – Part 2",ko:"잡채를 함께 나누는 상황 (후반부)",lines:[
    {spk:"M",text:"It's japchae, which is delicious and healthy."},
    {spk:"G",text:"I want to try some."},
    {spk:"M",text:"Okay. Wait for 30 minutes!"}]},
  {s:"Dialogue 11a – Part 1",ko:"반에 새 학생이 왔다는 기쁜 소식",lines:[
    {spk:"G",text:"Minsu, how are you feeling?"},
    {spk:"B",text:"I'm really excited, Miso. We have a new student in our class. His name is Kim Kihun."},
    {spk:"G",text:"So why are you excited?"}]},
  {s:"Dialogue 11a – Part 2",ko:"새 학생이 축구 선수라는 사실",lines:[
    {spk:"B",text:"He was a soccer player on his school team. As you know, my team needs a player."},
    {spk:"G",text:"I'm glad to hear that. I hope he joins your team."},
    {spk:"B",text:"Thanks a lot."}]},
  {s:"Dialogue 11b – Part 1",ko:"VTS 콘서트 표 예매 성공 소식",lines:[
    {spk:"G",text:"Hi, Jiho. How are you feeling?"},
    {spk:"B",text:"I'm happier than ever, Nari."},
    {spk:"G",text:"I know why. You did it, didn't you?"},
    {spk:"B",text:"Yes. I finally booked four tickets for the VTS concert!"}]},
  {s:"Dialogue 11b – Part 2",ko:"콘서트 준비와 기대감 나누기",lines:[
    {spk:"G",text:"Good job. Did you tell Minsu and Yujin about that?"},
    {spk:"B",text:"Sure. Oh, I just got messages from them. They said they are really happy. Look."},
    {spk:"G",text:"How cute! I like their emojis. They will bring light sticks and a nice camera."},
    {spk:"B",text:"I'm glad to hear that. We're going to have lots of fun!"}]}
];
const SQ=[
  {s:"Key Function",ko:"기분이 어떠니?",q:"How are you ___?",a:"feeling",h:"기분을 묻는 핵심 표현"},
  {s:"Key Function",ko:"나는 매우 행복해.",q:"I'm ___ very happy.",a:"feeling",h:"I'm feeling ~: ~한 기분이다"},
  {s:"Key Function – 위로",ko:"정말 안됐구나.",q:"That's too ___.",a:"bad",h:"상대방을 위로할 때 쓰는 표현"},
  {s:"Key Function – 위로",ko:"그 말을 들으니 유감이야.",q:"I'm sorry to ___ that.",a:"hear",h:"I'm sorry to R: ~해서 유감이다"},
  {s:"Key Function – 공감",ko:"그 말을 들으니 나도 기뻐.",q:"I'm ___ to hear that.",a:"glad",h:"I'm glad to R: ~해서 기쁘다"},
  {s:"Dialogue 2",ko:"닭튀김을 먹게 되어 기뻐!",q:"I'm glad to ___ fried chicken!",a:"eat",h:"glad to + 동사원형"},
  {s:"Dialogue 2",ko:"점심시간이 무척 기다려져.",q:"I can't ___ for lunch break.",a:"wait",h:"can't wait for ~: ~이 무척 기다려지다"},
  {s:"Dialogue 1",ko:"그는 아무것도 먹으려 하지 않아.",q:"He won't eat at ___.",a:"all",h:"not ~ at all: 전혀 ~하지 않다"},
  {s:"Dialogue 2",ko:"오늘 점심 메뉴 좀 봐.",q:"___ a look at today's lunch menu.",a:"Take",h:"take a look at: ~을 보다"},
  {s:"Dialogue 5",ko:"온라인으로 계속 연락하자.",q:"Let's keep in ___ online.",a:"touch",h:"keep in touch: 연락하다"},
  {s:"Dialogue 6",ko:"새로운 나라로 여행할 기회를 얻게 되어 기뻐.",q:"I'm glad to have a ___ to travel.",a:"chance",h:"have a chance to R: ~할 기회가 있다"},
  {s:"Dialogue 7",ko:"뭔가 의미 있는 것을 그에게 줄 수 있어서 기뻐.",q:"I'm glad to give him something ___.",a:"meaningful",h:"something + 형용사: ~한 어떤 것"},
  {s:"Dialogue 4",ko:"엄마가 방과 후에 축구하는 것을 허락하지 않으셔.",q:"My mom won't ___ me play soccer after school.",a:"let",h:"let(사역동사) + 목적어 + 원형부정사"},
  {s:"Dialogue 3",ko:"몇몇 학생들이 학교 청소하는 것을 돕고 있어요.",q:"Some students are helping me ___ the school.",a:"clean",h:"help(준사역동사) + 목적어 + 원형부정사"},
  {s:"Dialogue 10",ko:"그건 잡채인데, 맛있고 건강에도 좋아.",q:"It's japchae, ___ is delicious and healthy.",a:"which",h:"관계대명사 계속적 용법 (선행사: japchae)"},
  {s:"Dialogue 10",ko:"그것이 무엇인지 알고 싶어.",q:"I want to know what it ___.",a:"is",h:"간접의문문: what + 주어 + 동사"},
  {s:"Dialogue 9",ko:"그게 얼마나 높이 날 수 있는지 궁금하다.",q:"I wonder how ___ it can fly.",a:"high",h:"how + 부사: 얼마나 ~하게"},
  {s:"Dialogue 11",ko:"어떤 때보다 행복해.",q:"I'm happier ___ ever.",a:"than",h:"비교급 + than + 비교 대상"},
  {s:"Dialogue 11",ko:"우리는 정말 재미있을 거야!",q:"We're going ___ have lots of fun!",a:"to",h:"be going to부정사: ~할 예정이다"},
  {s:"Dialogue 11",ko:"그가 너희 팀에 합류하길 바랄게.",q:"I ___ he joins your team.",a:"hope",h:"S hope (that) S + V: ~하기를 바라다"},
  {s:"Dialogue 5",ko:"지훈아, 너 다음 주에 다른 나라로 이사 가지.",q:"Jihun, you're ___ to another country next week.",a:"moving",h:"이동 동사의 현재진행형 → 가까운 미래 예정"},
  {s:"Dialogue 5",ko:"나는 너를 걱정했어.",q:"I was ___ about you.",a:"worried",h:"be worried about: ~을 걱정하다"},
  {s:"Dialogue 11",ko:"너도 알다시피, 우리 팀은 선수가 한 명 필요해.",q:"As you ___, my team needs a player.",a:"know",h:"접속사 As: ~하듯이 (as you know: 너도 알다시피)"},
  {s:"Dialogue 11",ko:"내가 마침내 VTS 콘서트 표를 4장 예매했어!",q:"I finally ___ four tickets for the VTS concert!",a:"booked",h:"book: 예약하다, 예매하다 (동사)"},
  {s:"Dialogue 11",ko:"너 해냈구나, 그렇지?",q:"You did it, ___ you?",a:"didn't",h:"부가의문문: 긍정문 → 부정 부가의문문"},
  {s:"Dialogue 5",ko:"너희 모두를 많이 그리워할 거야.",q:"I'll miss ___ of you a lot.",a:"all",h:"all of: ~모두"},
  {s:"Dialogue 4",ko:"기분이 언짢아 보인다.",q:"You ___ upset.",a:"look",h:"look + 형용사: ~하게 보이다"},
  {s:"Dialogue 8",ko:"드디어 너희 집을 방문하게 되어서 기뻐.",q:"I'm glad to ___ your house finally.",a:"visit",h:"glad to + 동사원형"},
  {s:"Dialogue 9",ko:"이 드론인데, 우리 할아버지가 내 생일에 보내 주셨어.",q:"It's this drone, ___ our grandpa sent for my birthday.",a:"which",h:"관계대명사 계속적 용법 (선행사: this drone)"},
  {s:"Dialogue 6",ko:"나도 슬퍼, 하지만 기쁘기도 해.",q:"I'm sad, too, but I'm also ___.",a:"happy",h:"also: ~또한, 역시"}
];

let mode='order';
const OS={idx:0,score:0,done:false,submitted:[],userIdx:[],shuffled:[],history:[]};
const SS={idx:0,score:0,done:false,submitted:[],userAns:[],history:[]};
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function initAll(){
  OS.idx=0;OS.score=0;OS.done=false;
  OS.submitted=new Array(OQ.length).fill(null);
  OS.userIdx=OQ.map(()=>[]);
  OS.shuffled=OQ.map(q=>shuffle(q.lines.map((l,i)=>({...l,oi:i}))));
  OS.history=new Array(OQ.length).fill(null);
  SS.idx=0;SS.score=0;SS.done=false;
  SS.submitted=new Array(SQ.length).fill(null);
  SS.userAns=new Array(SQ.length).fill('');
  SS.history=new Array(SQ.length).fill(null);
}
function resetOrder(){OS.idx=0;OS.score=0;OS.done=false;OS.submitted=new Array(OQ.length).fill(null);OS.userIdx=OQ.map(()=>[]);OS.shuffled=OQ.map(q=>shuffle(q.lines.map((l,i)=>({...l,oi:i}))));OS.history=new Array(OQ.length).fill(null);}
function resetSubj(){SS.idx=0;SS.score=0;SS.done=false;SS.submitted=new Array(SQ.length).fill(null);SS.userAns=new Array(SQ.length).fill('');SS.history=new Array(SQ.length).fill(null);}
function getNM(lines){const m={},l='ABCDEFGH';let i=0;lines.forEach(x=>{if(!(x.spk in m))m[x.spk]=l[i++];});return m;}function spkB(s,n){const lbl=n||s;const cols=['#1B4332','#1D4ED8','#7C3AED','#C2410C','#374151','#B45309'];const idx='ABCDEFGH'.indexOf(lbl);const c=cols[idx>=0?idx:4];return `<span class="spk" style="color:${c};border-color:${c};background:${c}1A">${lbl}</span>`;}
function updatePills(){
  const op=document.getElementById('pill-order'),sp=document.getElementById('pill-subj');
  const od=OS.submitted.filter(x=>x!==null).length,sd=SS.submitted.filter(x=>x!==null).length;
  op.textContent=`💬 대화순서 ${od?OS.score+'점':'—'} / ${OQ.length}`;
  sp.textContent=`✏️ 주관식 ${sd?SS.score+'점':'—'} / 30`;
  op.className='pill'+(mode==='order'?' active':'');
  sp.className='pill'+(mode==='subj'?' active':'');
}
function switchTab(t){mode=t;document.getElementById('tab-order').classList.toggle('active',t==='order');document.getElementById('tab-subj').classList.toggle('active',t==='subj');updatePills();render();}
function render(){
  const el=document.getElementById('qmain');
  if(mode==='order'){el.innerHTML=OS.done?scoreHTML('order'):orderHTML(OS.idx);}
  else{el.innerHTML=SS.done?scoreHTML('subj'):subjHTML(SS.idx);}
  updatePills();
  if(mode==='subj'&&!SS.done&&SS.submitted[SS.idx]===null){const inp=document.getElementById('sinp');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
}
function orderHTML(qi){
  const q=OQ[qi],sub=OS.submitted[qi],placed=OS.userIdx[qi],sh=OS.shuffled[qi],nm=getNM(q.lines);
  const pset=new Set(placed),total=q.lines.length,cnt=placed.length,pct=Math.round(qi/OQ.length*100);
  const uord=placed.map(si=>sh[si].oi).join(','),cord=q.lines.map((_,i)=>i).join(',');
  const isOk=sub!==null&&uord===cord;
  let pool='';
  sh.forEach((ln,si)=>{if(!pset.has(si)){const dis=sub!==null?' ldis':'';const cl=sub===null?`onclick="oPlace(${qi},${si})"` :'';pool+=`<div class="lc${dis}" ${cl}><span class="lt">${ln.text}</span></div>`;}});
  if(!pool)pool=`<div class="le">✓ 모든 대화를 배치했습니다</div>`;
  let ans='';
  if(!placed.length){ans=`<div class="le">↑ 대화를 순서대로 클릭하여 배치하세요</div>`;}
  else{placed.forEach((si,ai)=>{const ln=sh[si];let cls='lc';if(sub!==null)cls+= isOk?' ldis lok':' ldis lng';else cls+=' placed';const cl=sub===null?`onclick="oRemove(${qi},${ai})"` :'';ans+=`<div class="${cls}" ${cl}><span class="onum">${ai+1}</span><span class="lt">${ln.text}</span></div>`;});}
  let fb='';
  if(sub!==null){if(isOk){fb=`<div class="fb fbok show">✓ 정답! 완벽한 대화 순서예요!</div>`;}else{const rows=q.lines.map((l,i)=>`<div style="display:flex;align-items:flex-start;gap:8px;margin-top:6px"><span style="min-width:18px;font-weight:700;color:#7F1D1D;font-family:'JetBrains Mono',monospace">${i+1}.</span><span style="font-size:13px;font-family:'JetBrains Mono',monospace;color:#7F1D1D;line-height:1.5">${l.text}</span></div>`).join('');fb=`<div class="fb fbng show"><div>✗ 오답 — 올바른 순서:</div>${rows}</div>`;}}
  let btns='';
  if(sub===null){btns=`<button class="btn btnp" onclick="oSubmit(${qi})" ${cnt<total?'disabled':''}>확인 ✓</button><button class="btn btng" onclick="oClear(${qi})">지우기</button>`;}
  else if(qi<OQ.length-1){btns=`<button class="btn btnp" onclick="oGo(${qi+1})">다음 →</button>`;}
  else{btns=`<button class="btn btnp" onclick="oFinish()">결과 보기 →</button>`;}
  const ws=cnt>0&&cnt<total&&sub===null?' show':'';
  return `<div class="pw"><div class="pr"><span class="pl">대화 순서 맞추기</span><span class="pn">${qi+1} / ${OQ.length} · 정답 ${OS.score}개</span></div><div class="pb"><div class="pbi" style="width:${pct}%"></div></div></div>
<div class="card"><div class="qs">${q.s} · Q${qi+1}</div><span class="badge bo">💬 대화 순서 맞추기</span><div class="qko">${q.ko}</div>
<div class="slbl">대화 카드 — 클릭하여 순서대로 배치</div><div class="lpool">${pool}</div>
<div class="wcnt">배치: <span class="cnt">${cnt}</span> / ${total}개 · 배치된 카드를 클릭하면 취소</div>
<div class="slbl">내 답안</div><div class="lans">${ans}</div>
<div class="warn${ws}">⚠ 모든 카드를 배치해야 확인할 수 있어요</div>${fb}</div>
<div class="nav-row"><button class="btn" onclick="oGo(${qi-1})" ${qi===0?'disabled':''}>← 이전</button>${btns}<span class="qcnt">${qi+1} / ${OQ.length}</span></div>`;
}
function oPlace(qi,si){OS.userIdx[qi].push(si);render();}
function oRemove(qi,ai){OS.userIdx[qi].splice(ai,1);render();}
function oClear(qi){OS.userIdx[qi]=[];render();}
function oSubmit(qi){const sh=OS.shuffled[qi],placed=OS.userIdx[qi];if(placed.length<OQ[qi].lines.length)return;const uord=placed.map(si=>sh[si].oi).join(','),cord=OQ[qi].lines.map((_,i)=>i).join(',');OS.submitted[qi]=uord;const ok=uord===cord;if(ok)OS.score++;OS.history[qi]={ok};render();}
function oGo(qi){OS.idx=qi;render();}
function oFinish(){OS.done=true;render();}
function subjHTML(qi){
  const q=SQ[qi],sub=SS.submitted[qi],val=SS.userAns[qi]||'';
  const pct=Math.round(qi/SQ.length*100),ok=sub!==null&&val.trim().toLowerCase()===q.a.toLowerCase();
  let ic='',fb='';
  if(sub!==null){ic=ok?'iok':'ing';fb=ok?`<div class="fb fbok show">✓ 정답! 🎉</div>`:`<div class="fb fbng show" style="flex-direction:row;align-items:center">✗ 오답 → 정답: <span class="ar" style="margin-left:6px">${q.a}</span></div>`;}
  let btns='';
  if(sub===null){btns=`<button class="btn btnp" onclick="sSubmit(${qi})">확인 ✓</button>`;}
  else if(qi<SQ.length-1){btns=`<button class="btn btnp" onclick="sGo(${qi+1})">다음 →</button>`;}
  else{btns=`<button class="btn btnp" onclick="sFinish()">결과 보기 →</button>`;}
  const sv=val.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  return `<div class="pw"><div class="pr"><span class="pl">주관식</span><span class="pn">${qi+1} / ${SQ.length} · 정답 ${SS.score}개</span></div><div class="pb"><div class="pbi" style="width:${pct}%"></div></div></div>
<div class="card"><div class="qs">${q.s} · Q${qi+1}</div><span class="badge bs">✏️ 주관식 빈칸</span><div class="qko">${q.ko}</div>
<div class="blank-line">${q.q.replace('___','<span class="blank-slot">___</span>')}</div>
<input class="ans-input ${ic}" id="sinp" type="text" value="${sv}" placeholder="빈칸에 알맞은 단어를 입력하세요" ${sub!==null?'disabled':''}
  oninput="sUpdate(${qi},this.value)" onkeydown="if(event.key==='Enter')sSubmit(${qi})" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off"/>
<button class="hbtn" onclick="toggleHint(this)">💡 힌트 보기</button><div class="hbox">${q.h}</div>${fb}</div>
<div class="nav-row"><button class="btn" onclick="sGo(${qi-1})" ${qi===0?'disabled':''}>← 이전</button>${btns}<span class="qcnt">${qi+1} / ${SQ.length}</span></div>`;
}
function toggleHint(btn){const box=btn.nextElementSibling;box.classList.toggle('show');btn.textContent=box.classList.contains('show')?'💡 힌트 숨기기':'💡 힌트 보기';}
function sUpdate(qi,v){SS.userAns[qi]=v;}
function sSubmit(qi){const v=(SS.userAns[qi]||'').trim();if(!v)return;SS.submitted[qi]=v;const ok=v.toLowerCase()===SQ[qi].a.toLowerCase();if(ok)SS.score++;SS.history[qi]={user:v,ok};render();}
function sGo(qi){SS.idx=qi;render();}
function sFinish(){SS.done=true;render();}
function scoreHTML(type){
  const isO=type==='order',st=isO?OS:SS,qs=isO?OQ:SQ;
  const score=st.score,total=qs.length,wrong=total-score,pct=Math.round(score/total*100);
  const msg=pct===100?'🎉 만점! 완벽해요!':pct>=80?'👍 훌륭해요!':pct>=60?'🙂 잘했어요!':pct>=40?'📖 조금 더 연습해요!':'📚 본문을 다시 복습해 봐요!';
  let sum='';
  st.history.forEach((h,i)=>{if(!h)return;const ko=qs[i].ko;const ok=h.ok!==undefined?h.ok:h.ok2!==undefined?h.ok2:h.correct||h.ok;const cls=ok?'sok':'sng';const icon=ok?'✅':'❌';const extra=!ok&&!isO?`<div style="font-size:11px;color:var(--tx3)">정답: <span style="font-family:'JetBrains Mono',monospace;font-weight:600;color:#065F46">${SQ[i].a}</span></div>`:'';sum+=`<div class="si ${cls}"><span class="sico">${icon}</span><div><div class="sko">${ko}</div>${extra}</div></div>`;});
  return `<div class="ss"><div class="sring" style="--pct:${pct}"><div class="sinner"><div class="sn">${score}</div><div class="sd">/ ${total}</div></div></div>
<div class="smsg">${msg}</div><div class="ssub">${isO?'대화 순서 맞추기':'주관식'} · 정답률 ${pct}%</div>
<div class="sstats"><div class="stb stok"><div class="stn">${score}</div><div class="stl">정답</div></div><div class="stb stng"><div class="stn">${wrong}</div><div class="stl">오답</div></div><div class="stb stpct"><div class="stn">${pct}%</div><div class="stl">정답률</div></div></div>
<button class="btn btnp" style="margin:0 auto;display:inline-flex" onclick="restart('${type}')">↺ 다시 풀기</button></div>
${sum?`<div class="sw"><h3>오답 복습</h3><div class="sl">${sum}</div></div>`:''}`;
}
function restart(type){if(type==='order'){resetOrder();switchTab('order');}else{resetSubj();switchTab('subj');}}
initAll();render();
</script>
</body>
</html>
