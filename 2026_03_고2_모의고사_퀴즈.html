<title>2026년 03월 고2 모의고사 문제 | 영핏 학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1B2A5E; --navy-dark:#111d40; --navy-light:rgba(27,42,94,0.07);
  --gold:#C9A227; --gold-light:#F0CC5A; --gold-bg:rgba(201,162,39,0.08);
  --white:#fff; --gray-50:#F8F9FA; --gray-100:#F0F2F5;
  --gray-200:#E2E6EA; --gray-300:#CDD2DA; --gray-400:#9AA3B2;
  --gray-600:#6B7280; --gray-800:#2D3748;
  --green:#27ae60; --green-bg:rgba(39,174,96,0.08);
  --red:#e74c3c; --red-bg:rgba(231,76,60,0.08);
  --shadow:0 2px 16px rgba(27,42,94,0.10);
  --shadow-lg:0 8px 32px rgba(27,42,94,0.16);
  --r:14px; --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-100);color:var(--gray-800);min-height:100vh;}

/* HEADER */
header{background:var(--navy);padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.hdr{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px;height:54px;}
.logo{height:34px;filter:brightness(0) invert(1);flex-shrink:0;}
.hdr-title{font-family:'Nunito','Noto Sans KR',sans-serif;font-size:13px;font-weight:900;color:#fff;letter-spacing:-.3px;line-height:1.3;flex:1;}
.hdr-title span{color:var(--gold-light);}
.score-pill{background:var(--gold);color:var(--navy-dark);font-weight:900;font-size:12px;padding:4px 12px;border-radius:20px;white-space:nowrap;}

/* LAYOUT */
main{max-width:960px;margin:0 auto;padding:18px 14px 80px;}

/* STATS */
.stats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:#fff;border-radius:var(--r-sm);padding:10px 14px;flex:1;min-width:70px;box-shadow:var(--shadow);text-align:center;}
.stat .n{font-size:20px;font-weight:900;color:var(--navy);}
.stat .l{font-size:10px;color:var(--gray-400);font-weight:500;margin-top:1px;}
.stat.c .n{color:var(--green);} .stat.w .n{color:var(--red);}

/* PROGRESS */
.prog-wrap{margin-bottom:16px;}
.prog-bg{background:var(--gray-200);border-radius:10px;height:7px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .4s;}
.prog-txt{font-size:11px;color:var(--gray-400);margin-top:4px;text-align:right;}

/* FILTER CARD */
.filter-card{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:18px;box-shadow:var(--shadow);}
.filter-lbl{font-size:10px;font-weight:700;color:var(--gray-400);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;}
.fb{background:var(--gray-100);border:1.5px solid var(--gray-200);color:var(--gray-600);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.fb:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.fb.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.fb.all.active{background:var(--gold);color:var(--navy-dark);border-color:var(--gold);}

/* PASSAGE GROUP */
.pg-group{margin-bottom:24px;}
.pg-header{
  background:var(--navy);color:#fff;
  border-radius:var(--r) var(--r) 0 0;
  padding:14px 16px 12px;
}
.pg-num{font-size:11px;font-weight:700;color:var(--gold-light);letter-spacing:.5px;margin-bottom:3px;}
.pg-title{font-size:14px;font-weight:900;line-height:1.4;}
.pg-source{font-size:11px;color:rgba(255,255,255,.55);margin-top:4px;}

/* PASSAGE TEXT BOX */
.pg-text-wrap{background:#fff;border-left:none;}
.pg-text-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;cursor:pointer;
  border-bottom:1px solid var(--gray-200);
  background:var(--gold-bg);
  font-size:12px;font-weight:700;color:var(--navy);
  user-select:none;
}
.pg-text-toggle:hover{background:rgba(201,162,39,0.14);}
.toggle-arrow{font-size:14px;transition:transform .25s;}
.toggle-arrow.open{transform:rotate(180deg);}
.pg-text-body{
  padding:16px;
  font-size:13px;line-height:2.0;
  color:#333;
  border-bottom:2px solid var(--gray-100);
  display:none;
  white-space:pre-wrap;
}
.pg-text-body.show{display:block;}
.pg-text-body mark{
  background:rgba(201,162,39,0.25);
  color:var(--navy-dark);
  border-radius:3px;
  padding:0 2px;
  font-weight:700;
}
.pg-text-body b{color:var(--navy);}
.pg-text-body i{
  font-style:normal;
  display:block;
  background:var(--gray-50);
  border-left:3px solid var(--gold);
  padding:8px 12px;
  margin:8px 0;
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  font-size:12px;
  line-height:1.7;
}

/* QUESTION CARD */
.q-card{
  background:#fff;
  border:2px solid var(--gray-200);
  margin-bottom:2px;
  transition:border-color .2s;
}
.q-card:last-child{border-radius:0 0 var(--r) var(--r);margin-bottom:0;}
.q-card.answered-correct{border-color:var(--green);}
.q-card.answered-wrong{border-color:var(--red);}

.q-top{padding:12px 14px 0;display:flex;align-items:flex-start;gap:8px;}
.q-num-badge{
  background:var(--navy);color:#fff;
  font-size:10px;font-weight:900;
  padding:3px 8px;border-radius:6px;
  white-space:nowrap;flex-shrink:0;margin-top:1px;
}
.q-type-badge{
  font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:12px;
  color:#fff;white-space:nowrap;flex-shrink:0;margin-top:1px;
}
.q-body{padding:10px 14px 4px;}
.q-text{font-size:13.5px;line-height:1.85;}
.q-text i{
  font-style:normal;
  background:var(--gray-50);
  border-left:3px solid var(--gold);
  padding:8px 12px;display:block;margin:8px 0;
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  font-size:12.5px;line-height:1.7;color:#444;
}
.q-text mark{
  background:rgba(201,162,39,0.25);
  border-radius:3px;padding:0 2px;
  font-weight:700;color:var(--navy-dark);
}

/* OPTIONS */
.opts{padding:6px 14px 14px;list-style:none;}
.opt{
  display:flex;align-items:flex-start;gap:9px;
  padding:9px 11px;margin-bottom:5px;
  border:1.5px solid var(--gray-200);border-radius:var(--r-sm);
  cursor:pointer;transition:all .15s;
  font-size:13px;line-height:1.55;
}
.opt:hover:not(.disabled){border-color:var(--navy);background:var(--navy-light);}
.opt-circle{
  width:20px;height:20px;border-radius:50%;
  background:var(--gray-200);color:var(--gray-600);
  font-size:10px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.opt.sel .opt-circle{background:var(--navy);color:#fff;}
.opt.ca{background:var(--green-bg);border-color:var(--green);}
.opt.ca .opt-circle{background:var(--green);color:#fff;}
.opt.wa{background:var(--red-bg);border-color:var(--red);}
.opt.wa .opt-circle{background:var(--red);color:#fff;}
.opt.disabled{cursor:default;}
.opt-ri{font-size:16px;margin-left:auto;flex-shrink:0;}

/* EXPLANATION */
.exp{
  margin:0 14px 14px;
  background:linear-gradient(135deg,rgba(27,42,94,.04),rgba(201,162,39,.07));
  border-left:4px solid var(--gold);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  padding:11px 13px;
  font-size:12.5px;line-height:1.75;
  color:var(--gray-800);display:none;
}
.exp.show{display:block;}
.exp-ttl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.3px;margin-bottom:4px;}
.exp b{color:var(--navy);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--gray-400);font-size:14px;}

/* RESULTS MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-ov.show{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px 22px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.m-emoji{font-size:50px;margin-bottom:10px;}
.m-title{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:6px;}
.m-score{font-size:38px;font-weight:900;color:var(--gold);margin-bottom:3px;}
.m-sub{font-size:13px;color:var(--gray-400);margin-bottom:20px;}
.m-break{display:flex;gap:10px;margin-bottom:20px;}
.m-stat{flex:1;padding:10px;background:var(--gray-50);border-radius:var(--r-sm);text-align:center;}
.m-stat .mn{font-size:22px;font-weight:900;} .m-stat .ml{font-size:11px;color:var(--gray-400);}
.m-btn{display:block;width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:8px;transition:background .2s;}
.m-btn:hover{background:var(--navy-dark);}
.m-btn.sec{background:var(--gray-100);color:var(--gray-800);}
.m-btn.sec:hover{background:var(--gray-200);}

/* BOTTOM BAR */
.bbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:10px 16px;display:flex;justify-content:center;gap:10px;z-index:99;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.bbar-btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.bbar-btn:hover{background:var(--navy-dark);transform:translateY(-1px);}
.bbar-btn.gold{background:var(--gold);color:var(--navy-dark);}
.bbar-btn.gold:hover{background:var(--gold-light);}
.bbar-btn.out{background:transparent;color:var(--navy);border:2px solid var(--navy);}

@media(max-width:480px){
  .hdr-title{font-size:11.5px;}
  .q-text{font-size:13px;}
  .opt{font-size:12.5px;padding:8px 10px;}
  .stat .n{font-size:18px;}
  .pg-title{font-size:13px;}
}
</style>

{"passage": "19번", "topic": "낯선 환경 속 불안이 새 친구의 관심으로 해소되다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"Not knowing how the day would go made him feel <u>[ anxious / anxiously ]</u>.\"</i>", "opts": ["anxious", "anxiously", "anxiety", "anxiousness"], "ans": 0, "exp": "사역동사 <b>make</b>의 목적격 보어 자리입니다. make+O+<b>형용사(OC)</b> 구조이므로 부사가 아닌 형용사 <b>anxious</b>가 정답입니다.", "passageTitle": "낯선 환경 속 불안이 새 친구의 관심으로 해소되다", "passageText": "Looking around the noisy cafeteria, Oliver gripped his tray tightly. He felt the heavy weight of being new to the school. <mark>Not knowing how the day would go made him feel anxious.</mark> He sat with a heavy sigh at a corner table. He thought, 'Can I <mark>make it through</mark> the rest of the day?'\n\nJust then, a plastic tray was placed down opposite him. It was a boy from his math class. \"Hey, is this seat taken? By the way, thanks for lending me that pen earlier.\" The invisible wall around Oliver seemed to melt away.\n\n\"Not at all, please sit,\" he replied. Starting to feel at ease, he smiled brightly at the boy.", "passageSource": "", "typeColor": "#2980b9", "typeIcon": "✏️"},
{"passage": "19번", "topic": "낯선 환경 속 불안이 새 친구의 관심으로 해소되다", "type": "심리변화", "q": "Oliver의 심리 변화로 가장 적절한 것은?", "opts": ["긴장 → 불안 → 편안함", "기대 → 실망 → 분노", "설렘 → 무관심 → 슬픔", "공포 → 당혹 → 외로움"], "ans": 0, "exp": "Oliver는 처음에 새 학교에서 <b>긴장(grip tightly)</b>하고, 알 수 없는 미래에 <b>불안(anxious)</b>을 느끼다가, 수학 수업 친구의 감사 인사로 보이지 않는 벽이 녹으며 <b>편안함(at ease)</b>을 느낍니다.", "passageTitle": "낯선 환경 속 불안이 새 친구의 관심으로 해소되다", "passageText": "Looking around the noisy cafeteria, Oliver gripped his tray tightly. He felt the heavy weight of being new to the school. <mark>Not knowing how the day would go made him feel anxious.</mark> He sat with a heavy sigh at a corner table. He thought, 'Can I <mark>make it through</mark> the rest of the day?'\n\nJust then, a plastic tray was placed down opposite him. It was a boy from his math class. \"Hey, is this seat taken? By the way, thanks for lending me that pen earlier.\" The invisible wall around Oliver seemed to melt away.\n\n\"Not at all, please sit,\" he replied. Starting to feel at ease, he smiled brightly at the boy.", "passageSource": "", "typeColor": "#c0392b", "typeIcon": "💭"},
{"passage": "20번", "topic": "전환기를 새로운 네트워크 형성의 출발점으로 삼아야 한다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"Being too focused can lead to becoming <u>________</u> — you have few remedies to the microstresses that are inevitably bombarding you at that time.\"</i>", "opts": ["unidimensional", "independent", "innovative", "productive"], "ans": 0, "exp": "<b>unidimensional(일차원적인)</b>: 지나친 집중이 삶의 균형을 무너뜨려 한 가지 측면에만 치우친 상태를 만든다는 내용입니다.", "passageTitle": "전환기를 새로운 네트워크 형성의 출발점으로 삼아야 한다", "passageText": "When moving into a new situation, many people decide that they need to master what's new. To this end, they reduce their connections to people or activities that might distract them from their goal. But that is a mistake.\n\n<mark>Being too focused can lead to becoming unidimensional</mark> — you have few remedies to the microstresses that are inevitably bombarding you at that time. So when things are <mark>tough</mark> during such a transition, you have almost nothing else in your life to counterbalance the stress.\n\nInstead of staying laser-focused, use this transition as the jumping-off point for building new networks to shape the work you want to do and whom you want to do it with.", "passageSource": "[from The Microstress Effect by Rob Cross, Karen Dillon]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "20번", "topic": "전환기를 새로운 네트워크 형성의 출발점으로 삼아야 한다", "type": "어휘", "q": "밑줄 친 <b>tough</b>와 의미가 가장 가까운 것은?<br><br><i>\"So when things are <u>tough</u> during such a transition...\"</i>", "opts": ["challenging", "boring", "straightforward", "familiar"], "ans": 0, "exp": "<b>tough</b>는 '(다루기) 힘든, 어려운'의 의미로, <b>challenging / demanding</b>이 유의어입니다.", "passageTitle": "전환기를 새로운 네트워크 형성의 출발점으로 삼아야 한다", "passageText": "When moving into a new situation, many people decide that they need to master what's new. To this end, they reduce their connections to people or activities that might distract them from their goal. But that is a mistake.\n\n<mark>Being too focused can lead to becoming unidimensional</mark> — you have few remedies to the microstresses that are inevitably bombarding you at that time. So when things are <mark>tough</mark> during such a transition, you have almost nothing else in your life to counterbalance the stress.\n\nInstead of staying laser-focused, use this transition as the jumping-off point for building new networks to shape the work you want to do and whom you want to do it with.", "passageSource": "[from The Microstress Effect by Rob Cross, Karen Dillon]", "typeColor": "#e67e22", "typeIcon": "📚"},

{"passage": "21번", "topic": "오답을 수용하는 안전한 환경이 수학적 성장을 이끈다", "type": "어휘", "q": "밑줄 친 <b>derogatory</b>와 의미가 가장 가까운 것은?<br><br><i>\"It is important to model and expect the acceptance of all ideas without <u>derogatory</u> comments.\"</i>", "opts": ["disrespectful", "encouraging", "thoughtful", "constructive"], "ans": 0, "exp": "<b>derogatory</b>는 '비하하는, 경멸적인'의 의미로, <b>disrespectful / belittling / degrading</b>이 유의어입니다.", "passageTitle": "오답을 수용하는 안전한 환경이 수학적 성장을 이끈다", "passageText": "A first step toward establishing a respectful classroom learning community is acceptance of all ideas and answers — regardless of any obvious errors. Rich mathematical discussions cannot occur if this expectation is not in place.\n\nWe must remember that wrong answers are often rooted in misconceptions, and unless these ideas are allowed <mark>to be brought</mark> to the forefront, we cannot help students confront their thinking.\n\nStudents who are in safe learning environments are willing to risk sharing an incorrect answer with their peers in order to grow mathematically. It is important to model and expect the acceptance of all ideas without <mark>derogatory</mark> comments. The teacher may need to practice having a \"blank face.\" ", "passageSource": "[from Number Talks by Sherry Parrish]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "21번", "topic": "오답을 수용하는 안전한 환경이 수학적 성장을 이끈다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"unless these ideas are allowed <u>[ to bring / to be brought ]</u> to the forefront\"</i>", "opts": ["to bring", "to be brought", "bringing", "being brought"], "ans": 1, "exp": "these ideas는 '앞으로 드러나게 되는' 수동의 관계이므로 <b>to부정사의 수동형(to be brought)</b>이 정답입니다.", "passageTitle": "오답을 수용하는 안전한 환경이 수학적 성장을 이끈다", "passageText": "A first step toward establishing a respectful classroom learning community is acceptance of all ideas and answers — regardless of any obvious errors. Rich mathematical discussions cannot occur if this expectation is not in place.\n\nWe must remember that wrong answers are often rooted in misconceptions, and unless these ideas are allowed <mark>to be brought</mark> to the forefront, we cannot help students confront their thinking.\n\nStudents who are in safe learning environments are willing to risk sharing an incorrect answer with their peers in order to grow mathematically. It is important to model and expect the acceptance of all ideas without <mark>derogatory</mark> comments. The teacher may need to practice having a \"blank face.\" ", "passageSource": "[from Number Talks by Sherry Parrish]", "typeColor": "#2980b9", "typeIcon": "✏️"},
{"passage": "21번", "topic": "오답을 수용하는 안전한 환경이 수학적 성장을 이끈다", "type": "내용이해", "q": "교사가 학생의 답변에 취해야 할 태도로 글의 내용과 일치하지 <b>않는</b> 것은?", "opts": ["모든 답을 기록한다.", "동의 또는 이견을 나타내는 표현을 삼간다.", "즉시 틀린 답을 수정해준다.", "무표정(blank face)을 연습한다."], "ans": 2, "exp": "글에서는 틀린 답도 즉시 수정하지 말고 <b>모든 답을 수용</b>하고, 동의/이견을 표현하지 않으며 기록해야 한다고 합니다. 즉시 수정하는 것은 글의 내용과 반대입니다.", "passageTitle": "오답을 수용하는 안전한 환경이 수학적 성장을 이끈다", "passageText": "A first step toward establishing a respectful classroom learning community is acceptance of all ideas and answers — regardless of any obvious errors. Rich mathematical discussions cannot occur if this expectation is not in place.\n\nWe must remember that wrong answers are often rooted in misconceptions, and unless these ideas are allowed <mark>to be brought</mark> to the forefront, we cannot help students confront their thinking.\n\nStudents who are in safe learning environments are willing to risk sharing an incorrect answer with their peers in order to grow mathematically. It is important to model and expect the acceptance of all ideas without <mark>derogatory</mark> comments. The teacher may need to practice having a \"blank face.\" ", "passageSource": "[from Number Talks by Sherry Parrish]", "typeColor": "#27ae60", "typeIcon": "🔍"},
{"passage": "22번", "topic": "역 내 혼선을 막기 위해 이용객의 동선 분리가 필요하다", "type": "어휘", "q": "밑줄 친 <b>in a hurry</b>와 의미가 가장 가까운 것은?<br><br><i>\"Commuters ... are usually <u>in a hurry</u>.\"</i>", "opts": ["pressed for time", "in a good mood", "at a loss", "in advance"], "ans": 0, "exp": "<b>in a hurry</b>는 '서두르는, 급한'의 의미로, <b>rushing / pressed for time / in a rush / in haste</b>가 유의어입니다.", "passageTitle": "역 내 혼선을 막기 위해 이용객의 동선 분리가 필요하다", "passageText": "The usual intercity traveler moves slowly through the station area. The passenger may not be familiar with the routine, have baggage to handle and check or retrieve, have a long wait for connections or delayed trains, and may require information, food, and a comfortable place to sit.\n\nCommuters, on the other hand, are familiar with the route through the station, have little or no luggage, and are usually <mark>in a hurry</mark>. They want direct access to or from local streets and transport.\n\n<mark>These two types of traffic should be kept separate to avoid conflict and confusion.</mark> In some large stations such as Grand Central Terminal in New York City, commuter and intercity trains arrive and depart on different levels. In smaller stations, separate platforms should be used and traffic routed <mark>so that the two lines of movement do not cross.</mark>", "passageSource": "[from Transportation Planning by ITE]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "22번", "topic": "역 내 혼선을 막기 위해 이용객의 동선 분리가 필요하다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"In smaller stations, separate platforms should be used and traffic routed <u>so that ________</u>.\"</i>", "opts": ["the two lines of movement do not cross", "commuters can travel faster", "intercity travelers have more space", "the station becomes less crowded"], "ans": 0, "exp": "동선 분리의 목적은 <b>두 이동 흐름이 서로 교차하지 않도록</b> 하는 것입니다. so that 절에는 '두 동선이 교차하지 않는다'는 내용이 와야 합니다.", "passageTitle": "역 내 혼선을 막기 위해 이용객의 동선 분리가 필요하다", "passageText": "The usual intercity traveler moves slowly through the station area. The passenger may not be familiar with the routine, have baggage to handle and check or retrieve, have a long wait for connections or delayed trains, and may require information, food, and a comfortable place to sit.\n\nCommuters, on the other hand, are familiar with the route through the station, have little or no luggage, and are usually <mark>in a hurry</mark>. They want direct access to or from local streets and transport.\n\n<mark>These two types of traffic should be kept separate to avoid conflict and confusion.</mark> In some large stations such as Grand Central Terminal in New York City, commuter and intercity trains arrive and depart on different levels. In smaller stations, separate platforms should be used and traffic routed <mark>so that the two lines of movement do not cross.</mark>", "passageSource": "[from Transportation Planning by ITE]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "23번", "topic": "공연의 조명 변화는 극적 동기에 근거하여 설계되어야 한다", "type": "어휘", "q": "밑줄 친 <b>triggers</b>와 의미가 가장 가까운 것은?<br><br><i>\"Each lighting cue <u>triggers</u> a change to a new state.\"</i>", "opts": ["causes", "prevents", "delays", "removes"], "ans": 0, "exp": "<b>triggers</b>는 '유발하다, 이끌어내다'의 의미로, <b>causes / brings about / leads to</b>가 유의어입니다.", "passageTitle": "공연의 조명 변화는 극적 동기에 근거하여 설계되어야 한다", "passageText": "Most performance lighting is made up of a number of different looks which we have called lighting states. Each lighting cue <mark>triggers</mark> a change to a new state. Like actors, lighting cues usually need a motivation.\n\nThis might be something very obvious such as a cue <mark>required</mark> to brighten a room setting when an actor turns on a light switch, or the rapid increase in intensity at the end of a dance number in a traditional musical (known as a button cue).\n\nAt other times we will need a cue to provide a subtle change in atmosphere over a number of minutes, motivated perhaps by the mention of a sunset or the intention to slowly change the feel of the performance from normal to threatening. The question, 'What will lighting do for this production?' needs to be asked for each moment of the production, each dramatic unit or scene, and each transition.", "passageSource": "[from Performance Lighting Design by Nick Moran]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "23번", "topic": "공연의 조명 변화는 극적 동기에 근거하여 설계되어야 한다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"such as a cue <u>[ requiring / required ]</u> to brighten a room setting when an actor turns on a light switch\"</i>", "opts": ["requiring", "required", "to require", "having required"], "ans": 1, "exp": "a cue는 '요구되는' 수동의 관계이므로 <b>과거분사 required</b>가 정답입니다. (which is) required가 생략된 형태입니다.", "passageTitle": "공연의 조명 변화는 극적 동기에 근거하여 설계되어야 한다", "passageText": "Most performance lighting is made up of a number of different looks which we have called lighting states. Each lighting cue <mark>triggers</mark> a change to a new state. Like actors, lighting cues usually need a motivation.\n\nThis might be something very obvious such as a cue <mark>required</mark> to brighten a room setting when an actor turns on a light switch, or the rapid increase in intensity at the end of a dance number in a traditional musical (known as a button cue).\n\nAt other times we will need a cue to provide a subtle change in atmosphere over a number of minutes, motivated perhaps by the mention of a sunset or the intention to slowly change the feel of the performance from normal to threatening. The question, 'What will lighting do for this production?' needs to be asked for each moment of the production, each dramatic unit or scene, and each transition.", "passageSource": "[from Performance Lighting Design by Nick Moran]", "typeColor": "#2980b9", "typeIcon": "✏️"},

{"passage": "24번", "topic": "공간의 음향 특성은 소리 재생과 녹음 결과에 영향을 미친다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"Rooms have their own 'sound' because they impose their own characteristics on audio signals <u>[ containing / contained ]</u> within them.\"</i>", "opts": ["containing", "contained", "to contain", "having contained"], "ans": 1, "exp": "audio signals는 방 안에 '담겨있는' 수동의 관계이므로 <b>과거분사 contained</b>가 정답입니다.", "passageTitle": "공간의 음향 특성은 소리 재생과 녹음 결과에 영향을 미친다", "passageText": "Rooms have their own \"sound\" because they impose their own characteristics on audio signals <mark>contained within them.</mark> It's actually kind of remarkable. Sound such as music coming from headphones will sound the same everywhere. No matter what acoustical environment we are in, the headphones sound the same. That's because the room is not part of that playback signal path.\n\nBut sound such as music from a loudspeaker will sound different in every acoustical environment. Every room where you set up the loudspeaker will cause the sound you hear to be different — <mark>sometimes dramatically different</mark>; that is because the room is now part of the signal path.\n\nAlso, in the same room, the loudspeaker will sound different when it is placed in different locations in the room and it will sound different as you move around the room.", "passageSource": "[from Handbook of Sound Studio Construction by Ken C. Pohlmann]", "typeColor": "#2980b9", "typeIcon": "✏️"},

{"passage": "29번", "topic": "산업 혁명의 공장 체제는 효율과 품질을 동시에 향상시켰다", "type": "어휘", "q": "밑줄 친 <b>no more than</b>과 의미가 가장 가까운 것은?<br><br><i>\"even the largest piano makers ... produced <u>no more than</u> 5-10 pianos per year per worker\"</i>", "opts": ["only", "at least", "more than", "as many as"], "ans": 0, "exp": "<b>no more than</b>은 '겨우, 단지(only)'의 의미입니다. '최소'를 뜻하는 no less than과 혼동하지 않도록 주의합니다.", "passageTitle": "산업 혁명의 공장 체제는 효율과 품질을 동시에 향상시켰다", "passageText": "The Industrial Revolution did more than just invent new materials or machines. It invented a new <mark>process</mark> for manufacturing: the modern factory.\n\nPrior to around 1850, most piano shops used an apprentice system in which a master builder taught younger workers the skills of the trade, usually over the course of many years. But even the largest piano makers of that time produced <mark>no more than</mark> 5-10 pianos per year per worker, as pianos were still made essentially one at a time.\n\nThe development of a true piano factory occurred first in the United States, <mark>led</mark> by Jonas Chickering in Boston and later the Steinway family in New York City. These factories led to improvements in both efficiency and quality.", "passageSource": "[from Physics of the Piano by Nicholas J. Giordano]", "typeColor": "#e67e22", "typeIcon": "📚"},

{"passage": "30번", "topic": "박사과정의 한계를 보완할 구조화된 통합 교육이 필요하다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"while this deep dive into a particular area allows for thorough exploration and understanding, it can also result in ________.\"</i>", "opts": ["narrowing the focus", "broadening the skills", "increasing collaboration", "finding new fields"], "ans": 0, "exp": "특정 영역에 깊이 몰두하는 것은 초점을 <b>좁히는(narrowing the focus)</b> 결과를 가져올 수 있다는 것이 핵심입니다. restricting the scope of vision도 유의어입니다.", "passageTitle": "박사과정의 한계를 보완할 구조화된 통합 교육이 필요하다", "passageText": "In a thesis-based doctoral programme, students typically spend a significant amount of time and effort researching a specific topic. While this deep dive into a particular area allows for thorough exploration and understanding, it can also result in <mark>narrowing the focus.</mark>\n\nAs students become deeply <mark>absorbed in</mark> their research, they may spend less time exploring related fields or acquiring skills outside their immediate area of study. Consequently, this singular focus may limit the breadth of knowledge and skills developed during the programme, potentially hindering students' ability to adapt to diverse career paths or address interdisciplinary challenges.\n\nSome universities in Europe have recognised the limitations of traditional thesis-based doctoral programmes and have started to implement more structured approaches. These structured programmes often combine research with coursework and training in transferable skills.", "passageSource": "[from Social Implications of Research in Higher Education by Andile Alfred Mdikana]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "30번", "topic": "박사과정의 한계를 보완할 구조화된 통합 교육이 필요하다", "type": "어휘", "q": "밑줄 친 <b>absorbed in</b>과 의미가 가장 가까운 것은?<br><br><i>\"As students become deeply <u>absorbed in</u> their research\"</i>", "opts": ["immersed in", "bored with", "distracted from", "satisfied with"], "ans": 0, "exp": "<b>absorbed in</b>은 '~에 몰두한, 빠져있는'의 의미로, <b>immersed in / engaged in</b>이 유의어입니다.", "passageTitle": "박사과정의 한계를 보완할 구조화된 통합 교육이 필요하다", "passageText": "In a thesis-based doctoral programme, students typically spend a significant amount of time and effort researching a specific topic. While this deep dive into a particular area allows for thorough exploration and understanding, it can also result in <mark>narrowing the focus.</mark>\n\nAs students become deeply <mark>absorbed in</mark> their research, they may spend less time exploring related fields or acquiring skills outside their immediate area of study. Consequently, this singular focus may limit the breadth of knowledge and skills developed during the programme, potentially hindering students' ability to adapt to diverse career paths or address interdisciplinary challenges.\n\nSome universities in Europe have recognised the limitations of traditional thesis-based doctoral programmes and have started to implement more structured approaches. These structured programmes often combine research with coursework and training in transferable skills.", "passageSource": "[from Social Implications of Research in Higher Education by Andile Alfred Mdikana]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "31번", "topic": "공포와 같은 감정은 아동의 상상·현실 구분 능력을 방해한다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"research shows that children have a more difficult time <u>[ display / displaying ]</u> their understanding\"</i>", "opts": ["display", "displaying", "displayed", "to display"], "ans": 1, "exp": "<b>have a difficult time v-ing</b>: '~하는 데 어려움을 겪다'는 표현에서 동명사 형태인 <b>displaying</b>이 정답입니다.", "passageTitle": "공포와 같은 감정은 아동의 상상·현실 구분 능력을 방해한다", "passageText": "Research shows that, by age three, children understand that imaginary objects do not come to life. This is especially clear with respect to everyday objects — children know that even though they imagine a pencil in an empty box, the box will remain empty.\n\nHowever, emotion can sometimes <mark>disrupt</mark> this understanding, or at least its expression. That is, even though a child knows that monsters are not real, the thought of a monster under a bed might be enough to make a child refuse to go into his room at night.\n\nIndeed, research shows that children have a more difficult time <mark>displaying</mark> their understanding of the causal relations between imagination and reality when they are asked to pretend or imagine scary things, like monsters. In one study, preschool children were shown an empty box and were asked to imagine a monster inside. All children agreed that the box was empty. However, when they were left alone with the box they exhibited fear and avoidance of it.", "passageSource": "[from Encyclopedia of Infant and Early Childhood Development]", "typeColor": "#2980b9", "typeIcon": "✏️"},

{"passage": "32번", "topic": "미적 경험은 일상의 완전한 경험이 심화된 형태이다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"In that book Dewey argued against <u>________</u> by basing aesthetic experience on the biological and cultural conditions of human life.\"</i>", "opts": ["the separation of art from life", "the development of art museums", "the influence of science on art", "the commercialization of culture"], "ans": 0, "exp": "Dewey는 <b>예술과 삶의 분리(the separation of art from life)</b>에 반대했으며, 미적 경험을 인간 삶의 조건에 기초시켰습니다.", "passageTitle": "미적 경험은 일상의 완전한 경험이 심화된 형태이다", "passageText": "Perhaps the best-known development to emerge from the liberation and expansion of aesthetic experience is the aesthetics of everyday life. Although there is presently a flowering of work on everyday aesthetics, the possibility of aesthetic gratification in ordinary objects and events has long been recognized, even if degraded and dismissed by <mark>prevalent</mark> philosophical theory.\n\nIn that book Dewey argued against <mark>the separation of art from life</mark> by basing aesthetic experience on the biological and cultural conditions of human life. He located the aesthetic, not in an internalized awareness of sensation and feeling, but in \"a complete interpenetration of self and the world of objects and events.\"\n\nFurther, Dewey maintained that \"the aesthetic is the clarified and intensified development of traits that belong to every normally complete experience.\" ", "passageSource": "[from The Social Aesthetics of Human Environments by Arnold Berleant]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "32번", "topic": "미적 경험은 일상의 완전한 경험이 심화된 형태이다", "type": "어휘", "q": "밑줄 친 <b>prevalent</b>와 의미가 가장 가까운 것은?<br><br><i>\"even if degraded and dismissed by <u>prevalent</u> philosophical theory\"</i>", "opts": ["widespread", "ancient", "opposing", "sophisticated"], "ans": 0, "exp": "<b>prevalent</b>는 '지배적인, 널리 퍼진'의 의미로, <b>widespread / dominant / common</b>이 유의어입니다.", "passageTitle": "미적 경험은 일상의 완전한 경험이 심화된 형태이다", "passageText": "Perhaps the best-known development to emerge from the liberation and expansion of aesthetic experience is the aesthetics of everyday life. Although there is presently a flowering of work on everyday aesthetics, the possibility of aesthetic gratification in ordinary objects and events has long been recognized, even if degraded and dismissed by <mark>prevalent</mark> philosophical theory.\n\nIn that book Dewey argued against <mark>the separation of art from life</mark> by basing aesthetic experience on the biological and cultural conditions of human life. He located the aesthetic, not in an internalized awareness of sensation and feeling, but in \"a complete interpenetration of self and the world of objects and events.\"\n\nFurther, Dewey maintained that \"the aesthetic is the clarified and intensified development of traits that belong to every normally complete experience.\" ", "passageSource": "[from The Social Aesthetics of Human Environments by Arnold Berleant]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "33번", "topic": "도덕적 우월성은 도덕적 행위자들 사이에서만 비교 가능하다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"This would not be the case, however, if humans <u>[ were judged / were being judged ]</u> superior to animals and plants\"</i>", "opts": ["were judged", "were being judged", "had been judged", "are judged"], "ans": 1, "exp": "진행형 수동태 <b>were being judged</b>: '판단되고 있는(중인)' 상황을 나타내는 진행형 수동 표현입니다.", "passageTitle": "도덕적 우월성은 도덕적 행위자들 사이에서만 비교 가능하다", "passageText": "One cannot validly argue that humans are morally superior beings on the ground that they possess, while others lack, the capacities of a moral agent. The reason is that, as far as moral standards are concerned, only beings that have the capacities of a moral agent can meaningfully be said to be either morally good or morally bad.\n\n<mark>Only moral agents can be judged to be morally better or worse than others,</mark> and the others in question must be moral agents themselves. Judgments of moral superiority are based on the comparative merits or deficiencies of the entities being judged, and these merits and deficiencies are all moral ones, that is, ones <mark>determined</mark> by moral standards.\n\nThis would not be the case, however, if humans <mark>were being judged</mark> superior to animals and plants, since the latter are not moral agents.", "passageSource": "[from Respect for Nature by Paul W. Taylor]", "typeColor": "#2980b9", "typeIcon": "✏️"},
{"passage": "33번", "topic": "도덕적 우월성은 도덕적 행위자들 사이에서만 비교 가능하다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"these merits and deficiencies are all moral ones, that is, ones <u>________</u> by moral standards.\"</i>", "opts": ["determined", "ignored", "created", "replaced"], "ans": 0, "exp": "장점과 단점은 도덕적 기준에 의해 <b>결정되는(determined)</b> 것들입니다. 과거분사구가 ones를 수식하는 구조입니다.", "passageTitle": "도덕적 우월성은 도덕적 행위자들 사이에서만 비교 가능하다", "passageText": "One cannot validly argue that humans are morally superior beings on the ground that they possess, while others lack, the capacities of a moral agent. The reason is that, as far as moral standards are concerned, only beings that have the capacities of a moral agent can meaningfully be said to be either morally good or morally bad.\n\n<mark>Only moral agents can be judged to be morally better or worse than others,</mark> and the others in question must be moral agents themselves. Judgments of moral superiority are based on the comparative merits or deficiencies of the entities being judged, and these merits and deficiencies are all moral ones, that is, ones <mark>determined</mark> by moral standards.\n\nThis would not be the case, however, if humans <mark>were being judged</mark> superior to animals and plants, since the latter are not moral agents.", "passageSource": "[from Respect for Nature by Paul W. Taylor]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "34번", "topic": "AI는 침묵을 의미로 인식하기 시작했으나, 여전히 소리를 선호한다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"...indicate the AI's continuing preferences <u>________</u>.\"</i>", "opts": ["for sound over silence, for presence over absence", "for silence over sound, for absence over presence", "for accuracy over speed", "for human interaction over machine"], "ans": 0, "exp": "AI는 아직 침묵보다는 <b>소리를, 부재보다는 존재를 선호</b>합니다. 이것이 AI의 인간다움의 한계를 보여줍니다.", "passageTitle": "AI는 침묵을 의미로 인식하기 시작했으나, 여전히 소리를 선호한다", "passageText": "Such artificial 'pause fillers' as machine-generated supplements for silence may help to produce a more natural-sounding cadence in machine-generated speech patterns and so help to convince the AI's human interlocutors that they are engaging with another human. AI's 'humanity' of silence emerges in these contexts not least because a short period of silence is likely to be interpreted as a 'pause for thought'.\n\nHowever, the technical issues <mark>flagged in</mark> AI's poor handling of higher duration and frequency silences, no less than the machine inference that silence can be filled with relevant sounds in some conversational situations, are both significant.\n\nIn this context at least, the AI may be starting to recognise silence not as an absence but as meaningful data. Yet the AI's confusion when presented with substantial silences ... indicate the AI's continuing preferences <mark>for sound over silence, for presence over absence.</mark>", "passageSource": "[from The Routledge Handbook of AI and Literature]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "34번", "topic": "AI는 침묵을 의미로 인식하기 시작했으나, 여전히 소리를 선호한다", "type": "어휘", "q": "밑줄 친 <b>flagged in</b>과 의미가 가장 가까운 것은?<br><br><i>\"the technical issues <u>flagged in</u> AI's poor handling of silences\"</i>", "opts": ["revealed in", "hidden in", "created by", "resolved in"], "ans": 0, "exp": "<b>flagged in</b>은 '~에서 두드러지는, 드러나는'의 의미로, <b>revealed in / highlighted in</b>이 유의어입니다.", "passageTitle": "AI는 침묵을 의미로 인식하기 시작했으나, 여전히 소리를 선호한다", "passageText": "Such artificial 'pause fillers' as machine-generated supplements for silence may help to produce a more natural-sounding cadence in machine-generated speech patterns and so help to convince the AI's human interlocutors that they are engaging with another human. AI's 'humanity' of silence emerges in these contexts not least because a short period of silence is likely to be interpreted as a 'pause for thought'.\n\nHowever, the technical issues <mark>flagged in</mark> AI's poor handling of higher duration and frequency silences, no less than the machine inference that silence can be filled with relevant sounds in some conversational situations, are both significant.\n\nIn this context at least, the AI may be starting to recognise silence not as an absence but as meaningful data. Yet the AI's confusion when presented with substantial silences ... indicate the AI's continuing preferences <mark>for sound over silence, for presence over absence.</mark>", "passageSource": "[from The Routledge Handbook of AI and Literature]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "35번", "topic": "인쇄술은 정확한 복제와 표준화를 가능하게 하여 정확성을 높였다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"<u>________</u> of information was an effect of printing; since it allowed exact reproduction of information in a way that manuscript copying did not.\"</i>", "opts": ["Standardization", "Destruction", "Limitation", "Collection"], "ans": 0, "exp": "인쇄술은 정보를 정확하게 복제할 수 있어 정보의 <b>표준화(Standardization)</b>를 가능하게 했습니다.", "passageTitle": "인쇄술은 정확한 복제와 표준화를 가능하게 하여 정확성을 높였다", "passageText": "<mark>Standardization</mark> of information was an effect of printing; since it allowed exact reproduction of information in a way that manuscript copying did not.\n\nAfter his return from China in 1295, a century and a half before printing, Polo's narrative was copied in about 150 different manuscripts, with so many differences that we're not sure which version is authentic. In contrast, there is only one version of Christopher Columbus's letters about the exploration of the Caribbean in the 1490s, since they were <mark>fixed</mark> in printed form and widely distributed at the time they were written.\n\nSo the certainty of accuracy was a way that printing was an improvement over the old oral manuscript culture.", "passageSource": "[from Revolutions in Communication by Bill Kovarik]", "typeColor": "#8e44ad", "typeIcon": "🔲"},

{"passage": "36번", "topic": "인구 증가로 식량 수요는 급증하나, 가용 농지는 제한적이다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"<u>[ It / That ]</u> is projected that by 2050, the world's population will increase to 9.7 billion\"</i>", "opts": ["It", "That", "This", "There"], "ans": 0, "exp": "<b>It is projected that ~</b>: '~로 예상된다'는 수동태 구문에서 가주어 <b>It</b>을 사용합니다. That은 가주어로 쓸 수 없습니다.", "passageTitle": "인구 증가로 식량 수요는 급증하나, 가용 농지는 제한적이다", "passageText": "Archaeological evidence suggests that various crops were being cultivated as early as 9500 BC in the Levant. Over the millennia, continuous innovations have <mark>boosted</mark> agricultural productivity while reducing manual labor.\n\nHowever, the growing global population will always demand more food. <mark>It is projected</mark> that by 2050, the world's population will increase to 9.7 billion, which will require global food production to rise by at least 70% to meet demand.\n\nDespite this need, only a small portion of the Earth's surface is suitable for farming due to limitations such as climate, topography, soil quality, and technology. In fact, the amount of land used for agriculture has been declining — in 2013, around 18.6 million square miles was used for food production, compared to 19.5 million square miles in 1991.", "passageSource": "[from Smart Farming, Smarter Solutions]", "typeColor": "#2980b9", "typeIcon": "✏️"},
{"passage": "36번", "topic": "인구 증가로 식량 수요는 급증하나, 가용 농지는 제한적이다", "type": "어휘", "q": "밑줄 친 <b>boost</b>와 의미가 가장 가까운 것은?<br><br><i>\"continuous innovations have <u>boosted</u> agricultural productivity\"</i>", "opts": ["enhanced", "reduced", "ignored", "replaced"], "ans": 0, "exp": "<b>boost</b>는 '증가시키다, 향상시키다'의 의미로, <b>enhanced / increased</b>가 유의어입니다. 반의어는 hindered(방해하다)입니다.", "passageTitle": "인구 증가로 식량 수요는 급증하나, 가용 농지는 제한적이다", "passageText": "Archaeological evidence suggests that various crops were being cultivated as early as 9500 BC in the Levant. Over the millennia, continuous innovations have <mark>boosted</mark> agricultural productivity while reducing manual labor.\n\nHowever, the growing global population will always demand more food. <mark>It is projected</mark> that by 2050, the world's population will increase to 9.7 billion, which will require global food production to rise by at least 70% to meet demand.\n\nDespite this need, only a small portion of the Earth's surface is suitable for farming due to limitations such as climate, topography, soil quality, and technology. In fact, the amount of land used for agriculture has been declining — in 2013, around 18.6 million square miles was used for food production, compared to 19.5 million square miles in 1991.", "passageSource": "[from Smart Farming, Smarter Solutions]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "37번", "topic": "친족 어휘는 핵심 용어를 기반으로 체계적으로 예측 가능하다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"the probability that a specific kin relationship has a label is <u>________</u> based on the other kinship terms in the language.\"</i>", "opts": ["predictable", "random", "cultural", "impossible"], "ans": 0, "exp": "특정 친족 관계가 명칭을 가질 확률은 해당 언어의 다른 친족 용어들을 기반으로 <b>예측 가능(predictable)</b>합니다.", "passageTitle": "친족 어휘는 핵심 용어를 기반으로 체계적으로 예측 가능하다", "passageText": "If you are going to compare languages, it helps to start with something that you are confident you can find in all languages. Take for example signs or words for mother and father.\n\nComparative typological studies of kinship terminology have discovered that languages have labels for some but not all family relationships. And the probability that a specific kin relationship has a label is <mark>predictable</mark> based on the other kinship terms in the language.\n\nFor example, all languages have a core set of kinship terms — like mother and father. By contrast, terms for less central category members are often built up from the core terms — like mother-in-law and stepfather. If we compare languages across the world, we can ask what kinship relationships are typically expressed with core terminology, and what relationships are expressed by <mark>modifying</mark> the core terminology.", "passageSource": "[from Understanding Signed Languages]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "37번", "topic": "친족 어휘는 핵심 용어를 기반으로 체계적으로 예측 가능하다", "type": "어휘", "q": "밑줄 친 <b>modifying</b>과 의미가 가장 가까운 것은?<br><br><i>\"what relationships are expressed by <u>modifying</u> the core terminology\"</i>", "opts": ["altering", "ignoring", "replacing", "translating"], "ans": 0, "exp": "<b>modifying</b>은 '변형하다, 수정하다'의 의미로, <b>altering / adjusting</b>이 유의어입니다.", "passageTitle": "친족 어휘는 핵심 용어를 기반으로 체계적으로 예측 가능하다", "passageText": "If you are going to compare languages, it helps to start with something that you are confident you can find in all languages. Take for example signs or words for mother and father.\n\nComparative typological studies of kinship terminology have discovered that languages have labels for some but not all family relationships. And the probability that a specific kin relationship has a label is <mark>predictable</mark> based on the other kinship terms in the language.\n\nFor example, all languages have a core set of kinship terms — like mother and father. By contrast, terms for less central category members are often built up from the core terms — like mother-in-law and stepfather. If we compare languages across the world, we can ask what kinship relationships are typically expressed with core terminology, and what relationships are expressed by <mark>modifying</mark> the core terminology.", "passageSource": "[from Understanding Signed Languages]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "38번", "topic": "가상 역할 놀이에서 정보 공유를 위해 배역 밖 소통도 필요하다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"There are several ways that participants in a make-believe can <u>________</u> things about the fictional world to other participants.\"</i>", "opts": ["communicate", "ignore", "destroy", "memorize"], "ans": 0, "exp": "가상 역할 놀이 참가자들이 허구 세계에 대한 것을 서로 <b>전달하는(communicate)</b> 다양한 방법이 있다는 내용입니다.", "passageTitle": "가상 역할 놀이에서 정보 공유를 위해 배역 밖 소통도 필요하다", "passageText": "There are several ways that participants in a make-believe can <mark>communicate</mark> things about the fictional world to other participants. Sometimes these messages are emitted naturally as a result of full participation in the fictional world — i.e., something said or done by a player while in character communicates some things that are fictional of that world.\n\nFor example, a child pretending to be Peter Pan might gasp and draw a plastic knife. This might be sufficient to communicate that fictionally one of Peter's enemies, such as Captain Hook, is approaching.\n\nThese in-character behaviors can be insufficient, however, to maintain the necessary amount of common ground about what is fictional in the world of the make-believe. At these times participants often come at least partly out of character to give <mark>other participants</mark> the information they need. For example, it would be important to avoid confusion about who is playing which character: \"No, you're Captain Hook, and I'm Peter Pan!\" ", "passageSource": "[from Culturally Sustainable Social Robotics]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "38번", "topic": "가상 역할 놀이에서 정보 공유를 위해 배역 밖 소통도 필요하다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"there are several ways ... to other participants <u>[ other / another ]</u>\"</i>", "opts": ["other participants", "another participants", "the other participant", "others participant"], "ans": 0, "exp": "<b>other + 복수명사</b>: '다른 ~들'을 나타낼 때는 other + 복수명사 형태인 <b>other participants</b>가 맞습니다. another는 단수명사 앞에 씁니다.", "passageTitle": "가상 역할 놀이에서 정보 공유를 위해 배역 밖 소통도 필요하다", "passageText": "There are several ways that participants in a make-believe can <mark>communicate</mark> things about the fictional world to other participants. Sometimes these messages are emitted naturally as a result of full participation in the fictional world — i.e., something said or done by a player while in character communicates some things that are fictional of that world.\n\nFor example, a child pretending to be Peter Pan might gasp and draw a plastic knife. This might be sufficient to communicate that fictionally one of Peter's enemies, such as Captain Hook, is approaching.\n\nThese in-character behaviors can be insufficient, however, to maintain the necessary amount of common ground about what is fictional in the world of the make-believe. At these times participants often come at least partly out of character to give <mark>other participants</mark> the information they need. For example, it would be important to avoid confusion about who is playing which character: \"No, you're Captain Hook, and I'm Peter Pan!\" ", "passageSource": "[from Culturally Sustainable Social Robotics]", "typeColor": "#2980b9", "typeIcon": "✏️"},
{"passage": "39번", "topic": "특정한 기압 환경이 물질 상태에 대한 인간의 직관을 만든다", "type": "어휘", "q": "밑줄 친 <b>trivial</b>과 의미가 가장 가까운 것은?<br><br><i>\"the pressure changes we experience are <u>trivial</u> compared to the pressure range of the overall planetary environment.\"</i>", "opts": ["insignificant", "enormous", "dangerous", "measurable"], "ans": 0, "exp": "<b>trivial</b>은 '아주 작은, 미미한'의 의미로, <b>insignificant / negligible</b>이 유의어입니다. 반의어는 enormous(거대한)입니다.", "passageTitle": "특정한 기압 환경이 물질 상태에 대한 인간의 직관을 만든다", "passageText": "Our intuition about states of matter comes from our experience on Earth's surface, where the pressure is uniformly low and variations in temperature cause changes in the state of matter from solid to liquid to gas. Therefore, when we think of melting or boiling or the creation of plasma, we intuitively assume <mark>it reflects an increase in temperature.</mark>\n\nThis bias comes from the fact that we live in a very constant pressure environment. But the pressure changes we experience are <mark>trivial</mark> compared to the pressure range of the overall planetary environment.\n\nSince pressure is controlled by the weight of overlying material, pressures increase rapidly with depth. For this reason a planet's pressure ranges are enormous — from essentially zero pressure in space to pressures of millions of atmospheres in planetary interiors.", "passageSource": "[from How to Build a Habitable Planet]", "typeColor": "#e67e22", "typeIcon": "📚"},
{"passage": "39번", "topic": "특정한 기압 환경이 물질 상태에 대한 인간의 직관을 만든다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"we intuitively assume it reflects <u>________</u>.\"</i>", "opts": ["an increase in temperature", "a decrease in pressure", "a change in volume", "a rise in humidity"], "ans": 0, "exp": "지구 표면의 낮은 압력 환경에서 자라난 우리는 물질 상태 변화가 <b>온도 상승(an increase in temperature)</b>을 반영한다고 직관적으로 추정합니다.", "passageTitle": "특정한 기압 환경이 물질 상태에 대한 인간의 직관을 만든다", "passageText": "Our intuition about states of matter comes from our experience on Earth's surface, where the pressure is uniformly low and variations in temperature cause changes in the state of matter from solid to liquid to gas. Therefore, when we think of melting or boiling or the creation of plasma, we intuitively assume <mark>it reflects an increase in temperature.</mark>\n\nThis bias comes from the fact that we live in a very constant pressure environment. But the pressure changes we experience are <mark>trivial</mark> compared to the pressure range of the overall planetary environment.\n\nSince pressure is controlled by the weight of overlying material, pressures increase rapidly with depth. For this reason a planet's pressure ranges are enormous — from essentially zero pressure in space to pressures of millions of atmospheres in planetary interiors.", "passageSource": "[from How to Build a Habitable Planet]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "40번", "topic": "자가 실험의 발견을 전통 실험으로 입증하는 것이 효율적이다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"The best use of resources may often be <u>________</u>.\"</i>", "opts": ["self-experiments followed by conventional ones", "conventional experiments only", "repeated self-experiments", "theoretical analysis first"], "ans": 0, "exp": "자원을 가장 잘 활용하는 방법은 <b>자가 실험을 먼저 하고 이후 전통 실험이 뒤따르는 것(self-experiments followed by conventional ones)</b>입니다.", "passageTitle": "자가 실험의 발견을 전통 실험으로 입증하는 것이 효율적이다", "passageText": "When self-experimentation and conventional experiments are both possible, the difference between them often resembles the difference between learning and showing: Self-experiments are better for discovery but worse for convincing others that the solution is helpful or the answer is correct.\n\n<mark>The best use of resources may often be self-experiments followed by conventional ones.</mark> The researcher begins with self-experiments that, if all goes well, find large effects and/or generate and eliminate many hypotheses. This exploratory and theory-building phase lasts until a convenient solution or large effect is found.\n\nThen the researcher uses self-experiments to find the procedural parameters (e.g., duration, time of day, intensity) that optimize the solution or maximize the effect. <mark>Only then would</mark> the researcher begin conventional experiments, using the optimized parameters.", "passageSource": "[from Handbook of Research Methods in Human Operant Behavior]", "typeColor": "#8e44ad", "typeIcon": "🔲"},
{"passage": "40번", "topic": "자가 실험의 발견을 전통 실험으로 입증하는 것이 효율적이다", "type": "어법", "q": "괄호 안에서 어법에 맞는 표현을 고르시오.<br><br><i>\"<u>[ Only then would / Only then will ]</u> the researcher begin conventional experiments\"</i>", "opts": ["Only then would", "Only then will", "Only then should", "Only then can"], "ans": 0, "exp": "<b>Only</b> + 부정어구가 문두에 올 때 <b>조동사 도치</b>가 발생합니다. 과거 시제 맥락이므로 <b>Only then would + S + V</b> 형태가 정답입니다.", "passageTitle": "자가 실험의 발견을 전통 실험으로 입증하는 것이 효율적이다", "passageText": "When self-experimentation and conventional experiments are both possible, the difference between them often resembles the difference between learning and showing: Self-experiments are better for discovery but worse for convincing others that the solution is helpful or the answer is correct.\n\n<mark>The best use of resources may often be self-experiments followed by conventional ones.</mark> The researcher begins with self-experiments that, if all goes well, find large effects and/or generate and eliminate many hypotheses. This exploratory and theory-building phase lasts until a convenient solution or large effect is found.\n\nThen the researcher uses self-experiments to find the procedural parameters (e.g., duration, time of day, intensity) that optimize the solution or maximize the effect. <mark>Only then would</mark> the researcher begin conventional experiments, using the optimized parameters.", "passageSource": "[from Handbook of Research Methods in Human Operant Behavior]", "typeColor": "#2980b9", "typeIcon": "✏️"},
{"passage": "41~42번", "topic": "통계 발전이 시각화 자료를 논증의 핵심 도구로 격상시켰다", "type": "빈칸", "q": "빈칸에 들어갈 말로 가장 적절한 것은?<br><br><i>\"Snow's cholera map showed that visualizations could serve as both <u>________</u>.\"</i>", "opts": ["narrative and analysis", "decoration and art", "statistics and data", "history and science"], "ans": 0, "exp": "Snow의 콜레라 지도는 시각화가 <b>서사(narrative)와 분석(analysis)</b> 두 가지 기능을 모두 할 수 있음을 보여주었습니다.", "passageTitle": "통계 발전이 시각화 자료를 논증의 핵심 도구로 격상시켰다", "passageText": "The emergence of the social sciences in the nineteenth century and the ability to work with large datasets created demand for new ways of visualizing information. Mathematics, natural sciences, and social sciences that employed statistics were at the forefront of the development of charts and graphs. History was a consumer, not a designer, of most of these new visualizations — and mostly a sparing consumer at that.\n\nAs statistical analysis became more <mark>sophisticated</mark>, the visualizations that resulted became more and more central to the argument. In some cases, the visualization made interpretation possible.\n\nPerhaps the most notable example is John Snow's map of the incidence of cholera in an 1854 London outbreak, which helped plot the source of the outbreak at a single water pump in the neighborhood. <mark>Snow's cholera map showed that visualizations could serve as both narrative and analysis.</mark> Authors began to experiment with ways of using visual clues to tell complex stories about events, increasing the amount of information that could be conveyed in a small space and thereby overcoming the limitations of two dimensions in print.", "passageSource": "[from Writing History in the Digital Age]", "typeColor": "#8e44ad", "typeIcon": "🔲"},

const TC = {"어휘":"#e67e22","어법":"#2980b9","빈칸":"#8e44ad","내용이해":"#27ae60","주제":"#16a085","심리변화":"#c0392b"};

let ST = {};
let curP = 'all', curT = 'all';
let openPassages = new Set();

function getFiltered() {
  return QS.filter(q => (curP==='all'||q.passage===curP) && (curT==='all'||q.type===curT));
}

function groupByPassage(qs) {
  const map = new Map();
  qs.forEach(q => {
    if (!map.has(q.passage)) map.set(q.passage, []);
    map.get(q.passage).push(q);
  });
  return map;
}

function renderAll() {
  const wrap = document.getElementById('qWrap');
  const filtered = getFiltered();
  if (!filtered.length) { wrap.innerHTML='<div class="empty">🔍 해당 조건의 문항이 없습니다.</div>'; updateStats(); return; }

  const grouped = groupByPassage(filtered);
  let html = '';
  let qNum = 0;

  grouped.forEach((qs, passage) => {
    const first = qs[0];
    const isOpen = openPassages.has(passage);
    html += `<div class="pg-group" id="pg-${passage.replace(/[^a-z0-9]/gi,'_')}">
      <div class="pg-header">
        <div class="pg-num">📖 ${passage}</div>
        <div class="pg-title">${first.passageTitle}</div>
        ${first.passageSource ? `<div class="pg-source">${first.passageSource}</div>` : ''}
      </div>
      <div class="pg-text-wrap">
        <div class="pg-text-toggle" onclick="togglePassage('${passage}',this)">
          <span>📄 지문 보기 / 숨기기</span>
          <span class="toggle-arrow ${isOpen?'open':''}" id="arr-${passage.replace(/[^a-z0-9]/gi,'_')}">▼</span>
        </div>
        <div class="pg-text-body ${isOpen?'show':''}" id="ptb-${passage.replace(/[^a-z0-9]/gi,'_')}">${first.passageText}</div>
      </div>`;

    qs.forEach((q, idx) => {
      qNum++;
      const isLast = idx === qs.length - 1;
      html += renderCard(q, qNum, isLast);
    });

    html += `</div>`;
  });

  wrap.innerHTML = html;

  // Re-apply state
  filtered.forEach(q => {
    if (ST[q.id] !== undefined) applyVisual(q.id, ST[q.id].sel, q.ans, false);
  });
  updateStats();
}

function renderCard(q, num, isLast) {
  const tc = TC[q.type] || '#555';
  const opts = q.opts.map((o, i) => `
    <li class="opt" id="o-${q.id}-${i}" onclick="pick(${q.id},${i},${q.ans})">
      <span class="opt-circle">${i+1}</span>
      <span>${o}</span>
      <span class="opt-ri" id="ri-${q.id}-${i}"></span>
    </li>`).join('');

  return `<div class="q-card${isLast?' last':''}" id="c-${q.id}">
    <div class="q-top">
      <span class="q-num-badge">Q${num}</span>
      <div style="flex:1"></div>
      <span class="q-type-badge" style="background:${tc}">${q.typeIcon} ${q.type}</span>
    </div>
    <div class="q-body"><div class="q-text">${q.q}</div></div>
    <ul class="opts">${opts}</ul>
    <div class="exp" id="e-${q.id}">
      <div class="exp-ttl">💡 해설</div>
      ${q.exp}
    </div>
  </div>`;
}

function togglePassage(passage, btn) {
  const key = passage.replace(/[^a-z0-9]/gi,'_');
  const body = document.getElementById('ptb-'+key);
  const arrow = document.getElementById('arr-'+key);
  if (!body) return;
  const isOpen = body.classList.contains('show');
  if (isOpen) {
    body.classList.remove('show');
    arrow.classList.remove('open');
    openPassages.delete(passage);
  } else {
    body.classList.add('show');
    arrow.classList.add('open');
    openPassages.add(passage);
  }
}

function pick(qid, optIdx, ansIdx) {
  if (ST[qid] !== undefined) return;
  ST[qid] = { sel: optIdx, correct: optIdx===ansIdx };
  applyVisual(qid, optIdx, ansIdx, true);
  updateStats();
}

function applyVisual(qid, optIdx, ansIdx, animate) {
  const q = QS.find(q=>q.id===qid);
  if (!q) return;
  const card = document.getElementById('c-'+qid);
  if (!card) return;
  q.opts.forEach((_,i) => {
    const el = document.getElementById('o-'+qid+'-'+i);
    if (el) { el.classList.add('disabled'); el.onclick=null; }
  });
  const selEl = document.getElementById('o-'+qid+'-'+optIdx);
  const ansEl = document.getElementById('o-'+qid+'-'+ansIdx);
  if (optIdx===ansIdx) {
    selEl?.classList.add('ca');
    const ri = document.getElementById('ri-'+qid+'-'+optIdx);
    if(ri) ri.textContent='✅';
    card.classList.add('answered-correct');
  } else {
    selEl?.classList.add('wa');
    ansEl?.classList.add('ca');
    const ri1 = document.getElementById('ri-'+qid+'-'+optIdx);
    const ri2 = document.getElementById('ri-'+qid+'-'+ansIdx);
    if(ri1) ri1.textContent='❌';
    if(ri2) ri2.textContent='✅';
    card.classList.add('answered-wrong');
  }
  const exp = document.getElementById('e-'+qid);
  if(exp) exp.classList.add('show');
}

function updateStats() {
  const f = getFiltered();
  const total = f.length;
  const answered = f.filter(q=>ST[q.id]!==undefined).length;
  const correct = f.filter(q=>ST[q.id]?.correct).length;
  const wrong = answered-correct;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sAnswered').textContent=answered;
  document.getElementById('sCorrect').textContent=correct;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('hdrScore').textContent=correct+' / '+answered;
  const pct = answered>0?Math.round(correct/answered*100):0;
  const prog = total>0?Math.round(answered/total*100):0;
  document.getElementById('pFill').style.width=prog+'%';
  document.getElementById('pTxt').textContent =
    answered===0?'아직 풀지 않았습니다.':
    answered===total?`모두 완료! 정답률 ${pct}%`:
    `${answered}/${total} 풀이 완료 — 정답률 ${pct}%`;
}

function filterP(btn) {
  document.querySelectorAll('#pfRow .fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  curP = btn.dataset.p;
  renderAll();
}

function filterT(btn) {
  document.querySelectorAll('#tfRow .fb').forEach(b=>{
    b.classList.remove('active');
    b.style.background=''; b.style.borderColor=''; b.style.color='';
  });
  const t = btn.dataset.t;
  const c = TC[t]||'#555';
  btn.classList.add('active');
  btn.style.background=c; btn.style.borderColor=c; btn.style.color='#fff';
  curT = t;
  renderAll();
}

function resetAll() {
  ST={};
  renderAll();
}

function showWrong() {
  const wrongIds = new Set(QS.filter(q=>ST[q.id]!==undefined&&!ST[q.id].correct).map(q=>q.id));
  if(!wrongIds.size) { alert('오답이 없습니다! 🎉'); return; }
  document.querySelectorAll('.q-card').forEach(card=>{
    const m=card.id.match(/c-(\d+)/);
    if(m) card.style.display = wrongIds.has(parseInt(m[1]))?'':'none';
  });
  document.querySelectorAll('.pg-group').forEach(pg=>{
    const visible = Array.from(pg.querySelectorAll('.q-card')).some(c=>c.style.display!=='none');
    pg.style.display = visible?'':'none';
  });
}

function showResults() {
  const total=QS.length, answered=Object.keys(ST).length;
  const correct=Object.values(ST).filter(s=>s.correct).length;
  const pct=answered>0?Math.round(correct/answered*100):0;
  document.getElementById('mScore').textContent=pct+'%';
  document.getElementById('mSub').textContent=`총 ${answered}문항 중 ${correct}문항 정답`;
  document.getElementById('mC').textContent=correct;
  document.getElementById('mW').textContent=answered-correct;
  document.getElementById('mS').textContent=total-answered;
  document.getElementById('mEmoji').textContent=pct>=90?'🏆':pct>=70?'🎯':pct>=50?'📚':'💪';
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

renderAll();
</script>
