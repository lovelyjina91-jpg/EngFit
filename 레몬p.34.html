<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동사+전치사 표현 점검 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A2237;
    --blue: #3949AB;
    --sky: #5C6BC0;
    --gold: #FFC107;
    --sun: #FFD54F;
    --mint: #69F0AE;
    --coral: #FF7043;
    --cream: #FFFDE7;
    --light: #E8EAF6;
    --shadow: rgba(26,35,126,.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(155deg, #E8EAF6 0%, #FFF9C4 55%, #E8F5E9 100%);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* HEADER */
  .logo-bar {
    background: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 10px var(--shadow);
  }
  .logo-bar .brand {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--navy);
    letter-spacing: 1px;
  }
  .logo-bar .week-tag {
    background: var(--light);
    color: var(--blue);
    font-weight: 800;
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    letter-spacing: .5px;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, #283593 55%, #0277BD 100%);
    padding: 32px 20px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 15% 50%, rgba(255,193,7,.15), transparent 50%),
                radial-gradient(circle at 85% 20%, rgba(105,240,174,.1), transparent 40%);
  }
  .badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-weight: 800;
    font-size: 11px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .hero h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    color: #fff;
    line-height: 1.15;
    position: relative;
    margin-bottom: 6px;
  }
  .hero h1 span { color: var(--sun); }
  .hero p {
    color: rgba(255,255,255,.75);
    font-size: 14px;
    font-weight: 600;
    position: relative;
  }

  /* SCORE BAR */
  .score-bar {
    background: #fff;
    border-radius: 16px;
    margin: -18px 16px 0;
    padding: 14px 20px;
    display: flex;
    justify-content: space-around;
    box-shadow: 0 4px 20px var(--shadow);
    position: relative;
    z-index: 10;
  }
  .score-item { text-align: center; }
  .score-item .num {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: var(--navy);
    line-height: 1;
  }
  .score-item .num.correct { color: #2E7D32; }
  .score-item .num.wrong { color: var(--coral); }
  .score-item .label {
    font-size: 11px;
    color: #888;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .divider { width: 1px; background: #eee; }

  /* SECTION TITLE */
  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 28px 16px 12px;
  }
  .section-title .icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .section-title h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: var(--navy);
  }
  .section-title p { font-size: 12px; color: #888; font-weight: 600; }

  /* QUIZ CARDS */
  .quiz-wrap { padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }

  .quiz-card {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 2px 12px var(--shadow);
    border-left: 5px solid var(--sky);
    transition: all .25s;
  }
  .quiz-card.answered { border-left-color: #2E7D32; }
  .quiz-card.answered.wrong { border-left-color: var(--coral); }

  .quiz-card .q-num {
    font-size: 11px;
    font-weight: 800;
    color: var(--sky);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .quiz-card .q-text {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .quiz-card .q-text .ph {
    font-family: 'Fredoka One', cursive;
    color: var(--blue);
    font-size: 18px;
  }

  /* CHOICES */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .choice-btn {
    background: var(--light);
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 10px 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    transition: all .2s;
    text-align: center;
    line-height: 1.3;
  }
  .choice-btn:hover:not(:disabled) {
    background: var(--blue);
    color: #fff;
    transform: translateY(-2px);
  }
  .choice-btn.correct-ans {
    background: #E8F5E9;
    border-color: #2E7D32;
    color: #2E7D32;
  }
  .choice-btn.wrong-ans {
    background: #FFEBEE;
    border-color: var(--coral);
    color: var(--coral);
  }
  .choice-btn:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #E8F5E9; color: #2E7D32; }
  .feedback.ng { background: #FFEBEE; color: #C62828; }

  /* SENTENCE SECTION */
  .sent-card {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 2px 12px var(--shadow);
    margin: 0 16px 14px;
  }
  .sent-card .q-num { font-size: 11px; font-weight: 800; color: #888; letter-spacing: 1px; margin-bottom: 6px; }
  .sent-card .eng {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .sent-card .eng .ph {
    border-bottom: 2.5px solid var(--blue);
    color: var(--blue);
  }
  .reveal-btn {
    background: var(--light);
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--blue);
    cursor: pointer;
    width: 100%;
    transition: all .2s;
  }
  .reveal-btn:hover { background: var(--blue); color: #fff; }
  .answer-reveal {
    margin-top: 12px;
    background: linear-gradient(135deg, #E8EAF6, #FFF9C4);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    display: none;
    line-height: 1.6;
  }
  .answer-reveal.show { display: block; }
  .answer-reveal .ko { color: #1B5E20; font-size: 15px; }

  /* SELF CHECK */
  .self-btns { display: flex; gap: 8px; margin-top: 10px; }
  .self-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: all .2s;
  }
  .self-btn.got { background: #E8F5E9; color: #2E7D32; }
  .self-btn.got:hover { background: #2E7D32; color: #fff; }
  .self-btn.miss { background: #FFEBEE; color: #C62828; }
  .self-btn.miss:hover { background: #C62828; color: #fff; }

  /* RESET */
  .reset-wrap { text-align: center; padding: 20px 16px 0; }
  .reset-btn {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 15px var(--shadow);
    transition: all .2s;
    letter-spacing: .5px;
  }
  .reset-btn:hover { background: var(--blue); transform: translateY(-2px); }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    margin: 16px 16px 0;
    background: #e0e0e0;
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--mint));
    border-radius: 10px;
    transition: width .4s ease;
    width: 0%;
  }
</style>
</head>
<body>

<!-- LOGO BAR -->
<div class="logo-bar">
  <div class="brand">영핏 EngFit</div>
  <div class="week-tag">Week 2 · 동사+전치사</div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="badge">📚 숙어처럼 쓰이는</div>
  <h1>동사+전치사 표현<br><span>점검 퀴즈</span></h1>
  <p>의미를 고르고, 해석을 확인해보세요!</p>
</div>

<!-- SCORE BAR -->
<div class="score-bar">
  <div class="score-item">
    <div class="num" id="total-q">0</div>
    <div class="label">전체 문제</div>
  </div>
  <div class="divider"></div>
  <div class="score-item">
    <div class="num correct" id="correct-q">0</div>
    <div class="label">정답</div>
  </div>
  <div class="divider"></div>
  <div class="score-item">
    <div class="num wrong" id="wrong-q">0</div>
    <div class="label">오답</div>
  </div>
  <div class="divider"></div>
  <div class="score-item">
    <div class="num" id="pct-q">0%</div>
    <div class="label">정답률</div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-fill"></div>
</div>

<!-- SECTION 1: 의미 고르기 -->
<div class="section-title">
  <div class="icon" style="background:#E8EAF6;">🎯</div>
  <div>
    <h2>Part 1. 의미 고르기</h2>
    <p>동사+전치사 표현의 뜻을 고르세요</p>
  </div>
</div>

<div class="quiz-wrap" id="vocab-quiz"></div>

<!-- SECTION 2: 문장 해석 -->
<div class="section-title">
  <div class="icon" style="background:#FFF9C4;">📝</div>
  <div>
    <h2>Part 2. 문장 해석 확인</h2>
    <p>밑줄 친 부분에 유의해 우리말로 옮기세요</p>
  </div>
</div>

<div id="sent-wrap"></div>

<!-- RESET -->
<div class="reset-wrap">
  <button class="reset-btn" onclick="resetAll()">🔄 다시 풀기</button>
</div>

<script>
// ──── DATA ────────────────────────────────────────────────────────────
const vocabData = [
  {
    ph: "come from",
    q: "밑줄 친 표현의 의미는?",
    example: "A lot of drugs <u>come from</u> common plants.",
    correct: "…에서 나오다 / 출신이다",
    wrong: ["…을 기다리다", "…에 의존하다", "…을 찾다"]
  },
  {
    ph: "wait for",
    q: "밑줄 친 표현의 의미는?",
    example: "I can't <u>wait for</u> vacation!",
    correct: "…을 기다리다",
    wrong: ["…에서 나오다", "…처럼 보이다", "…을 돌보다"]
  },
  {
    ph: "look for",
    q: "밑줄 친 표현의 의미는?",
    example: "I am <u>looking for</u> my door key.",
    correct: "…을 찾다",
    wrong: ["…처럼 보이다", "…을 달리다 / 쫓다", "…을 기다리다"]
  },
  {
    ph: "depend on",
    q: "밑줄 친 표현의 의미는?",
    example: "Plants <u>depend on</u> light and water to live.",
    correct: "…에 의존하다; …에 달려 있다",
    wrong: ["…의 소식을 듣다", "…을 다 써버리다", "…에서 나오다"]
  },
  {
    ph: "hear from",
    q: "밑줄 친 표현의 의미는?",
    example: "We want to <u>hear from</u> you!",
    correct: "…의 소식을 듣다",
    wrong: ["…에 대해 알다", "…을 찾다", "…에 의존하다"]
  },
  {
    ph: "hear of",
    q: "밑줄 친 표현의 의미는?",
    example: "Have you <u>heard of</u> this website?",
    correct: "…에 대해 알다[듣다]",
    wrong: ["…의 소식을 듣다", "…처럼 보이다", "…을 기다리다"]
  },
  {
    ph: "look like",
    q: "밑줄 친 표현의 의미는?",
    example: "You <u>look like</u> your sister.",
    correct: "…처럼 보이다; …을 닮다",
    wrong: ["…을 찾다", "…을 돌보다", "…에 달려 있다"]
  },
  {
    ph: "run out of",
    q: "밑줄 친 표현의 의미는?",
    example: "We're <u>run out of</u> milk.",
    correct: "…을 다 써버리다; …가 떨어지다",
    wrong: ["…을 쫓아가다", "…에서 나오다", "…을 찾다"]
  },
  {
    ph: "run after",
    q: "밑줄 친 표현의 의미는?",
    example: "Tom is <u>running after</u> Jerry.",
    correct: "…을 쫓아가다",
    wrong: ["…을 다 써버리다", "…을 돌보다", "…에 의존하다"]
  },
  {
    ph: "look after",
    q: "밑줄 친 표현의 의미는?",
    example: "I <u>looked after</u> the kids for her today.",
    correct: "…을 돌보다 (= care for / take care of)",
    wrong: ["…을 쫓아가다", "…처럼 보이다", "…을 찾다"]
  }
];

const sentData = [
  {
    eng: "I am <span class='ph'>looking for</span> my door key.",
    ko: "나는 내 현관 열쇠를 찾고 있다."
  },
  {
    eng: "You should <span class='ph'>look after</span> your health.",
    ko: "너는 건강을 돌봐야 한다."
  },
  {
    eng: "Everything <span class='ph'>depends on</span> your decision.",
    ko: "모든 것이 네 결정에 달려 있다."
  },
  {
    eng: "We haven't <span class='ph'>heard from</span> Kelly for three years.",
    ko: "우리는 3년 동안 Kelly의 소식을 듣지 못했다."
  },
  {
    eng: "Some of the best wines <span class='ph'>come from</span> France.",
    ko: "최고의 와인 중 일부는 프랑스에서 나온다."
  }
];

// ──── STATE ────────────────────────────────────────────────────────────
let correctCount = 0;
let wrongCount = 0;
let answeredCount = 0;
const totalQ = vocabData.length;
let sentScores = {}; // index -> 'got' | 'miss'

// ──── HELPERS ────────────────────────────────────────────────────────────
function shuffle(arr) {
  return [...arr].sort(() => Math.random() - .5);
}

function updateScore() {
  document.getElementById('total-q').textContent = totalQ;
  document.getElementById('correct-q').textContent = correctCount;
  document.getElementById('wrong-q').textContent = wrongCount;
  const pct = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
  document.getElementById('pct-q').textContent = pct + '%';
  const fill = Math.round((answeredCount / totalQ) * 100);
  document.getElementById('progress-fill').style.width = fill + '%';
}

// ──── BUILD VOCAB QUIZ ────────────────────────────────────────────────────
function buildVocabQuiz() {
  const wrap = document.getElementById('vocab-quiz');
  wrap.innerHTML = '';

  vocabData.forEach((item, idx) => {
    const choices = shuffle([item.correct, ...item.wrong]);
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = `vcard-${idx}`;

    card.innerHTML = `
      <div class="q-num">Q${idx + 1}</div>
      <div class="q-text">
        <span class="ph">${item.ph}</span> &nbsp;→&nbsp; ${item.example}
      </div>
      <div class="choices" id="choices-${idx}">
        ${choices.map(c => `
          <button class="choice-btn" onclick="checkAnswer(${idx}, this, '${escStr(c)}', '${escStr(item.correct)}')">${c}</button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${idx}"></div>
    `;
    wrap.appendChild(card);
  });
}

function escStr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function checkAnswer(idx, btn, chosen, correct) {
  const card = document.getElementById(`vcard-${idx}`);
  if (card.classList.contains('answered')) return;

  card.classList.add('answered');
  answeredCount++;

  const allBtns = document.querySelectorAll(`#choices-${idx} .choice-btn`);
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct-ans');
  });

  const fb = document.getElementById(`fb-${idx}`);
  fb.classList.add('show');

  if (chosen === correct) {
    btn.classList.add('correct-ans');
    card.classList.remove('wrong');
    correctCount++;
    fb.className = 'feedback show ok';
    fb.textContent = '✅ 정답! 잘 기억하고 있어요!';
  } else {
    btn.classList.add('wrong-ans');
    card.classList.add('wrong');
    wrongCount++;
    fb.className = 'feedback show ng';
    fb.textContent = `❌ 오답! 정답: ${correct}`;
  }

  updateScore();
}

// ──── BUILD SENTENCE SECTION ────────────────────────────────────────────────
function buildSentSection() {
  const wrap = document.getElementById('sent-wrap');
  wrap.innerHTML = '';

  sentData.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'sent-card';
    card.innerHTML = `
      <div class="q-num">Sentence ${idx + 1}</div>
      <div class="eng">${item.eng}</div>
      <button class="reveal-btn" id="rbtn-${idx}" onclick="revealAnswer(${idx})">👀 해석 확인하기</button>
      <div class="answer-reveal" id="ans-${idx}">
        <div class="ko">➜ ${item.ko}</div>
        <div class="self-btns">
          <button class="self-btn got" onclick="markSelf(${idx}, 'got')">✅ 맞았어요</button>
          <button class="self-btn miss" onclick="markSelf(${idx}, 'miss')">❌ 틀렸어요</button>
        </div>
      </div>
    `;
    wrap.appendChild(card);
  });
}

function revealAnswer(idx) {
  const ans = document.getElementById(`ans-${idx}`);
  const btn = document.getElementById(`rbtn-${idx}`);
  ans.classList.toggle('show');
  btn.textContent = ans.classList.contains('show') ? '🙈 숨기기' : '👀 해석 확인하기';
}

function markSelf(idx, result) {
  sentScores[idx] = result;
  const selfBtns = document.querySelectorAll(`#ans-${idx} .self-btn`);
  selfBtns.forEach(b => b.style.opacity = '.5');
  const clicked = document.querySelector(`#ans-${idx} .self-btn.${result}`);
  if (clicked) { clicked.style.opacity = '1'; clicked.style.fontWeight = '900'; }
}

// ──── RESET ────────────────────────────────────────────────────────────
function resetAll() {
  correctCount = 0; wrongCount = 0; answeredCount = 0;
  sentScores = {};
  updateScore();
  buildVocabQuiz();
  buildSentSection();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ──── INIT ────────────────────────────────────────────────────────────
buildVocabQuiz();
buildSentSection();
updateScore();
</script>
</body>
</html>
