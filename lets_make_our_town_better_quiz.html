<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Make Our Town Better | 중3 영어 퀴즈</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
:root {
  --green:  #1B4332;
  --green2: #103826;
  --green3: #0D2B1E;
  --green-light: #E8F5EE;
  --green-pale:  #F2FAF6;
  --blue: #1D4ED8;
  --blue-light: #EFF6FF;
  --amber: #B45309;
  --amber-light: #FFFBEB;
  --red: #B91C1C;
  --red-light: #FEF2F2;
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --border: #E3E2DC;
  --border2: #C8C7BF;
  --text: #141410;
  --text2: #5A5A52;
  --text3: #9A9A92;
  --radius: 10px;
  --radius-lg: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ─── HEADER ─── */
.site-header {
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  padding: 12px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.header-icon {
  width: 38px; height: 38px;
  background: var(--green);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.header-text h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
.header-text p { font-size: 11px; color: var(--text3); margin-top: 1px; letter-spacing: 0.01em; font-weight: 400; }
.header-score-row {
  margin-left: auto;
  display: flex; gap: 10px;
}
.score-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  letter-spacing: -0.01em;
}
.score-pill.active { background: var(--green-light); border-color: var(--green); color: var(--green); }

/* ─── TABS ─── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 13px 10px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text3);
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  letter-spacing: -0.01em;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.tab-count {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  background: var(--border); color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}
.tab-btn.active .tab-count { background: var(--green-light); color: var(--green2); }

/* ─── MAIN ─── */
main { max-width: 680px; margin: 0 auto; padding: 22px 16px 80px; }

/* ─── PROGRESS ─── */
.progress-wrap { margin-bottom: 20px; }
.progress-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--text3); margin-bottom: 8px;
}
.progress-label { font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; font-size: 11px; }
.progress-num { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: var(--text2); }
.pb { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.pb-inner { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* ─── CARD ─── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 20px;
  margin-bottom: 14px;
  animation: fadeUp 0.25s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.q-scene { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 6px; font-weight: 600; }
.type-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 99px; margin-bottom: 14px;
  letter-spacing: 0.02em;
}
.badge-order { background: var(--green-light); color: var(--green2); }
.badge-subj  { background: var(--blue-light); color: var(--blue); }
.q-ko {
  font-size: 14px; color: var(--text2); margin-bottom: 16px;
  padding: 10px 14px; background: var(--bg);
  border-radius: 8px; border-left: 3px solid var(--border2); line-height: 1.65;
}
.q-ko::before { content: "🇰🇷 "; }

/* ─── WORD ORDER ─── */
.section-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 700; margin-bottom: 7px; }
.word-pool {
  display: flex; flex-wrap: wrap; gap: 7px; min-height: 52px; padding: 12px;
  background: var(--bg); border: 1.5px dashed var(--border2);
  border-radius: var(--radius); margin-bottom: 8px; align-content: flex-start;
}
.ans-area {
  display: flex; flex-wrap: wrap; gap: 7px; min-height: 54px; padding: 12px;
  background: var(--green-pale); border: 1.5px solid var(--green);
  border-radius: var(--radius); margin-bottom: 10px; align-content: flex-start;
}
.chip {
  display: inline-flex; align-items: center;
  padding: 6px 13px; border: 1.5px solid var(--border2);
  border-radius: 7px; background: var(--surface);
  font-size: 14px; cursor: pointer; user-select: none;
  transition: all 0.12s; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace; font-weight: 500; letter-spacing: -0.01em;
}
.chip:hover { border-color: var(--green); background: var(--green-light); color: var(--green2); transform: translateY(-1px); }
.chip.placed { background: var(--green-light); border-color: var(--green); color: var(--green2); }
.chip.placed:hover { background: #c8eddf; }
.chip.disabled { cursor: default; pointer-events: none; }
.chip.chip-ok { background: #D1FAE5; border-color: #059669; color: #065F46; }
.chip.chip-ng { background: #FEE2E2; border-color: #DC2626; color: #7F1D1D; }
.chip-empty { font-size: 13px; color: var(--text3); align-self: center; font-style: italic; }
.word-counter { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.01em; }
.word-counter .cnt { color: var(--green); font-weight: 700; }
.word-counter .tot { color: var(--text2); }
.warn-msg { font-size: 12px; color: var(--amber); margin-top: 4px; display: none; }
.warn-msg.show { display: block; }

/* ─── SUBJECTIVE ─── */
.blank-line { font-size: 19px; line-height: 1.85; margin-bottom: 14px; word-break: keep-all; font-weight: 500; }
.blank-slot {
  display: inline-block; border-bottom: 2.5px solid var(--blue);
  min-width: 90px; padding: 0 8px; text-align: center;
  color: var(--blue); font-family: 'JetBrains Mono', monospace; font-weight: 500;
}
.ans-input {
  width: 100%; padding: 12px 15px; font-size: 16px;
  border: 1.5px solid var(--border2); border-radius: var(--radius);
  outline: none; font-family: 'JetBrains Mono', monospace;
  background: var(--surface); color: var(--text);
  transition: border-color 0.2s, background 0.2s; font-weight: 500; letter-spacing: 0.01em;
}
.ans-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(29,78,216,0.08); }
.ans-input.inp-ok { border-color: #059669; background: #F0FDF4; color: #065F46; }
.ans-input.inp-ng { border-color: #DC2626; background: #FEF2F2; color: #7F1D1D; }
.hint-toggle {
  font-size: 12px; padding: 5px 12px;
  border: 1.5px solid var(--border); border-radius: 99px;
  background: var(--surface); cursor: pointer; color: var(--amber);
  font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
  margin-top: 10px; transition: 0.15s;
  display: inline-flex; align-items: center; gap: 4px; font-weight: 600; letter-spacing: -0.01em;
}
.hint-toggle:hover { background: var(--amber-light); border-color: var(--amber); }
.hint-box {
  margin-top: 8px; padding: 10px 14px;
  background: var(--amber-light); border: 1.5px solid #FDE68A;
  border-radius: 8px; font-size: 13px; color: #92400E; display: none; line-height: 1.6;
}
.hint-box.show { display: block; animation: fadeUp 0.15s ease; }

/* ─── FEEDBACK ─── */
.feedback {
  margin-top: 12px; font-size: 14px; font-weight: 600;
  padding: 10px 14px; border-radius: 8px; display: none;
  align-items: center; gap: 8px;
}
.feedback.show { display: flex; animation: fadeUp 0.2s ease; }
.feedback.fb-ok { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
.feedback.fb-ng { background: #FEE2E2; color: #7F1D1D; border: 1px solid #FCA5A5; }
.ans-reveal { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: inherit; }

/* ─── NAV ─── */
.nav-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.btn {
  padding: 10px 20px; border: 1.5px solid var(--border2);
  border-radius: var(--radius); background: var(--surface);
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
  color: var(--text); transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 5px; letter-spacing: -0.01em;
}
.btn:hover { background: var(--bg); border-color: var(--text2); }
.btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
.btn.primary:hover { background: var(--green2); }
.btn.ghost { color: var(--text3); border-color: var(--border); }
.btn.ghost:hover { border-color: var(--border2); color: var(--text); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
.q-counter { font-size: 13px; color: var(--text3); margin-left: auto; font-family: 'JetBrains Mono', monospace; font-weight: 500; letter-spacing: -0.01em; }

/* ─── SCORE ─── */
.score-screen { text-align: center; padding: 2.5rem 1rem 3rem; animation: fadeUp 0.4s ease; }
.score-ring {
  width: 140px; height: 140px; border-radius: 50%;
  background: conic-gradient(var(--green) calc(var(--pct)*1%), var(--border) 0);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 20px; position: relative;
}
.score-ring::before { content: ''; position: absolute; inset: 14px; background: var(--surface); border-radius: 50%; }
.score-inner { position: relative; z-index: 1; text-align: center; }
.score-n { font-size: 38px; font-weight: 700; color: var(--green); font-family: 'JetBrains Mono', monospace; line-height: 1; }
.score-d { font-size: 13px; color: var(--text3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.score-msg { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.03em; }
.score-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; font-weight: 400; }
.score-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-width: 360px; margin: 0 auto 28px; }
.stat-box { background: var(--bg); border-radius: var(--radius); padding: 14px 8px; border: 1.5px solid var(--border); }
.stat-n { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.stat-ok .stat-n { color: var(--green); }
.stat-ng .stat-n { color: var(--red); }
.stat-pct .stat-n { color: var(--blue); }
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; font-weight: 600; letter-spacing: 0.02em; }

/* ─── SUMMARY ─── */
.summary-wrap { max-width: 680px; margin: 24px auto 0; }
.summary-wrap h3 { font-size: 13px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.summary-list { display: flex; flex-direction: column; gap: 6px; }
.summary-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  font-size: 13px; background: var(--surface); border: 1px solid var(--border);
}
.summary-item.s-ok { border-color: #6EE7B7; background: #F0FDF4; }
.summary-item.s-ng { border-color: #FCA5A5; background: #FEF2F2; }
.s-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.s-ko { color: var(--text2); margin-bottom: 2px; }
.s-ans { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; }
.s-ans.correct { color: #065F46; }
.s-correct-lbl { font-size: 11px; color: var(--text3); }

@media(max-width:480px) {
  .header-score-row { display: none; }
  .blank-line { font-size: 17px; }
  .chip { font-size: 13px; padding: 5px 10px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-icon">🏘️</div>
  <div class="header-text">
    <h1>영핏 · Let's Make Our Town Better</h1>
    <p>중3 영어 · 천재(정사열) · STEP2 커뮤니케이션</p>
  </div>
  <div class="header-score-row">
    <div class="score-pill" id="pill-order">📝 순서 — / 30</div>
    <div class="score-pill" id="pill-subj">✏️ 주관식 — / 30</div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" id="tab-order" onclick="switchTab('order')">
    📝 순서 맞추기 <span class="tab-count">30</span>
  </button>
  <button class="tab-btn" id="tab-subj" onclick="switchTab('subj')">
    ✏️ 주관식 <span class="tab-count">30</span>
  </button>
</div>

<main id="qmain"></main>

<script>
// ══════════════════════════════════════════════
//  ① 순서 맞추기 (30문제)
// ══════════════════════════════════════════════
const OQ = [
  {s:"Dialogue 1", ko:"화분이 무거워 보여요.", w:["The","flower","pot","looks","heavy."]},
  {s:"Dialogue 1", ko:"민 여사님, 도와드릴까요?", w:["Can","I","help","you,","Ms.","Min?"]},
  {s:"Dialogue 2", ko:"제가 의자 고치시는 걸 도와드릴게요.", w:["Let","me","help","you","fix","the","bench."]},
  {s:"Dialogue 2", ko:"이걸 좀 꽉 잡아 다오.", w:["Please","hold","this","tight."]},
  {s:"Dialogue 2", ko:"도와줘서 고맙구나.", w:["Thank","you","for","helping","me."]},
  {s:"Dialogue 3", ko:"우리가 마을을 위해 무엇을 할 수 있는지 이야기해 보자.", w:["Let's","talk","about","what","we","can","do","for","our","town."]},
  {s:"Dialogue 3", ko:"지저분한 벽에 그림을 그리는 게 어떠니?", w:["How","about","drawing","pictures","on","the","dirty","walls?"]},
  {s:"Dialogue 4", ko:"창가에 몇 개의 화분을 두는 게 어때?", w:["How","about","putting","some","flower","pots","by","the","windows?"]},
  {s:"Dialogue 4", ko:"그것들은 우리 동아리실을 더 예쁘게 할 거야.", w:["They'll","make","our","room","prettier."]},
  {s:"Dialogue 5", ko:"그림을 좀 거는 게 어때?", w:["How","about","hanging","some","pictures?"]},
  {s:"Dialogue 5", ko:"네 그림 중의 하나를 가져오는 게 어때?", w:["Why","don't","you","bring","one","of","your","pictures?"]},
  {s:"Dialogue 5", ko:"세호야, 넌 그림을 잘 그리잖아.", w:["You're","good","at","painting,","Seho."]},
  {s:"Dialogue 5", ko:"그렇게 말해 주니 고마워.", w:["Thank","you","for","saying","that."]},
  {s:"Dialogue 5", ko:"내가 내 그림 중에서 하나를 가져올게.", w:["I'll","bring","one","of","mine."]},
  {s:"Dialogue 6", ko:"이번에는 모퉁이에 대해 이야기해 보자.", w:["Let's","talk","about","the","corner","this","time."]},
  {s:"Dialogue 6", ko:"동아리실 모퉁이에 작은 도서관을 만드는 게 어때?", w:["How","about","making","a","small","library","in","the","corner","of","the","club","room?"]},
  {s:"Dialogue 6", ko:"민주야, 제안해 줘서 고마워.", w:["Thank","you","for","suggesting","it,","Minju."]},
  {s:"Dialogue 7", ko:"거기에 동아리 회원 목록을 붙일 필요가 있는 것 같아.", w:["I","think","we","need","to","put","the","club","member","list","there."]},
  {s:"Dialogue 7", ko:"그것은 우리가 신입 회원들의 이름을 알게 되는 데 도움이 될 거야.", w:["It'll","be","helpful","for","us","to","learn","the","new","members'","names."]},
  {s:"Dialogue 7", ko:"그러면 우리가 중요한 학교 행사를 기억하는 데 정말 도움이 될 거야.", w:["That'll","really","help","us","remember","important","school","events."]},
  {s:"Dialogue 7", ko:"모두 좋은 의견을 내줘서 고마워. 우린 좋은 팀이야.", w:["Thank","you","for","suggesting","great","ideas,","everyone."]},
  {s:"Dialogue 9", ko:"모두 와 주셔서 감사합니다.", w:["Thank","you","for","coming,","everyone."]},
  {s:"Dialogue 9", ko:"저는 나무 아래의 모퉁이가 가장 마음에 듭니다.", w:["I","like","the","corner","under","the","tree","most."]},
  {s:"Dialogue 9", ko:"그곳은 학생들 사이에 아주 인기 있습니다.", w:["It","is","a","very","popular","place","among","the","students."]},
  {s:"Dialogue 10", ko:"그것에 대해 어떻게 생각하나요?", w:["What","do","you","think","of","it?"]},
  {s:"Dialogue 10", ko:"학급 반장들이 판을 설치하고 몇 개의 포스터를 붙였어요.", w:["The","class","leaders","set","up","the","board","and","put","up","some","posters."]},
  {s:"Dialogue 11", ko:"우리 마을을 어떻게 하면 더 좋게 만들 수 있을지를 이야기해 보자.", w:["Let's","talk","about","how","we","can","make","our","town","better."]},
  {s:"Dialogue 11", ko:"버스 정류장에 쓰레기가 너무 많아.", w:["There's","too","much","trash","at","the","bus","stop."]},
  {s:"Dialogue 11", ko:"그것은 어르신들에게 도움이 될 거야.", w:["It'll","be","helpful","for","the","elderly."]},
  {s:"Dialogue 11", ko:"그것들은 버스 정류장을 더 아름답게 할 거야.", w:["They'll","make","the","bus","stop","more","beautiful."]}
];

// ══════════════════════════════════════════════
//  ② 주관식 (30문제)
// ══════════════════════════════════════════════
const SQ = [
  {s:"Key Function – 도움 제안", ko:"민 여사님, 도와드릴까요?", q:"Can I ___ you, Ms. Min?", a:"help", h:"도움을 제안하는 핵심 표현: Can I help ~?"},
  {s:"Key Function – 도움 제안", ko:"제가 의자 고치시는 걸 도와드릴게요.", q:"___ me help you fix the bench.", a:"Let", h:"Let me R: 내가 ~하게 해줘 (도움 제안 표현)"},
  {s:"Dialogue 2", ko:"이걸 좀 꽉 잡아 다오.", q:"Please hold this ___.", a:"tight", h:"부사 tight: 꽉, 단단히 (형용사/부사 둘 다 가능)"},
  {s:"Dialogue 2", ko:"도와줘서 고맙구나.", q:"Thank you ___ helping me.", a:"for", h:"thank + 목적어 + for R-ing: ~(R-ing)에 대해서 감사하다"},
  {s:"Key Function – 주제 제시", ko:"우리가 마을을 위해 무엇을 할 수 있는지 이야기해 보자.", q:"Let's talk ___ what we can do for our town.", a:"about", h:"Let's talk about ~: ~에 대해 이야기 나눠보자"},
  {s:"Dialogue 3", ko:"지저분한 벽에 그림을 그리는 게 어떠니?", q:"How about ___ pictures on the dirty walls?", a:"drawing", h:"How about R-ing ~?: ~하는 건 어때? (동명사 사용)"},
  {s:"Dialogue 4", ko:"그것들은 우리 동아리실을 더 예쁘게 할 거야.", q:"They'll make our room ___.", a:"prettier", h:"5형식 make + O + O.C(형용사 비교급): ~을 더 …하게 만들다"},
  {s:"Dialogue 4", ko:"우리 동아리실에 무엇이 필요할까? 그것에 대해 이야기해 보자.", q:"What do we need in our club room? Let's talk ___ it.", a:"about", h:"talk about: ~에 대해 이야기하다"},
  {s:"Dialogue 4", ko:"창가에 몇 개의 화분을 두는 게 어때?", q:"How about putting some flower pots ___ the windows?", a:"by", h:"전치사 by: ~옆에, ~곁에"},
  {s:"Dialogue 5", ko:"세호야, 넌 그림을 잘 그리잖아.", q:"You're good ___ painting, Seho.", a:"at", h:"be good at R-ing: ~하는 것에 능숙하다"},
  {s:"Dialogue 5", ko:"그렇게 말해 주니 고마워.", q:"Thank you for ___ that.", a:"saying", h:"thank you for + R-ing: ~해줘서 고마워 (say → saying)"},
  {s:"Dialogue 5", ko:"내가 내 그림 중에서 하나를 가져올게.", q:"I'll bring one of ___.", a:"mine", h:"mine = my pictures (소유대명사: 내 것)"},
  {s:"Dialogue 5", ko:"그림을 좀 거는 게 어때?", q:"How about ___ some pictures?", a:"hanging", h:"How about R-ing?: ~하는 건 어때? (hang → hanging)"},
  {s:"Dialogue 6", ko:"동아리실 모퉁이에 작은 도서관을 만드는 게 어때?", q:"How about ___ a small library in the corner of the club room?", a:"making", h:"How about R-ing?: ~하는 건 어때? (make → making)"},
  {s:"Dialogue 6", ko:"민주야, 제안해 줘서 고마워.", q:"Thank you for ___ it, Minju.", a:"suggesting", h:"thank you for R-ing / suggest: 제안하다 (suggest → suggesting)"},
  {s:"Dialogue 7", ko:"세호야, 우리는 벽에도 뭔가 필요해. 그렇게 생각하지 않니?", q:"We need something on the wall, too. Don't you think ___?", a:"so", h:"부사 so: 앞 내용을 받아서 '그렇게'의 의미 (= think that we need something)"},
  {s:"Dialogue 7", ko:"거기에 동아리 회원 목록을 붙일 필요가 있는 것 같아.", q:"I think we need to ___ the club member list there.", a:"put", h:"need to R: ~할 필요가 있다 (put: 놓다, 붙이다)"},
  {s:"Dialogue 7", ko:"그것은 우리가 신입 회원들의 이름을 알게 되는 데 도움이 될 거야.", q:"It'll be helpful for us ___ learn the new members' names.", a:"to", h:"가주어 It ~ 진주어 to부정사 / for us: to부정사의 의미상 주어"},
  {s:"Dialogue 7", ko:"그러면 우리가 중요한 학교 행사를 기억하는 데 정말 도움이 될 거야.", q:"That'll really help us ___ important school events.", a:"remember", h:"5형식 준사역동사 help + O + 원형부정사(동사원형)"},
  {s:"Dialogue 7", ko:"모두 좋은 의견을 내줘서 고마워.", q:"Thank you for ___ great ideas, everyone.", a:"suggesting", h:"thank you for R-ing: ~해줘서 고마워 (suggest → suggesting)"},
  {s:"Dialogue 9", ko:"모두 와 주셔서 감사합니다.", q:"Thank you for ___, everyone.", a:"coming", h:"thank you for R-ing: ~해줘서 감사합니다 (come → coming)"},
  {s:"Dialogue 9", ko:"저는 나무 아래의 모퉁이가 가장 마음에 듭니다.", q:"I like the corner under the tree ___.", a:"most", h:"most: 가장 (부사, 최상급 의미 / like ~ most: ~을 가장 좋아하다)"},
  {s:"Dialogue 9", ko:"그곳은 학생들 사이에 아주 인기 있습니다.", q:"It is a very popular place ___ the students.", a:"among", h:"전치사 among: ~사이에 (셋 이상의 그룹 사이)"},
  {s:"Dialogue 10", ko:"그것에 대해 어떻게 생각하나요?", q:"What do you ___ of it?", a:"think", h:"think A of B: B에 대해 A라고 생각하다 / What do you think of ~?"},
  {s:"Dialogue 10", ko:"학급 반장들이 판을 설치하고 몇 개의 포스터를 붙였어요.", q:"The class leaders ___ up the board and put up some posters.", a:"set", h:"set up: 설치하다 (동사구 / phrasal verb)"},
  {s:"Dialogue 10", ko:"우리가 학교 행사에 관해 훨씬 더 많이 알 수 있죠.", q:"We can know a lot ___ about school events.", a:"more", h:"a lot more: 훨씬 더 많은 것 (비교급 강조 표현)"},
  {s:"Dialogue 11", ko:"우리 마을을 어떻게 하면 더 좋게 만들 수 있을지를 이야기해 보자.", q:"Let's talk about ___ we can make our town better.", a:"how", h:"의문부사 how: 어떻게 ~ 할 수 있을지 (간접의문문)"},
  {s:"Dialogue 11", ko:"버스 정류장에 쓰레기가 너무 많아.", q:"There's too ___ trash at the bus stop.", a:"much", h:"too much + 불가산명사: 너무 많은 ~ (trash는 불가산명사)"},
  {s:"Dialogue 11", ko:"그것은 어르신들에게 도움이 될 거야.", q:"It'll be ___ for the elderly.", a:"helpful", h:"be helpful for: ~에게 유용하다, 도움이 되다"},
  {s:"Dialogue 11", ko:"그러면, 내일 시작하는 게 어때?", q:"Then, ___ we start tomorrow?", a:"shall", h:"Shall we R~?: ~하는 게 어때? (제안 표현 / 동사원형 사용)"}
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let mode = 'order';
const OS = { idx:0, score:0, done:false, submitted:[], userIdx:[], shuffled:[], history:[] };
const SS = { idx:0, score:0, done:false, submitted:[], userAns:[], history:[] };

function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function initAll() {
  OS.idx=0;OS.score=0;OS.done=false;
  OS.submitted=new Array(OQ.length).fill(null);
  OS.userIdx=OQ.map(()=>[]);
  OS.shuffled=OQ.map(q=>shuffle(q.w));
  OS.history=new Array(OQ.length).fill(null);
  SS.idx=0;SS.score=0;SS.done=false;
  SS.submitted=new Array(SQ.length).fill(null);
  SS.userAns=new Array(SQ.length).fill('');
  SS.history=new Array(SQ.length).fill(null);
}

function resetOrder() {
  OS.idx=0;OS.score=0;OS.done=false;
  OS.submitted=new Array(OQ.length).fill(null);
  OS.userIdx=OQ.map(()=>[]);
  OS.shuffled=OQ.map(q=>shuffle(q.w));
  OS.history=new Array(OQ.length).fill(null);
}
function resetSubj() {
  SS.idx=0;SS.score=0;SS.done=false;
  SS.submitted=new Array(SQ.length).fill(null);
  SS.userAns=new Array(SQ.length).fill('');
  SS.history=new Array(SQ.length).fill(null);
}

function updatePills() {
  const op=document.getElementById('pill-order');
  const sp=document.getElementById('pill-subj');
  const oDone=OS.submitted.filter(x=>x!==null).length;
  const sDone=SS.submitted.filter(x=>x!==null).length;
  op.textContent=`📝 순서 ${oDone?OS.score+'점':'—'} / 30`;
  sp.textContent=`✏️ 주관식 ${sDone?SS.score+'점':'—'} / 30`;
  op.className='score-pill'+(mode==='order'?' active':'');
  sp.className='score-pill'+(mode==='subj'?' active':'');
}

function switchTab(t) {
  mode=t;
  document.getElementById('tab-order').classList.toggle('active',t==='order');
  document.getElementById('tab-subj').classList.toggle('active',t==='subj');
  updatePills(); render();
}

function render() {
  const el=document.getElementById('qmain');
  if(mode==='order'){
    el.innerHTML=OS.done?scoreHTML('order'):orderHTML(OS.idx);
  } else {
    el.innerHTML=SS.done?scoreHTML('subj'):subjHTML(SS.idx);
  }
  updatePills();
  if(mode==='subj'&&!SS.done&&SS.submitted[SS.idx]===null){
    const inp=document.getElementById('sinp');
    if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
  }
}

// ── ORDER ──
function orderHTML(qi) {
  const q=OQ[qi];
  const sub=OS.submitted[qi];
  const placed=OS.userIdx[qi];
  const sh=OS.shuffled[qi];
  const placedSet=new Set(placed);
  const total=q.w.length, cnt=placed.length;
  const pct=Math.round(qi/OQ.length*100);
  const correctSent=q.w.join(' ');
  const userSent=placed.map(si=>sh[si]).join(' ');
  const isCorrect=sub!==null&&userSent.toLowerCase()===correctSent.toLowerCase();

  let poolInner='';
  sh.forEach((w,si)=>{
    if(!placedSet.has(si)){
      poolInner+=sub!==null
        ?`<span class="chip disabled">${w}</span>`
        :`<span class="chip" onclick="oPlace(${qi},${si})">${w}</span>`;
    }
  });
  if(!poolInner) poolInner=`<span class="chip-empty">✓ 모든 단어를 배치했습니다</span>`;

  let ansInner='';
  if(placed.length===0){
    ansInner=`<span class="chip-empty">↑ 단어를 클릭해서 순서대로 배치하세요</span>`;
  } else {
    placed.forEach((si,ai)=>{
      const w=sh[si];
      let cls='chip';
      if(sub!==null) cls+= isCorrect?' disabled chip-ok':' disabled chip-ng';
      else cls+=' placed';
      const click=sub===null?`onclick="oRemove(${qi},${ai})"` : '';
      ansInner+=`<span class="${cls}" ${click}>${w}</span>`;
    });
  }

  let fbHTML='';
  if(sub!==null){
    fbHTML=isCorrect
      ?`<div class="feedback fb-ok show">✓ 정답! 완벽해요!</div>`
      :`<div class="feedback fb-ng show">✗ 오답 → 정답: <span class="ans-reveal">${correctSent}</span></div>`;
  }

  let btns='';
  if(sub===null){
    btns=`<button class="btn primary" onclick="oSubmit(${qi})" ${cnt<total?'disabled':''}>확인 ✓</button>
          <button class="btn ghost" onclick="oClear(${qi})">지우기</button>`;
  } else if(qi<OQ.length-1){
    btns=`<button class="btn primary" onclick="oGo(${qi+1})">다음 →</button>`;
  } else {
    btns=`<button class="btn primary" onclick="oFinish()">결과 보기 →</button>`;
  }
  const warnShow=cnt>0&&cnt<total&&sub===null?' show':'';

  return `
<div class="progress-wrap">
  <div class="progress-row">
    <span class="progress-label">순서 맞추기</span>
    <span class="progress-num">${qi+1} / ${OQ.length} &nbsp;·&nbsp; 정답 ${OS.score}개</span>
  </div>
  <div class="pb"><div class="pb-inner" style="width:${pct}%"></div></div>
</div>
<div class="card">
  <div class="q-scene">${q.s} · Q${qi+1}</div>
  <span class="type-badge badge-order">📝 순서 맞추기</span>
  <div class="q-ko">${q.ko}</div>
  <div class="section-lbl">WORD BANK — 클릭하여 배치</div>
  <div class="word-pool">${poolInner}</div>
  <div class="word-counter">배치: <span class="cnt">${cnt}</span> / <span class="tot">${total}</span>개 &nbsp;·&nbsp; 배치된 단어를 클릭하면 취소됩니다</div>
  <div class="section-lbl">내 답안</div>
  <div class="ans-area">${ansInner}</div>
  <div class="warn-msg${warnShow}">⚠ 단어를 모두 배치해야 확인할 수 있어요 (${cnt}/${total})</div>
  ${fbHTML}
</div>
<div class="nav-row">
  <button class="btn" onclick="oGo(${qi-1})" ${qi===0?'disabled':''}>← 이전</button>
  ${btns}
  <span class="q-counter">${qi+1} / ${OQ.length}</span>
</div>`;
}

function oPlace(qi,si){OS.userIdx[qi].push(si);render();}
function oRemove(qi,ai){OS.userIdx[qi].splice(ai,1);render();}
function oClear(qi){OS.userIdx[qi]=[];render();}
function oSubmit(qi){
  const sh=OS.shuffled[qi],placed=OS.userIdx[qi];
  if(placed.length<OQ[qi].w.length)return;
  const userSent=placed.map(si=>sh[si]).join(' ');
  OS.submitted[qi]=userSent;
  const correct=userSent.toLowerCase()===OQ[qi].w.join(' ').toLowerCase();
  if(correct)OS.score++;
  OS.history[qi]={user:userSent,correct};
  render();
}
function oGo(qi){OS.idx=qi;render();}
function oFinish(){OS.done=true;render();}

// ── SUBJ ──
function subjHTML(qi) {
  const q=SQ[qi],sub=SS.submitted[qi],val=SS.userAns[qi]||'';
  const pct=Math.round(qi/SQ.length*100);
  const correct=sub!==null&&val.trim().toLowerCase()===q.a.toLowerCase();

  let inpCls='',fbHTML='';
  if(sub!==null){
    inpCls=correct?'inp-ok':'inp-ng';
    fbHTML=correct
      ?`<div class="feedback fb-ok show">✓ 정답! 🎉</div>`
      :`<div class="feedback fb-ng show">✗ 오답 → 정답: <span class="ans-reveal">${q.a}</span></div>`;
  }

  let btns='';
  if(sub===null){
    btns=`<button class="btn primary" onclick="sSubmit(${qi})">확인 ✓</button>`;
  } else if(qi<SQ.length-1){
    btns=`<button class="btn primary" onclick="sGo(${qi+1})">다음 →</button>`;
  } else {
    btns=`<button class="btn primary" onclick="sFinish()">결과 보기 →</button>`;
  }

  const safeVal=val.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  return `
<div class="progress-wrap">
  <div class="progress-row">
    <span class="progress-label">주관식</span>
    <span class="progress-num">${qi+1} / ${SQ.length} &nbsp;·&nbsp; 정답 ${SS.score}개</span>
  </div>
  <div class="pb"><div class="pb-inner" style="width:${pct}%"></div></div>
</div>
<div class="card">
  <div class="q-scene">${q.s} · Q${qi+1}</div>
  <span class="type-badge badge-subj">✏️ 주관식 빈칸</span>
  <div class="q-ko">${q.ko}</div>
  <div class="blank-line">${q.q.replace('___','<span class="blank-slot">___</span>')}</div>
  <input class="ans-input ${inpCls}" id="sinp" type="text" value="${safeVal}"
    placeholder="빈칸에 알맞은 단어를 입력하세요" ${sub!==null?'disabled':''}
    oninput="sUpdate(${qi},this.value)"
    onkeydown="if(event.key==='Enter')sSubmit(${qi})"
    autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" />
  <button class="hint-toggle" onclick="toggleHint(this)">💡 힌트 보기</button>
  <div class="hint-box">${q.h}</div>
  ${fbHTML}
</div>
<div class="nav-row">
  <button class="btn" onclick="sGo(${qi-1})" ${qi===0?'disabled':''}>← 이전</button>
  ${btns}
  <span class="q-counter">${qi+1} / ${SQ.length}</span>
</div>`;
}

function toggleHint(btn){
  const box=btn.nextElementSibling;
  box.classList.toggle('show');
  btn.textContent=box.classList.contains('show')?'💡 힌트 숨기기':'💡 힌트 보기';
}
function sUpdate(qi,v){SS.userAns[qi]=v;}
function sSubmit(qi){
  const v=(SS.userAns[qi]||'').trim();
  if(!v)return;
  SS.submitted[qi]=v;
  const correct=v.toLowerCase()===SQ[qi].a.toLowerCase();
  if(correct)SS.score++;
  SS.history[qi]={user:v,correct};
  render();
}
function sGo(qi){SS.idx=qi;render();}
function sFinish(){SS.done=true;render();}

// ── SCORE ──
function scoreHTML(type) {
  const isOrder=(type==='order');
  const st=isOrder?OS:SS, qs=isOrder?OQ:SQ;
  const score=st.score, total=qs.length, wrong=total-score;
  const pct=Math.round(score/total*100);
  const msg=pct===100?'🎉 만점! 완벽해요!':pct>=80?'👍 훌륭해요!':pct>=60?'🙂 잘했어요!':pct>=40?'📖 조금 더 연습해요!':'📚 본문을 다시 복습해 봐요!';

  let summaryHTML='';
  st.history.forEach((h,i)=>{
    if(!h)return;
    const ko=qs[i].ko;
    const correctAns=isOrder?OQ[i].w.join(' '):SQ[i].a;
    const cls=h.correct?'s-ok':'s-ng', icon=h.correct?'✅':'❌';
    summaryHTML+=`
    <div class="summary-item ${cls}">
      <span class="s-icon">${icon}</span>
      <div>
        <div class="s-ko">${ko}</div>
        ${!h.correct?`<div class="s-correct-lbl">정답: <span class="s-ans correct">${correctAns}</span></div>`:''}
      </div>
    </div>`;
  });

  return `
<div class="score-screen">
  <div class="score-ring" style="--pct:${pct}">
    <div class="score-inner">
      <div class="score-n">${score}</div>
      <div class="score-d">/ ${total}</div>
    </div>
  </div>
  <div class="score-msg">${msg}</div>
  <div class="score-sub">${isOrder?'순서 맞추기':'주관식'} · 정답률 ${pct}%</div>
  <div class="score-stats">
    <div class="stat-box stat-ok"><div class="stat-n">${score}</div><div class="stat-lbl">정답</div></div>
    <div class="stat-box stat-ng"><div class="stat-n">${wrong}</div><div class="stat-lbl">오답</div></div>
    <div class="stat-box stat-pct"><div class="stat-n">${pct}%</div><div class="stat-lbl">정답률</div></div>
  </div>
  <button class="btn primary" style="margin:0 auto;display:inline-flex" onclick="restart('${type}')">↺ 다시 풀기</button>
</div>
${summaryHTML?`<div class="summary-wrap"><h3>틀린 문제 복습</h3><div class="summary-list">${summaryHTML}</div></div>`:''}`;
}

function restart(type){
  if(type==='order'){resetOrder();switchTab('order');}
  else{resetSubj();switchTab('subj');}
}

// ── BOOT ──
initAll();
render();
</script>
</body>
</html>
