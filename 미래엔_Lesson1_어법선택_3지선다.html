<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>공통영어1 미래엔 Lesson 1 — 어법 선택</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#30363d;
  --t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --green:#3fb950;--gdim:#1a3a20;
  --red:#f85149;--rdim:#3a1a1a;
  --blue:#58a6ff;--bdim:#0d2a4a;
  --amber:#d29922;--adim:#2d2200;
  --border:#30363d;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg0);color:var(--t1);font-size:16px;}
#s-home{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity .3s;}
.h-pill{font-size:11px;letter-spacing:3px;color:var(--t3);border:1px solid var(--border);border-radius:20px;padding:4px 14px;margin-bottom:18px;text-transform:uppercase;}
.h-title{font-size:26px;font-weight:700;text-align:center;line-height:1.35;margin-bottom:4px;}
.h-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:32px;}
.h-card{width:100%;max-width:360px;background:var(--bg1);border:1px solid var(--border);border-radius:16px;padding:22px;}
.h-label{font-size:12px;color:var(--t2);display:block;margin-bottom:6px;}
.h-input{width:100%;padding:12px 14px;font-size:16px;font-family:inherit;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--t1);outline:none;transition:border-color .2s;}
.h-input:focus{border-color:var(--blue);}
.h-chips{display:flex;gap:8px;margin:14px 0 20px;}
.chip{flex:1;background:var(--bg2);border-radius:8px;padding:10px 6px;text-align:center;}
.chip .n{font-size:18px;font-weight:700;color:var(--t1);}
.chip .l{font-size:11px;color:var(--t2);margin-top:2px;}
.h-btn{width:100%;padding:15px;border-radius:12px;background:var(--green);color:#0d1117;font-size:16px;font-weight:700;font-family:inherit;border:none;cursor:pointer;}
.h-btn:active{opacity:.8;}
#s-quiz{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s;}
#s-quiz.on{opacity:1;pointer-events:all;}
.topbar{padding:10px 16px 0;flex-shrink:0;}
.tb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.tb-l{font-size:12px;color:var(--t2);}
.tb-r{font-size:12px;color:var(--t3);}
.prog-bg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.prog-fg{height:100%;background:var(--green);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.q-body{flex:1;display:flex;flex-direction:column;padding:0 14px 10px;overflow:hidden;}
.card-stage{flex:1;position:relative;margin-top:10px;overflow:hidden;}
.q-card{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg1);border:1px solid var(--border);border-radius:18px;padding:18px 16px;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;}
.q-card.in-r{transform:translateX(100%);opacity:0;}
.q-card.in-l{transform:translateX(-100%);opacity:0;}
.q-card.mid{transform:none;opacity:1;}
.q-card.out-l{transform:translateX(-110%);opacity:0;}
.q-card.out-r{transform:translateX(110%);opacity:0;}
.q-meta{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-shrink:0;}
.q-num{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;}
.q-tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;background:var(--bdim);color:var(--blue);}
.q-type-c{font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;background:var(--gdim);color:var(--green);}
.q-type-w{font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;background:var(--adim);color:var(--amber);}
.q-sent{font-size:14px;line-height:1.95;color:var(--t1);flex:1;overflow-y:auto;}
.blank{font-weight:700;border-bottom:2px solid var(--blue);color:var(--t1);}
.opts{display:flex;flex-direction:column;gap:7px;margin-top:10px;flex-shrink:0;}
.opt{width:100%;padding:12px 14px;border-radius:12px;background:var(--bg2);border:1.5px solid var(--border);font-size:14px;font-weight:500;font-family:inherit;color:var(--t1);text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s,border-color .1s;}
.opt:active:not(:disabled){transform:scale(.98);}
.opt.ok{background:var(--gdim);border-color:var(--green);color:var(--green);}
.opt.ok-w{background:var(--adim);border-color:var(--amber);color:var(--amber);}
.opt.ng{background:var(--rdim);border-color:var(--red);color:var(--red);}
.opt:disabled{cursor:default;}
.opt-dot{width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);flex-shrink:0;}
.opt.ok .opt-dot{background:var(--green);color:#0d1117;}
.opt.ok-w .opt-dot{background:var(--amber);color:#0d1117;}
.opt.ng .opt-dot{background:var(--red);color:#fff;}
.exp-box{margin-top:8px;padding:10px 12px;border-radius:10px;background:var(--bg0);font-size:12px;line-height:1.7;color:var(--t2);display:none;flex-shrink:0;overflow-y:auto;max-height:100px;}
.exp-box.on{display:block;}
.exp-box.c-exp{border-left:3px solid var(--green);}
.exp-box.w-exp{border-left:3px solid var(--amber);}
.exp-box b{color:var(--t1);}
.nhint{font-size:11px;color:var(--t3);text-align:center;margin-top:5px;flex-shrink:0;}
#s-result{position:fixed;inset:0;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .3s;}
#s-result.on{opacity:1;pointer-events:all;}
.r-wrap{max-width:400px;margin:0 auto;padding:24px 16px 60px;}
.score-hero{background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:14px;}
.sh-sub{font-size:11px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:4px;}
.sh-name{font-size:15px;color:var(--t2);min-height:22px;margin-bottom:14px;}
.circ{width:120px;height:120px;margin:0 auto 12px;position:relative;}
.circ svg{width:120px;height:120px;}
.c-bg{fill:none;stroke:var(--bg3);stroke-width:10;}
.c-arc{fill:none;stroke-width:10;stroke-linecap:round;transform:rotate(-90deg);transform-origin:60px 60px;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);}
.c-n{font-size:24px;font-weight:700;fill:var(--t1);text-anchor:middle;dominant-baseline:middle;}
.c-of{font-size:11px;fill:var(--t3);text-anchor:middle;dominant-baseline:middle;}
.sh-grade{font-size:34px;font-weight:700;margin-bottom:4px;}
.sh-msg{font-size:13px;color:var(--t2);}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.sbox{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:13px 6px;text-align:center;}
.sbox .n{font-size:21px;font-weight:700;}
.sbox .l{font-size:11px;color:var(--t2);margin-top:2px;}
.sec-h{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:8px;padding-left:2px;}
.wrongs-list{background:var(--bg1);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.witem{padding:13px 14px;border-bottom:1px solid var(--border);}
.witem:last-child{border-bottom:none;}
.wi-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.wi-num{font-size:11px;color:var(--t3);}
.wi-tag{font-size:10px;padding:1px 7px;border-radius:6px;background:var(--rdim);color:var(--red);}
.wi-type-w{font-size:10px;padding:1px 7px;border-radius:6px;background:var(--adim);color:var(--amber);}
.wi-sent{font-size:12px;line-height:1.75;color:var(--t2);margin-bottom:6px;}
.wi-ans{font-size:12px;color:var(--t2);margin-bottom:4px;}
.wi-ans .ok{color:var(--green);}
.wi-ans .ok-w{color:var(--amber);}
.wi-ans .ng{color:var(--red);}
.wi-exp{font-size:12px;line-height:1.65;color:var(--t3);padding:8px 10px;background:var(--bg0);border-radius:8px;border-left:2px solid var(--green);}
.wi-exp b{color:var(--t2);}
.kk-card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.kk-card h3{font-size:13px;font-weight:500;margin-bottom:12px;}
.kk-nr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.kk-nr label{font-size:12px;color:var(--t2);white-space:nowrap;}
.kk-nr input{flex:1;padding:8px 10px;font-size:14px;font-family:inherit;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--t1);outline:none;}
.kk-nr input:focus{border-color:var(--blue);}
.kk-pre{font-size:12px;line-height:1.8;color:var(--t2);background:var(--bg0);border-radius:10px;padding:12px;margin-bottom:10px;white-space:pre-wrap;word-break:break-all;border:1px solid var(--border);max-height:180px;overflow-y:auto;}
.kk-btn{width:100%;padding:13px;border-radius:11px;background:#FEE500;color:#181600;font-size:14px;font-weight:700;font-family:inherit;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px;}
.kk-btn:active{opacity:.8;}
.copy-btn{width:100%;padding:11px;border-radius:11px;background:var(--bg2);color:var(--t1);font-size:13px;font-weight:500;font-family:inherit;border:1px solid var(--border);cursor:pointer;}
.toast-el{font-size:12px;color:var(--green);text-align:center;margin-top:8px;height:16px;transition:opacity .3s;}
.r-btns{display:flex;gap:8px;margin-top:4px;}
.btn-home{flex:1;padding:13px;border-radius:11px;background:var(--bg2);color:var(--t2);font-size:14px;font-weight:600;font-family:inherit;border:1px solid var(--border);cursor:pointer;}
.btn-retry{flex:1;padding:13px;border-radius:11px;background:var(--green);color:#0d1117;font-size:14px;font-weight:700;font-family:inherit;border:none;cursor:pointer;}
</style>
</head>
<body>
<div id="s-home">
  <div class="h-pill">미래엔(김성연) · 공통영어1 · Lesson 1</div>
  <div class="h-title">어법 선택 — 3지선다</div>
  <div class="h-sub">The Power of Friendliness: Soft but Strong</div>
  <div class="h-card">
    <label class="h-label">이름을 입력하세요</label>
    <input id="name-in" class="h-input" type="text" placeholder="홍길동">
    <div class="h-chips">
      <div class="chip"><div class="n">54</div><div class="l">문제</div></div>
      <div class="chip"><div class="n">3택</div><div class="l">선택형</div></div>
      <div class="chip"><div class="n">다크</div><div class="l">테마</div></div>
    </div>
    <button class="h-btn" onclick="startQuiz()">시작하기</button>
  </div>
</div>
<div id="s-quiz">
  <div class="topbar">
    <div class="tb-row"><span class="tb-l" id="tb-l">1 / 54</span><span class="tb-r" id="tb-r">0개 응답</span></div>
    <div class="prog-bg"><div class="prog-fg" id="prog" style="width:0%"></div></div>
  </div>
  <div class="q-body">
    <div class="card-stage" id="stage"></div>
    <div class="opts" id="opts"></div>
    <div class="exp-box" id="exp"></div>
    <div class="nhint" id="nhint"></div>
  </div>
</div>
<div id="s-result">
  <div class="r-wrap">
    <div class="score-hero">
      <div class="sh-sub">미래엔 Lesson 1 어법 선택 (3지선다)</div>
      <div class="sh-name" id="r-name"></div>
      <div class="circ">
        <svg viewBox="0 0 120 120">
          <circle class="c-bg" cx="60" cy="60" r="50"/>
          <circle class="c-arc" id="r-arc" cx="60" cy="60" r="50" stroke="#3fb950" stroke-dasharray="314.2" stroke-dashoffset="314.2"/>
          <text class="c-n" id="r-sn" x="60" y="56">-</text>
          <text class="c-of" x="60" y="72">/ 54</text>
        </svg>
      </div>
      <div class="sh-grade" id="r-grade"></div>
      <div class="sh-msg" id="r-msg"></div>
    </div>
    <div class="stat3">
      <div class="sbox"><div class="n" id="s-ok" style="color:var(--green)">-</div><div class="l">정답</div></div>
      <div class="sbox"><div class="n" id="s-ng" style="color:var(--red)">-</div><div class="l">오답</div></div>
      <div class="sbox"><div class="n" id="s-pct">-</div><div class="l">정답률</div></div>
    </div>
    <div class="sec-h" id="wrong-head"></div>
    <div class="wrongs-list" id="wlist"></div>
    <div class="kk-card">
      <h3>선생님께 결과 전송</h3>
      <div class="kk-nr"><label>이름</label><input id="r-name-in" type="text" placeholder="이름 입력" oninput="buildMsg()"></div>
      <div class="kk-pre" id="kk-pre"></div>
      <button class="kk-btn" onclick="openKakao()">
        <svg width="18" height="18" viewBox="0 0 40 40"><path d="M20 4C10.06 4 2 10.27 2 18c0 5.1 3.3 9.57 8.3 12.2L8.5 36l6.8-3.57C16.7 32.8 18.33 33 20 33c9.94 0 18-6.27 18-14S29.94 4 20 4z" fill="#181600"/></svg>
        카카오톡으로 공유하기
      </button>
      <button class="copy-btn" onclick="copyMsg()">메시지 복사</button>
      <div class="toast-el" id="toast"></div>
    </div>
    <div class="r-btns">
      <button class="btn-home" onclick="goHome()">처음으로</button>
      <button class="btn-retry" onclick="startQuiz()">다시 풀기</button>
    </div>
  </div>
</div>
<script>
const QS=[
/* ①(ans:0) ×18 */
{n:1,tag:"to부정사(부사적-목적)",type:"c",
 sent:"On my way, I had trouble _____ this room.",
 opts:["locating","to locate","located"],ans:0,
 exp:"<b>locating</b> — <b>have trouble + 동명사</b>. 'had trouble locating'은 '찾는 데 어려움을 겪었다'. to locate(to부정사)와 located(과거분사)는 have trouble 뒤 불가.",
 wexp:"<b>정답: ① locating</b> — have trouble + 동명사. to locate(to부정사), located(과거분사) 불가."},
{n:2,tag:"부사(형용사 수식)",type:"c",
 sent:"a _____ student came up to me and walked me here.",
 opts:["friendly","friend","friendlier"],ans:0,
 exp:"<b>friendly</b> — <b>형용사가 명사(student)를 수식</b>. 'a friendly student'는 '친절한 학생'. friend(명사). friendlier(비교급)는 관사 a와 어색.",
 wexp:"<b>정답: ① friendly</b> — 형용사. 'a friendly student'. friend(명사), friendlier(비교급: a와 어색) 불가."},
{n:3,tag:"의문사절 주어",type:"c",
 sent:"this raises _____ questions: where does our friendliness come from?",
 opts:["some interesting","some interest","interest"],ans:0,
 exp:"<b>some interesting</b> — <b>한정사 + 형용사 + 명사</b>. 'some interesting questions'는 '몇 가지 흥미로운 질문들'. some interest(명사)는 형용사 수식 불가. interest(단독 명사)는 '질문들'의 의미 불가.",
 wexp:"<b>정답: ① some interesting</b> — 한정사 + 형용사 + 명사. some interest(명사), interest(단독) 불가."},
{n:4,tag:"의문사+to부정사(to answer)",type:"c",
 sent:"_____ these questions, I'd like to tell you about my childhood companion dog.",
 opts:["To answer","Answering","Answered"],ans:0,
 exp:"<b>To answer</b> — <b>to부정사 부사적 용법(목적)</b>. '이 질문들에 답하기 위해'. Answering(분사구문: 목적 의미 없음). Answered(수동분사).",
 wexp:"<b>정답: ① To answer</b> — to부정사(목적). Answering(분사구문: 목적 의미 없음), Answered(수동분사) 불가."},
{n:5,tag:"지각동사 notice+O",type:"w",
 sent:"I noticed that he _____ well to my gestures.",
 opts:["responded","responding","to respond"],ans:0,
 exp:"<b>① responded</b> — <b>that절 내 동사 자리</b>. 'noticed that + 완전한 절'에서 that절 안의 동사는 과거형 responded. responding(현재분사)과 to respond(to부정사)는 that절의 동사 자리 불가.",
 wexp:"<b>정답: ① responded</b> — that절 내 과거 동사. responding(현재분사), to respond(to부정사) 모두 that절 동사 자리 불가."},
{n:6,tag:"compare A to/with B",type:"c",
 sent:"an experiment to see how dogs would respond to human gestures _____ to wolves.",
 opts:["compared","comparing","compare"],ans:0,
 exp:"<b>compared</b> — <b>과거분사(비교 분사구문)</b>. 'compared to wolves'는 '늑대들과 비교하여'. comparing(능동분사)은 비교 분사구문에 수동 관계. compare(동사원형) 불가.",
 wexp:"<b>정답: ① compared</b> — 과거분사(비교 분사구문). comparing(능동), compare(동사원형) 불가."},
{n:7,tag:"관계대명사(사물, 주격)",type:"c",
 sent:"wolves, _____ share the same common ancestor.",
 opts:["who","which","what"],ans:0,
 exp:"<b>who</b> — <b>관계대명사 who(계속적 용법)</b>. 선행사 wolves는 동물이지만 의인화하여 who 사용 가능. which도 가능하나 이 문장에서는 who가 자연스러움. what은 선행사 포함형으로 앞에 선행사 있을 때 불가.",
 wexp:"<b>정답: ① who</b> — 관계대명사. wolves를 의인화하여 who 사용. what(선행사 포함형: 앞에 선행사 불가)."},
{n:8,tag:"conclude+that절",type:"c",
 sent:"Dr. Hare _____ that the dogs' ability to read human gestures allowed them to perform better.",
 opts:["concluded","concluding","conclude"],ans:0,
 exp:"<b>concluded</b> — <b>과거 동사</b>. 주절의 과거 동사 자리. 'concluded that'은 '~라고 결론지었다'. concluding(현재분사). conclude(동사원형).",
 wexp:"<b>정답: ① concluded</b> — 과거 동사. concluding(분사), conclude(원형) 주절 동사 불가."},
{n:9,tag:"unlike(전치사)",type:"c",
 sent:"dogs, _____ wolves, have developed communicative skills with humans.",
 opts:["unlike","dislike","unlike to"],ans:0,
 exp:"<b>unlike</b> — <b>전치사 unlike(~와 달리)</b>. 'dogs, unlike wolves'는 '늑대와 달리 개는'. dislike는 동사('싫어하다'). unlike to는 잘못된 형태.",
 wexp:"<b>정답: ① unlike</b> — 전치사 unlike(~와 달리). dislike(동사: 싫어하다), unlike to(잘못된 형태) 불가."},
{n:10,tag:"수동태",type:"c",
 sent:"those that acted friendly toward humans _____ into dogs.",
 opts:["evolved","were evolved","evolving"],ans:0,

{n:45,tag:"현재분사 형용사",type:"c",

{n:46,tag:"관계대명사 계속적 용법",type:"c",

{n:47,tag:"수동태 was known",type:"c",

 opts:["is","being","to be"],ans:2,
 exp:"<b>to be</b> — <b>be known to be</b>. '~인 것으로 알려졌다'. is(단수 현재: were와 불일치). being(분사).",

{n:49,tag:"관계사 whose",type:"c",

 exp:"<b>who</b> — <b>관계대명사 who(사람, 계속적 용법)</b>. 선행사 evolutionary biologists(사람) + 계속적 용법 → who. that(계속적 용법 불가). what(선행사 포함형).",
 wexp:"<b>정답: ③ who</b> — 관계대명사 who(사람, 계속적). that(계속적 용법 불가), what(선행사 포함형) 불가."},
{n:50,tag:"by+동명사(방법)",type:"c",

 wexp:"<b>정답: ③ trying</b> — instead of + 동명사. try(동사원형), tried(과거형) 모두 전치사 뒤 불가."},
{n:51,tag:"비교급 구문",type:"c",

 wexp:"<b>정답: ③ larger than</b> — 형용사 비교급. large than(형태 오류), more large than(large는 -er 형) 불가."},
{n:52,tag:"수의일치",type:"c",

 opts:["can contributed","contributing","can contribute"],ans:2,
 exp:"<b>can contribute</b> — <b>조동사 + 동사원형</b>. 'can contribute to a more beautiful world'는 '더 아름다운 세상에 기여할 수 있다'. can contributed(조동사 뒤 과거형 불가). contributing(분사: 동사 자리 불가).",
 wexp:"<b>정답: ③ can contribute</b> — 조동사 + 동사원형. can contributed(조동사 뒤 원형 필수), contributing(분사) 불가."},
{n:53,tag:"to부정사(부사적-결과)",type:"c",

 exp:"<b>flourish</b> — <b>조동사 + 동사원형</b>. 'can truly flourish'는 '진정으로 번창할 수 있다'. flourished(과거형: can 뒤 불가). flourishing(분사: can 뒤 불가).",
 wexp:"<b>정답: ③ flourish</b> — 조동사 + 동사원형. flourished(과거형), flourishing(분사) 모두 can 뒤 불가."},
{n:54,tag:"복합명사/관계절",type:"c",
 sent:"Think of our society as a bouquet. Just as each flower adds to the beauty when it harmonizes with the others, each person can contribute to a more beautiful world when they _____ .",
 opts:["cooperated","cooperating","cooperate"],ans:2,
 exp:"<b>cooperate</b> — <b>when절 내 현재 동사</b>. 'when they cooperate'는 '그들이 협력할 때'. cooperated(과거형: 현재 맥락 불일치). cooperating(분사: when절 동사 자리 불가).",
 wexp:"<b>정답: ③ cooperate</b> — when절 현재 동사. cooperated(과거형: 시제 불일치), cooperating(분사: 동사 자리 불가) 불가."}
];

const TOTAL=QS.length;
const DOTS=['①','②','③'];
let cur=0,userAns=new Array(TOTAL).fill(null),log=[];

function renderCard(dir){
  const q=QS[cur];
  const stage=document.getElementById('stage');
  const optsEl=document.getElementById('opts');
  const expEl=document.getElementById('exp');
  const nhint=document.getElementById('nhint');
  const old=stage.querySelector('.q-card');
  if(old){old.classList.remove('mid');old.classList.add(dir>0?'out-l':'out-r');setTimeout(()=>old.remove(),300);}
  const div=document.createElement('div');
  div.className='q-card '+(dir>0?'in-r':'in-l');
  const raw=q.sent.replace(/_____/,'<span class="blank">( _____ )</span>');
  div.innerHTML=`<div class="q-meta"><span class="q-num">Q${q.n}</span></div><div class="q-sent">${raw}</div>`;
  stage.appendChild(div);
  requestAnimationFrame(()=>requestAnimationFrame(()=>div.classList.replace(dir>0?'in-r':'in-l','mid')));
  optsEl.innerHTML='';
  const done=userAns[cur]!==null;
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    if(done){btn.disabled=true;if(i===q.ans)btn.classList.add(q.type==='w'?'ok-w':'ok');else if(i===userAns[cur])btn.classList.add('ng');}
    btn.innerHTML=`<span class="opt-dot">${DOTS[i]}</span>${opt}`;
    btn.onclick=()=>pick(i);
    optsEl.appendChild(btn);
  });
  if(done){expEl.innerHTML=(userAns[cur]===q.ans?'✓ ':'✗ ')+q.exp;expEl.className='exp-box on '+(q.type==='w'?'w-exp':'c-exp');nhint.textContent=cur<TOTAL-1?'화면을 탭하면 다음 문제로 이동':'탭하면 결과 보기';}
  else{expEl.className='exp-box';expEl.innerHTML='';nhint.textContent='';}
  updateTop();
}
function pick(choice){
  if(userAns[cur]!==null)return;
  userAns[cur]=choice;
  const q=QS[cur];
  const btns=document.getElementById('opts').querySelectorAll('.opt');
  btns.forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add(q.type==='w'?'ok-w':'ok');else if(i===choice)b.classList.add('ng');});
  const expEl=document.getElementById('exp');
  expEl.innerHTML=(choice===q.ans?'✓ ':'✗ ')+q.exp;
  expEl.className='exp-box on '+(q.type==='w'?'w-exp':'c-exp');
  document.getElementById('nhint').textContent=cur<TOTAL-1?'화면을 탭하면 다음 문제로 이동':'탭하면 결과 보기';
  updateTop();
  if(choice===q.ans)setTimeout(advance,500);
}
function advance(){if(cur<TOTAL-1){cur++;renderCard(1);}else showResult();}
document.getElementById('s-quiz').addEventListener('click',function(e){
  if(userAns[cur]!==null&&!e.target.classList.contains('opt')&&!e.target.classList.contains('opt-dot'))advance();
});
function updateTop(){
  const done=userAns.filter(a=>a!==null).length;
  document.getElementById('tb-l').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('tb-r').textContent=`${done}개 응답`;
  document.getElementById('prog').style.width=(done/TOTAL*100)+'%';
}
function startQuiz(){
  cur=0;userAns=new Array(TOTAL).fill(null);log=[];
  const home=document.getElementById('s-home');
  home.style.opacity='0';home.style.pointerEvents='none';
  setTimeout(()=>home.style.display='none',300);
  document.getElementById('s-result').classList.remove('on');
  document.getElementById('s-quiz').classList.add('on');
  document.getElementById('stage').innerHTML='';
  renderCard(1);
}
function goHome(){
  document.getElementById('s-result').classList.remove('on');
  document.getElementById('s-quiz').classList.remove('on');
  const home=document.getElementById('s-home');
  home.style.display='flex';
  requestAnimationFrame(()=>{home.style.opacity='1';home.style.pointerEvents='all';});
}
function showResult(){
  let correct=0;log=[];
  QS.forEach((q,i)=>{const ok=userAns[i]===q.ans;if(ok)correct++;log.push({q,ok,chosen:q.opts[userAns[i]??((q.ans+1)%3)],cw:q.opts[q.ans]});});
  const pct=Math.round(correct/TOTAL*100);
  let grade,gc;
  if(pct>=95){grade='A+';gc='var(--green)';}else if(pct>=85){grade='A';gc='#4ade80';}
  else if(pct>=75){grade='B+';gc='var(--blue)';}else if(pct>=65){grade='B';gc='#60a5fa';}
  else if(pct>=50){grade='C';gc='var(--amber)';}else{grade='D';gc='var(--red)';}
  const msgs=['다시 한 번 도전!','더 연습이 필요해요','절반 이상! 계속해요','잘 했어요!','거의 완벽해요!','완벽한 만점! 🎉'];
  const mi=pct<20?0:pct<45?1:pct<65?2:pct<80?3:pct<100?4:5;
  const nm=document.getElementById('name-in').value.trim();
  document.getElementById('r-name').textContent=nm;
  document.getElementById('r-sn').textContent=correct;
  document.getElementById('r-grade').textContent=grade;
  document.getElementById('r-grade').style.color=gc;
  document.getElementById('r-msg').textContent=msgs[mi];
  document.getElementById('s-ok').textContent=correct;
  document.getElementById('s-ng').textContent=TOTAL-correct;
  document.getElementById('s-pct').textContent=pct+'%';
  const circ=2*Math.PI*50;
  const arc=document.getElementById('r-arc');
  arc.style.stroke=gc;arc.style.strokeDasharray=circ;arc.style.strokeDashoffset=circ;
  setTimeout(()=>{arc.style.strokeDashoffset=circ*(1-pct/100);},100);
  const wrongItems=log.filter(r=>!r.ok);
  document.getElementById('wrong-head').textContent=wrongItems.length>0?`오답 목록 (${wrongItems.length}문제)`:'';
  const wlist=document.getElementById('wlist');
  if(wrongItems.length===0){wlist.innerHTML='<div style="padding:20px;text-align:center;color:var(--green);font-size:14px;">🎉 오답이 없어요! 완벽합니다.</div>';}
  else{wlist.innerHTML=wrongItems.map(r=>{
    const sd=r.q.sent.replace(/_____/,'<span style="color:var(--t1)">( _____ )</span>');
    const tw=r.q.type==='w'?'<span class="wi-type-w">틀린 것 찾기</span>':'';
    const okCls=r.q.type==='w'?'ok-w':'ok';
    return`<div class="witem"><div class="wi-top"><span class="wi-num">Q${r.q.n}</span><span class="wi-tag">${r.q.tag}</span>${tw}</div><div class="wi-sent">${sd}</div><div class="wi-ans">내 답: <span class="ng">${r.chosen}</span> → 정답: <span class="${okCls}">${r.cw}</span></div><div class="wi-exp">${r.q.wexp}</div></div>`;
  }).join('');}
  document.getElementById('r-name-in').value=nm;
  buildMsg();
  document.getElementById('s-quiz').classList.remove('on');
  document.getElementById('s-result').classList.add('on');
  document.getElementById('s-result').scrollTop=0;
}
function buildMsg(){
  const name=document.getElementById('r-name-in').value.trim()||'__________';
  const correct=log.filter(r=>r.ok).length;
  const pct=Math.round(correct/TOTAL*100);
  const wrongItems=log.filter(r=>!r.ok);
  let txt=`[공통영어1 미래엔 Lesson 1 어법 선택 (3지선다)]\n학생: ${name}\n단원: The Power of Friendliness\n\n정답: ${correct} / ${TOTAL} (${pct}%)\n오답: ${wrongItems.length}문제\n`;
  if(wrongItems.length>0){txt+=`\n[오답 목록]\n`;wrongItems.forEach(r=>{const tw=r.q.type==='w'?'[틀린 것] ':'';txt+=`· Q${r.q.n} ${tw}[${r.q.tag}] ${r.chosen} → ${r.cw}\n`;});}
  txt+=`\n#공통영어1 #미래엔 #김성연 #Lesson1`;
  document.getElementById('kk-pre').textContent=txt;
}
function copyMsg(){navigator.clipboard.writeText(document.getElementById('kk-pre').textContent).then(()=>showToast('✓ 복사 완료! 카카오톡에 붙여넣기 하세요.')).catch(()=>showToast('직접 선택 후 복사해 주세요.'));}
function openKakao(){copyMsg();window.open('kakaotalk://','_blank');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>{t.style.opacity='0';},3500);}
</script>
