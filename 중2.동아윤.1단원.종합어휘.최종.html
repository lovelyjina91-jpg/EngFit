<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lesson 1 The Future Is in Our Hands · 종합 단어 시험</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#0f172a;color:#f1f5f9;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;}
    .hidden{display:none!important;}

    /* ── HOME ── */
    #s-home{min-height:100vh;background:linear-gradient(145deg,#0f172a 0%,#0d1f3c 60%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:24px;}
    .home-inner{max-width:420px;width:100%;}
    .home-eyebrow{font-size:11px;letter-spacing:4px;color:#475569;text-transform:uppercase;text-align:center;margin-bottom:8px;}
    .home-title{font-size:22px;font-weight:800;color:#f8fafc;text-align:center;line-height:1.3;margin-bottom:4px;}
    .home-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px;}
    .home-label{font-size:12px;color:#64748b;margin-bottom:6px;}
    #inp-name{width:100%;padding:13px 16px;font-size:16px;border-radius:12px;border:1px solid #334155;background:#1e293b;color:#f1f5f9;outline:none;margin-bottom:16px;transition:border-color .2s;}
    #inp-name:focus{border-color:#38bdf8;}
    .mode-label{font-size:12px;color:#64748b;margin-bottom:8px;}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
    .mode-btn{padding:14px 10px;border-radius:12px;border:1.5px solid #334155;background:#1e293b;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;line-height:1.4;}
    .mode-btn .mode-icon{font-size:20px;display:block;margin-bottom:4px;}
    .mode-btn .mode-name{font-size:12px;font-weight:700;}
    .mode-btn .mode-desc{font-size:10px;color:#64748b;margin-top:2px;}
    .mode-btn.active{border-color:#38bdf8;background:rgba(56,189,248,0.12);color:#38bdf8;}
    .mode-btn.active .mode-desc{color:#7dd3fc;}
    .btn-start{width:100%;padding:17px;border-radius:14px;border:none;background:linear-gradient(135deg,#0284c7,#38bdf8);color:#fff;font-size:17px;font-weight:700;cursor:pointer;}
    .home-info{margin-top:16px;padding:12px 16px;border-radius:12px;background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.12);font-size:12px;color:#64748b;line-height:1.8;}

    /* ── QUIZ ── */
    #s-quiz{min-height:100vh;background:#0f172a;}
    .qz-header{position:sticky;top:0;z-index:20;background:#1e293b;border-bottom:1px solid #2d3f55;padding:10px 16px;}
    .qz-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .qz-qnum{font-size:13px;color:#64748b;}
    .qz-meta{font-size:13px;color:#475569;font-variant-numeric:tabular-nums;}
    .prog-track{height:4px;background:#2d3f55;border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,#0284c7,#38bdf8);border-radius:2px;transition:width .3s;}

    .qz-body{max-width:440px;margin:0 auto;padding:18px 16px 100px;}
    .q-card{background:#1e293b;border-radius:16px;padding:22px 18px 18px;margin-bottom:14px;border:1px solid #2d3f55;}
    .q-badges{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .q-tag{font-size:11px;color:#38bdf8;font-weight:700;letter-spacing:1px;}
    .q-type-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
    .pill-mc{color:#a78bfa;background:rgba(167,139,250,0.12);}
    .pill-fill{color:#34d399;background:rgba(52,211,153,0.12);}
    .pill-def{color:#fb923c;background:rgba(251,146,60,0.12);}
    .pill-spell{color:#f472b6;background:rgba(244,114,182,0.12);}
    .pill-sent{color:#fbbf24;background:rgba(251,191,36,0.12);}

    .q-word{font-size:26px;font-weight:800;color:#f8fafc;line-height:1.35;word-break:keep-all;}
    .q-def{font-size:14px;color:#94a3b8;margin-top:10px;line-height:1.65;font-style:italic;}
    .q-sent{font-size:15px;color:#e2e8f0;line-height:1.75;margin-top:8px;word-break:keep-all;}
    .q-sent b{color:#38bdf8;border-bottom:2px solid #38bdf8;}
    .q-note{font-size:12px;color:#475569;margin-top:8px;font-style:italic;}

    /* 객관식 */
    .opts-wrap{display:grid;gap:9px;}
    .opts-2{grid-template-columns:1fr 1fr;}
    .opts-1{grid-template-columns:1fr;}
    .opt-btn{padding:15px 12px;border-radius:12px;border:1.5px solid #334155;background:#1e293b;color:#cbd5e1;font-size:14px;font-weight:500;cursor:pointer;transition:all .12s;text-align:center;line-height:1.4;word-break:keep-all;}
    .opt-btn.sel{border-color:#38bdf8;background:rgba(56,189,248,0.12);color:#f8fafc;font-weight:700;}

    /* 주관식 */
    .fill-wrap .fill-label{font-size:12px;color:#475569;margin-bottom:6px;}
    #fill-input{width:100%;padding:15px 16px;font-size:18px;border-radius:12px;border:1.5px solid #334155;background:#1e293b;color:#f1f5f9;outline:none;transition:border-color .2s;text-align:center;letter-spacing:0.5px;}
    #fill-input:focus{border-color:#38bdf8;}

    /* footer */
    .qz-footer{position:fixed;bottom:0;left:0;right:0;background:#1a2438;border-top:1px solid #2d3f55;padding:12px 16px;display:flex;gap:8px;}
    .btn-prev{flex:0 0 auto;padding:13px 16px;border-radius:10px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:15px;font-weight:600;cursor:pointer;}
    .btn-prev:disabled{color:#334155;border-color:#253047;cursor:default;}
    .btn-next{flex:1;padding:13px;border-radius:10px;border:none;background:#38bdf8;color:#0f172a;font-size:15px;font-weight:700;cursor:pointer;}
    .btn-submit{flex:0 0 auto;padding:13px 14px;border-radius:10px;border:none;background:#16a34a;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal{background:#1e293b;border-radius:20px;padding:28px 24px;max-width:360px;width:100%;border:1px solid #334155;}
    .modal h3{font-size:18px;font-weight:700;color:#f8fafc;margin-bottom:8px;}
    .modal-warn{font-size:14px;color:#f97316;margin-bottom:10px;}
    .modal-desc{font-size:14px;color:#64748b;margin-bottom:20px;}
    .modal-btns{display:flex;gap:8px;}
    .btn-mc{flex:1;padding:12px;border-radius:10px;border:1px solid #475569;background:transparent;color:#e2e8f0;font-size:15px;font-weight:600;cursor:pointer;}
    .btn-mo{flex:1;padding:12px;border-radius:10px;border:none;background:#16a34a;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}

    /* ── RESULT ── */
    #s-result{min-height:100vh;background:#0f172a;padding:20px 16px;}
    .res-inner{max-width:440px;margin:0 auto;padding-top:16px;padding-bottom:32px;}
    .score-card{background:#1e293b;border-radius:20px;padding:30px 24px;text-align:center;margin-bottom:16px;border:1px solid #2d3f55;}
    .sc-label{font-size:12px;color:#475569;letter-spacing:2px;margin-bottom:4px;}
    .sc-name{font-size:18px;color:#e2e8f0;font-weight:700;margin-bottom:14px;}
    .sc-grade{font-size:64px;font-weight:800;line-height:1;}
    .sc-score{font-size:38px;font-weight:700;color:#f8fafc;margin-top:8px;}
    .sc-denom{font-size:20px;color:#475569;}
    .sc-pct{font-size:15px;color:#64748b;margin-top:4px;}
    .sc-bar{margin:18px auto 0;width:180px;height:10px;background:#2d3f55;border-radius:5px;overflow:hidden;}
    .sc-bar-fill{height:100%;border-radius:5px;}

    /* type breakdown */
    .type-summary{background:#1e293b;border-radius:16px;padding:18px 20px;margin-bottom:14px;border:1px solid #2d3f55;}
    .ts-title{font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:12px;}
    .ts-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(45,63,85,.5);}
    .ts-row:last-child{border-bottom:none;}
    .ts-type{font-size:13px;color:#cbd5e1;}
    .ts-score{font-size:13px;font-weight:700;}

    .btn-copy-toggle{width:100%;padding:15px;border-radius:14px;border:none;background:#d97706;color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:14px;}
    #copy-area{margin-bottom:14px;}
    .copy-tip{font-size:12px;color:#d97706;margin-bottom:7px;font-weight:600;}
    #copy-ta{width:100%;min-height:160px;padding:14px;font-size:13px;border-radius:12px;border:1px solid rgba(217,119,6,.35);background:#0a1628;color:#e2e8f0;font-family:monospace;line-height:1.65;resize:none;outline:none;}

    .wrong-card{background:#1e293b;border-radius:16px;padding:20px;border:1px solid #2d3f55;margin-bottom:16px;}
    .wc-title{font-size:15px;font-weight:700;color:#f87171;margin-bottom:12px;}
    .wi{padding:12px 14px;border-radius:10px;margin-bottom:6px;background:rgba(0,0,0,.25);}
    .wi-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
    .wi-type{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
    .wi-word{font-size:15px;color:#7dd3fc;font-weight:700;}
    .wi-sent-ctx{font-size:12px;color:#64748b;margin-bottom:6px;line-height:1.55;}
    .wi-ans-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .wi-yours{font-size:13px;color:#f87171;}
    .wi-arr{font-size:13px;color:#475569;}
    .wi-correct{font-size:13px;color:#4ade80;font-weight:700;}

    .res-btns{display:flex;gap:8px;}
    .btn-home{flex:1;padding:14px;border-radius:12px;border:1px solid #475569;background:transparent;color:#e2e8f0;font-size:15px;font-weight:600;cursor:pointer;}
    .btn-retry{flex:1;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#0284c7,#38bdf8);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>

<div id="s-home">
  <div class="home-inner">
    <div class="home-eyebrow">Lesson 1 · The Future Is in Our Hands</div>
    <div class="home-title">종합 단어 시험</div>
    <div class="home-sub">23단어 · 5가지 유형 랜덤 출제</div>
    <div class="home-label">이름</div>
    <input id="inp-name" type="text" placeholder="이름을 입력하세요" autocomplete="off">
    <button class="btn-start" onclick="startQuiz()">시험 시작</button>
    <div class="home-info">
      · 영→한 / 한→영 / 영영정의 / 스펠링 / 예문빈칸<br>
      · 5가지 유형 랜덤 혼합 출제<br>
      · 결과 텍스트 복사 → 카톡 전송
    </div>
  </div>
</div>

<div id="s-quiz" class="hidden">
  <div class="qz-header">
    <div class="qz-header-row">
      <span class="qz-qnum" id="qz-qnum">1 / ?</span>
      <span class="qz-meta" id="qz-meta">0:00 · 0개 응답</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="qz-body" id="qz-body"></div>
  <div class="qz-footer">
    <button class="btn-prev" id="btn-prev" onclick="goPrev()" disabled>이전</button>
    <button class="btn-next" id="btn-next" onclick="goNext()">다음</button>
    <button class="btn-submit" onclick="openConfirm()">제출 <span id="ans-count">0</span>/<span id="total-count">?</span></button>
  </div>
</div>

<div class="overlay hidden" id="modal">
  <div class="modal">
    <h3>시험을 제출할까요?</h3>
    <div class="modal-warn hidden" id="modal-warn"></div>
    <div class="modal-desc">제출하면 답을 수정할 수 없습니다.</div>
    <div class="modal-btns">
      <button class="btn-mc" onclick="closeConfirm()">돌아가기</button>
      <button class="btn-mo" onclick="finishQuiz()">제출하기</button>
    </div>
  </div>
</div>

<div id="s-result" class="hidden">
  <div class="res-inner">
    <div class="score-card">
      <div class="sc-label">LESSON 1 · 종합 단어 시험</div>
      <div class="sc-name hidden" id="sc-name"></div>
      <div class="sc-grade" id="sc-grade"></div>
      <div class="sc-score"><span id="sc-correct"></span><span class="sc-denom" id="sc-denom"></span></div>
      <div class="sc-pct" id="sc-pct"></div>
      <div class="sc-bar"><div class="sc-bar-fill" id="sc-bar-fill"></div></div>
    </div>
    <div class="type-summary" id="type-summary"></div>
    <button class="btn-copy-toggle" id="btn-copy" onclick="showCopy()">📋 카톡 전송용 텍스트 보기</button>
    <div id="copy-area" class="hidden">
      <div class="copy-tip">꾹 눌러서 전체선택 → 복사 → 카톡 붙여넣기</div>
      <textarea id="copy-ta" readonly onfocus="this.select()"></textarea>
    </div>
    <div class="wrong-card hidden" id="wrong-card">
      <div class="wc-title" id="wc-title"></div>
      <div id="wrong-list"></div>
    </div>
    <div class="res-btns">
      <button class="btn-home" onclick="goHome()">처음으로</button>
      <button class="btn-retry" onclick="startQuiz()">다시 풀기</button>
    </div>
  </div>
</div>

<script>
const WORDS = [
  {eng:"aquarium",kor:"수족관",def:"a glass container in which fish and other water creatures can be kept",sent:"I saw a big turtle in the aquarium."},
  {eng:"at the same time",kor:"동시에",def:"two or more things happening together",sent:"We all laughed at the same time."},
  {eng:"blog",kor:"블로그",def:"a website on which one person or group puts new information regularly",sent:"My mom started a travel blog last year."},
  {eng:"ceremony",kor:"의식",def:"an important event that includes a set of formal or traditional actions",sent:"The wedding ceremony was held in this building."},
  {eng:"chance",kor:"기회",def:"a good time for you to do something",sent:"I had a chance to visit Spain."},
  {eng:"cleanup",kor:"대청소",def:"the act of cleaning something",sent:"The children helped with the cleanup."},
  {eng:"dolphin",kor:"돌고래",def:"a sea animal that looks like a large fish with a pointed mouth",sent:"We took a boat trip to see the dolphins.",sentKey:"dolphins"},
  {eng:"emotional",kor:"감정적인",def:"showing strong feelings to other people",sent:"She always gets emotional during sad movies."},
  {eng:"endangered",kor:"멸종 위기에 처한",def:"in danger of disappearing because there are very few now alive",sent:"Many plants are endangered because of global warming."},
  {eng:"experience",kor:"경험",def:"knowledge or skill that you get from doing, seeing, or feeling things",sent:"Traveling to new countries is always a great experience."},
  {eng:"fishing net",kor:"고기잡이 그물",def:"something made of strings or wires used for catching fish or animals",sent:"The man threw his fishing net into the water."},
  {eng:"global",kor:"지구의",def:"relating to the whole world",sent:"Global weather is different in each place."},
  {eng:"issue",kor:"문제, 사안",def:"a subject or problem that people are thinking and talking about",sent:"There is an issue with the Internet at home."},
  {eng:"luckily",kor:"운좋게도",def:"because of good luck",sent:"Luckily, it didn't rain during our picnic."},
  {eng:"quite",kor:"꽤, 상당히",def:"to a large degree",sent:"The movie was quite exciting."},
  {eng:"run an errand",kor:"심부름하다",def:"to go somewhere to do a small task for someone",sent:"After school, I ran an errand to buy some vegetables.",sentKey:"ran an errand"},
  {eng:"search",kor:"찾다",def:"to try to find someone or something by looking very carefully",sent:"I am searching for the perfect gift for her.",sentKey:"searching"},
  {eng:"survive",kor:"살아남다, 생존하다",def:"to continue to live after a dangerous situation such as an accident or illness",sent:"Only one person survived the fire in the building.",sentKey:"survived"},
  {eng:"take part in",kor:"~에 참여하다",def:"to do something together with other people by joining them in an activity",sent:"He took part in the cooking class and learned new recipes.",sentKey:"took part in"},
  {eng:"various",kor:"다양한",def:"many different types of something",sent:"The store sells various shoes for all ages."},
  {eng:"wave",kor:"손을 흔들다",def:"to move a hand from side to side in the air, usually to say hello or goodbye",sent:"He smiled and waved hello.",sentKey:"waved"},
  {eng:"wild",kor:"야생, 대자연",def:"natural areas that are far away from towns",sent:"The wild is home to many animals."},
  {eng:"wonderful",kor:"아주 멋진",def:"very good",sent:"The sunrise made a wonderful time at the park."},
];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const MODE_LABELS = {mc_ek:'영→한',mc_ke:'한→영',def:'영영정의',spell:'스펠링',sent:'예문빈칸'};
const MODE_PILL   = {mc_ek:'pill-mc',mc_ke:'pill-mc',def:'pill-def',spell:'pill-spell',sent:'pill-sent'};

let activeModes = ['mc_ek','mc_ke','def','spell','sent'];
let questions=[], curQ=0, userAnswers={}, startTime=null, timerID=null, playerName='';
let advancing=false;

function toggleMode(btn){
  const m=btn.dataset.mode;
  if(activeModes.includes(m)){
    if(activeModes.length===1) return;
    activeModes=activeModes.filter(x=>x!==m);
    btn.classList.remove('active');
  }else{activeModes.push(m);btn.classList.add('active');}
}

function show(id){['s-home','s-quiz','s-result'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}

function makeMCOptions(answer, pool, field){
  const others=shuffle(pool.filter(w=>w[field]!==answer)).slice(0,3).map(w=>w[field]);
  return shuffle([answer,...others]);
}

function buildQuestions(){
  const qs=[];
  const pool=shuffle(WORDS);
  pool.forEach(w=>{
    const modes=shuffle([...activeModes]);
    modes.forEach(mode=>{
      if(mode==='mc_ek'){
        qs.push({mode,word:w,question:w.eng,answer:w.kor,options:makeMCOptions(w.kor,WORDS,'kor')});
      } else if(mode==='mc_ke'){
        qs.push({mode,word:w,question:w.kor,answer:w.eng,options:makeMCOptions(w.eng,WORDS,'eng')});
      } else if(mode==='def'){
        qs.push({mode,word:w,question:w.def,answer:w.eng,options:makeMCOptions(w.eng,WORDS,'eng')});
      } else if(mode==='spell'){
        qs.push({mode,word:w,question:w.kor,answer:w.eng.toLowerCase()});
      } else if(mode==='sent'){
        const key=(w.sentKey||w.eng).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        const blanked=w.sent.replace(new RegExp(key,'i'),'______');
        qs.push({mode,word:w,question:blanked,answer:w.eng,options:makeMCOptions(w.eng,WORDS,'eng')});
      }
    });
  });
  return shuffle(qs);
}

function startQuiz(){
  playerName=document.getElementById('inp-name').value.trim();
  questions=buildQuestions();
  curQ=0; userAnswers={}; advancing=false;
  clearInterval(timerID); startTime=Date.now();
  timerID=setInterval(updateMeta,1000);
  document.getElementById('total-count').textContent=questions.length;
  show('s-quiz'); renderQ();
}

function isAnswered(i){
  const q=questions[i];
  if(!q) return false;
  if(q.mode==='spell') return userAnswers[i]!==undefined && userAnswers[i].trim()!=='';
  return userAnswers[i]!==undefined;
}

function answeredCount(){return questions.filter((_,i)=>isAnswered(i)).length;}

function renderQ(){
  const q=questions[curQ], total=questions.length;
  document.getElementById('qz-qnum').textContent=`${curQ+1} / ${total}`;
  document.getElementById('btn-prev').disabled=curQ===0;
  document.getElementById('btn-next').style.display=(q.mode==='spell')?'block':'none';
  document.getElementById('btn-next').textContent=curQ<total-1?'다음':'마지막';
  document.getElementById('ans-count').textContent=answeredCount();

  const body=document.getElementById('qz-body');
  body.innerHTML='';

  // Q card
  const card=document.createElement('div'); card.className='q-card';
  const badges=document.createElement('div'); badges.className='q-badges';
  const tag=document.createElement('span'); tag.className='q-tag'; tag.textContent=`Q${curQ+1}`;
  const pill=document.createElement('span'); pill.className=`q-type-pill ${MODE_PILL[q.mode]}`; pill.textContent=MODE_LABELS[q.mode];
  badges.appendChild(tag); badges.appendChild(pill); card.appendChild(badges);

  if(q.mode==='def'){
    const def=document.createElement('div'); def.className='q-def'; def.textContent=q.question;
    card.appendChild(def);
    const note=document.createElement('div'); note.className='q-note'; note.textContent='위 정의에 해당하는 영단어를 고르세요.';
    card.appendChild(note);
  } else if(q.mode==='sent'){
    const sent=document.createElement('div'); sent.className='q-sent';
    sent.innerHTML=q.question.replace('______','<b>______</b>');
    card.appendChild(sent);
    const note=document.createElement('div'); note.className='q-note'; note.textContent='빈칸에 들어갈 알맞은 단어를 고르세요.';
    card.appendChild(note);
  } else {
    const word=document.createElement('div'); word.className='q-word'; word.textContent=q.question;
    card.appendChild(word);
  }
  body.appendChild(card);

  if(q.mode==='spell'){
    const wrap=document.createElement('div'); wrap.className='fill-wrap';
    const lbl=document.createElement('div'); lbl.className='fill-label'; lbl.textContent='영어 단어 입력';
    const inp=document.createElement('input'); inp.id='fill-input'; inp.type='text';
    inp.placeholder='영어로 입력하세요'; inp.autocomplete='off'; inp.autocorrect='off'; inp.spellcheck=false;
    inp.setAttribute('autocapitalize','none');
    inp.value=userAnswers[curQ]||'';
    inp.oninput=function(){userAnswers[curQ]=this.value; document.getElementById('ans-count').textContent=answeredCount(); updateProg();};
    inp.onkeydown=function(e){if(e.key==='Enter') goNext();};
    wrap.appendChild(lbl); wrap.appendChild(inp); body.appendChild(wrap);
    setTimeout(()=>inp.focus(),80);
  } else {
    const isMC = ['mc_ek','mc_ke','def','sent'].includes(q.mode);
    if(isMC){
      const wrap=document.createElement('div');
      const long=q.options.some(o=>o.length>14);
      wrap.className='opts-wrap '+(long?'opts-1':'opts-2');
      q.options.forEach((opt,idx)=>{
        const btn=document.createElement('button');
        btn.className=`opt-btn${userAnswers[curQ]===idx?' sel':''}`;
        btn.textContent=opt;
        btn.onclick=()=>selectMC(idx);
        wrap.appendChild(btn);
      });
      body.appendChild(wrap);
    }
  }

  updateProg();
  window.scrollTo(0,0);
}

function updateProg(){
  const ac=answeredCount(), total=questions.length;
  document.getElementById('prog-fill').style.width=`${ac/total*100}%`;
  document.getElementById('ans-count').textContent=ac;
}

function selectMC(idx){
  if(advancing) return;
  userAnswers[curQ]=idx; renderQ();
  if(curQ<questions.length-1){
    advancing=true;
    setTimeout(()=>{curQ++;advancing=false;renderQ();},250);
  }
}

function goNext(){if(advancing) return; if(curQ<questions.length-1){curQ++;renderQ();}}
function goPrev(){if(advancing) return; if(curQ>0){curQ--;renderQ();}}

function updateMeta(){
  const s=Math.floor((Date.now()-startTime)/1000);
  const mm=Math.floor(s/60),ss=String(s%60).padStart(2,'0');
  document.getElementById('qz-meta').textContent=`${mm}:${ss} · ${answeredCount()}개 응답`;
}

function openConfirm(){
  const un=questions.length-answeredCount();
  const we=document.getElementById('modal-warn');
  if(un>0){we.textContent=`아직 ${un}문제를 풀지 않았습니다.`;we.classList.remove('hidden');}
  else we.classList.add('hidden');
  document.getElementById('modal').classList.remove('hidden');
}
function closeConfirm(){document.getElementById('modal').classList.add('hidden');}

function checkAnswer(q,ua){
  if(ua===undefined||ua===null) return false;
  if(q.mode==='spell'){
    return ua.trim().toLowerCase()===q.answer.toLowerCase();
  } else {
    return typeof ua==='number' && q.options[ua]===q.answer;
  }
}
function getDisplayAnswer(q,ua){
  if(ua===undefined||ua===null) return '미응답';
  if(q.mode==='spell') return ua||'미입력';
  return typeof ua==='number' ? q.options[ua] : '미응답';
}

function finishQuiz(){
  clearInterval(timerID); closeConfirm();
  const timeSec=Math.floor((Date.now()-startTime)/1000);
  const timeStr=`${Math.floor(timeSec/60)}분 ${timeSec%60}초`;
  let correct=0; const wrongs=[];
  const typeStats={};

  questions.forEach((q,i)=>{
    const m=MODE_LABELS[q.mode];
    if(!typeStats[m]) typeStats[m]={total:0,correct:0};
    typeStats[m].total++;
    const ua=userAnswers[i];
    if(checkAnswer(q,ua)){correct++;typeStats[m].correct++;}
    else wrongs.push({q,ua});
  });

  const total=questions.length, pct=Math.round(correct/total*100);
  let grade,gc;
  if(pct>=95){grade='A+';gc='#22c55e';}else if(pct>=90){grade='A';gc='#4ade80';}
  else if(pct>=85){grade='B+';gc='#3b82f6';}else if(pct>=80){grade='B';gc='#60a5fa';}
  else if(pct>=70){grade='C';gc='#f97316';}else{grade='D';gc='#ef4444';}

  const ne=document.getElementById('sc-name');
  if(playerName){ne.textContent=playerName;ne.classList.remove('hidden');}else ne.classList.add('hidden');
  const ge=document.getElementById('sc-grade');ge.textContent=grade;ge.style.color=gc;
  document.getElementById('sc-correct').textContent=correct;
  document.getElementById('sc-denom').textContent=`/${total}`;
  document.getElementById('sc-pct').textContent=`${pct}% · ${timeStr}`;
  const bf=document.getElementById('sc-bar-fill');bf.style.width=`${pct}%`;bf.style.background=gc;

  // type summary
  const ts=document.getElementById('type-summary');
  ts.innerHTML='<div class="ts-title">📊 유형별 결과</div>';
  Object.entries(typeStats).forEach(([type,s])=>{
    const p=Math.round(s.correct/s.total*100);
    const c=p>=80?'#4ade80':p>=60?'#f97316':'#f87171';
    const row=document.createElement('div'); row.className='ts-row';
    row.innerHTML=`<span class="ts-type">${type}</span><span class="ts-score" style="color:${c}">${s.correct}/${s.total} (${p}%)</span>`;
    ts.appendChild(row);
  });

  // copy text
  const date=new Date().toLocaleDateString('ko-KR');
  let txt=`[Lesson 1 종합 단어 시험]\n`;
  txt+=`${playerName?playerName+' | ':''}${date}\n`;
  txt+=`${correct}/${total} (${pct}%) | ${timeStr}\n\n[유형별]\n`;
  Object.entries(typeStats).forEach(([t,s])=>{txt+=`· ${t}: ${s.correct}/${s.total}\n`;});
  if(wrongs.length>0){
    txt+=`\n[오답 ${wrongs.length}개]\n`;
    wrongs.forEach((w,i)=>{
      txt+=`${i+1}. [${MODE_LABELS[w.q.mode]}] ${w.q.word.eng} = ${w.q.word.kor}\n`;
    });
  }else txt+=`\n만점! 전부 정답! 🎉`;
  document.getElementById('copy-ta').value=txt;

  // wrong list
  const wc=document.getElementById('wrong-card');
  if(wrongs.length>0){
    wc.classList.remove('hidden');
    document.getElementById('wc-title').textContent=`오답 목록 (${wrongs.length}개)`;
    const wl=document.getElementById('wrong-list'); wl.innerHTML='';
    wrongs.forEach(w=>{
      const div=document.createElement('div'); div.className='wi';
      const pillCls=MODE_PILL[w.q.mode];
      const topHTML=`<span class="wi-type q-type-pill ${pillCls}">${MODE_LABELS[w.q.mode]}</span><span class="wi-word">${w.q.word.eng}</span>`;
      const ctxHTML=w.q.mode==='sent'?`<div class="wi-sent-ctx">${w.q.question}</div>`:'';
      const yoursTxt=getDisplayAnswer(w.q,w.ua);
      div.innerHTML=`<div class="wi-top">${topHTML}</div>${ctxHTML}
        <div class="wi-ans-row">
          <span class="wi-yours">✗ ${yoursTxt}</span><span class="wi-arr">→</span>
          <span class="wi-correct">✓ ${w.q.answer}</span>
        </div>`;
      wl.appendChild(div);
    });
  }else wc.classList.add('hidden');

  document.getElementById('copy-area').classList.add('hidden');
  document.getElementById('btn-copy').classList.remove('hidden');
  show('s-result'); window.scrollTo(0,0);
}

function showCopy(){
  document.getElementById('btn-copy').classList.add('hidden');
  document.getElementById('copy-area').classList.remove('hidden');
  setTimeout(()=>{const ta=document.getElementById('copy-ta');ta.focus();ta.select();},100);
}
function goHome(){show('s-home');}
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
</script>
</body>
