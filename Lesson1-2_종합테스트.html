<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lesson 1~2 종합 테스트 | 영핏 학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #1a2550;
    --navy-light: #2a3a6e;
    --gold: #d4a850;
    --primary: #3b5bdb;
    --primary-light: #e7ecff;
    --accent: #ff6b9d;
    --correct: #22c55e;
    --correct-bg: #dcfce7;
    --wrong: #ef4444;
    --wrong-bg: #fee2e2;
    --text: #1f2937;
    --text-light: #6b7280;
    --bg: #f8f9fc;
    --card: #ffffff;
    --border: #e5e7eb;
  }
  html, body {
    font-family: 'Noto Sans KR', 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  .app { max-width: 600px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; padding-bottom: 32px; }

  /* 헤더 */
  .header {
    background: var(--navy);
    color: white;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(26,37,80,0.15);
  }
  .logo {
    height: 44px;
    width: auto;
    flex-shrink: 0;
    /* 로고를 흰색으로 변환하여 다크 네이비 배경에 잘 보이도록 */
    filter: brightness(0) invert(1);
    object-fit: contain;
  }
  .header-text { flex: 1; min-width: 0; }
  .header-title {
    font-size: 16px; font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 11px; font-weight: 400;
    opacity: 0.75; margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* 진행 바 */
  .progress-wrap {
    background: var(--card);
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text-light);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .progress-info b { color: var(--primary); font-weight: 700; }
  .progress-bar {
    height: 6px;
    background: #eef0f5;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* 시작 화면 */
  .start-screen {
    padding: 40px 22px;
    text-align: center;
  }
  .start-icon {
    font-size: 64px;
    margin-bottom: 20px;
    display: inline-block;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .start-title {
    font-size: 24px; font-weight: 900;
    color: var(--navy);
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }
  .start-desc {
    color: var(--text-light);
    font-size: 14px;
    margin-bottom: 28px;
    line-height: 1.7;
  }
  .info-card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    text-align: left;
  }
  .info-row {
    display: flex; justify-content: space-between;
    padding: 10px 0;
    font-size: 14px;
    border-bottom: 1px dashed var(--border);
  }
  .info-row:last-child { border-bottom: 0; }
  .info-label { color: var(--text-light); }
  .info-value { font-weight: 700; color: var(--navy); }
  .start-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--primary), #5b73e6);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(59,91,219,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .start-btn:active {
    transform: scale(0.98);
    box-shadow: 0 3px 10px rgba(59,91,219,0.35);
  }

  /* 문제 영역 */
  .quiz-screen { padding: 16px 16px 40px; }
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-num {
    display: inline-flex;
    align-items: center;
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 10px;
    font-family: 'Nunito', sans-serif;
  }
  .q-passage {
    background: #f9fafb;
    border-left: 3px solid var(--primary);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13.5px;
    line-height: 1.75;
    margin-bottom: 14px;
    color: #374151;
  }
  .q-passage u { text-decoration: underline; text-underline-offset: 2px; }
  .q-passage .blank { display: inline-block; min-width: 60px; border-bottom: 2px solid #9ca3af; }
  .q-passage .marker {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    border-radius: 50%;
    width: 18px; height: 18px;
    text-align: center;
    line-height: 18px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    margin: 0 1px;
  }
  .q-passage .marker-num {
    display: inline-block;
    background: var(--primary);
    color: white;
    border-radius: 4px;
    padding: 0 4px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    margin: 0 1px;
    line-height: 16px;
  }
  .q-passage .blank-letter {
    display: inline-block;
    width: 22px; height: 22px;
    border: 1.5px solid var(--primary);
    border-radius: 4px;
    text-align: center;
    line-height: 19px;
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    font-family: 'Nunito', sans-serif;
    margin: 0 2px;
    vertical-align: -3px;
  }
  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    margin-bottom: 14px;
    color: #1f2937;
  }
  .q-text b { color: var(--accent); font-weight: 700; }
  .q-text u { text-decoration: underline; text-underline-offset: 2px; }

  /* 선택지 */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    background: white;
    border: 2px solid var(--border);
    border-radius: 11px;
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: all 0.15s;
    font-size: 14px;
    line-height: 1.55;
    color: #374151;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .option:active { transform: scale(0.99); }
  .option:hover { border-color: var(--primary); background: #fafbff; }
  .option-num {
    width: 24px; height: 24px;
    background: #eef0f5;
    border-radius: 50%;
    color: var(--text-light);
    font-weight: 700;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-family: 'Nunito', sans-serif;
  }
  .option-text { flex: 1; padding-top: 1px; }
  .option.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #166534;
  }
  .option.correct .option-num {
    background: var(--correct);
    color: white;
  }
  .option.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #991b1b;
  }
  .option.wrong .option-num {
    background: var(--wrong);
    color: white;
  }
  .option:disabled { cursor: default; }

  /* 피드백 */
  .feedback {
    margin-top: 14px;
    padding: 14px;
    border-radius: 11px;
    font-size: 13.5px;
    line-height: 1.7;
    animation: fadeUp 0.3s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .feedback.correct { background: var(--correct-bg); color: #166534; border: 1px solid #86efac; }
  .feedback.wrong { background: var(--wrong-bg); color: #991b1b; border: 1px solid #fca5a5; }
  .feedback-title { font-weight: 700; margin-bottom: 6px; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .feedback-body { color: #374151; font-weight: 400; }
  .feedback-body b { color: var(--navy); }
  .next-btn {
    width: 100%;
    margin-top: 12px;
    background: var(--navy);
    color: white;
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .next-btn:active { transform: scale(0.98); }

  /* 결과 화면 */
  .result-screen {
    padding: 30px 20px;
    text-align: center;
  }
  .result-emoji {
    font-size: 72px;
    margin-bottom: 16px;
    display: inline-block;
    animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }
  .result-title {
    font-size: 22px; font-weight: 900;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .result-grade {
    font-family: 'Nunito', sans-serif;
    font-size: 64px; font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
    margin: 16px 0 8px;
  }
  .result-score {
    font-size: 18px;
    color: var(--text-light);
    margin-bottom: 20px;
    font-weight: 500;
  }
  .result-score b {
    color: var(--primary);
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card);
    padding: 14px 8px;
    border-radius: 11px;
    border: 1px solid var(--border);
  }
  .stat-num {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .stat-num.correct-c { color: var(--correct); }
  .stat-num.wrong-c { color: var(--wrong); }
  .stat-num.total-c { color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--text-light); font-weight: 500; }

  .review-section {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: left;
    border: 1px solid var(--border);
  }
  .review-title {
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--navy);
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .review-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .review-item {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .review-item:active { transform: scale(0.92); }
  .review-item.correct { background: var(--correct-bg); color: var(--correct); }
  .review-item.wrong { background: var(--wrong-bg); color: var(--wrong); }

  .retry-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(59,91,219,0.3);
    transition: transform 0.15s;
  }
  .retry-btn:active { transform: scale(0.98); }

  /* 모달 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-overlay.show { display: flex; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 20px;
    max-width: 560px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes slideUp { from { transform: translateY(20px); } to { transform: translateY(0); } }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-weight: 700; color: var(--navy); font-size: 16px; }
  .modal-close {
    background: #f3f4f6;
    border: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    color: var(--text-light);
  }

  /* 결과 화면 너무 길지 않게 */
  @media (min-width: 640px) {
    .modal-overlay { align-items: center; }
  }

  /* 단답형 입력 */
  .text-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 11px;
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.15s;
    background: white;
  }
  .text-input:focus { outline: none; border-color: var(--primary); }
  .submit-btn {
    width: 100%;
    margin-top: 10px;
    background: var(--primary);
    color: white;
    border: 0;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .submit-btn:disabled { opacity: 0.5; }
</style>
</head>

// ================ 상태 관리 ================
let state = {
  current: 0,
  answered: false,
  answers: [], // {questionId, selected, correct}
};

// ================ 화면 전환 ================
function startQuiz() {
  state = { current: 0, answered: false, answers: [] };
  document.getElementById('screen-start').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('screen-result').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const q = QUIZ_DATA[state.current];
  const total = QUIZ_DATA.length;
  const progress = ((state.current) / total) * 100;
  
  document.getElementById('progress-curr').textContent = state.current + 1;
  document.getElementById('progress-fill').style.width = progress + '%';
  document.getElementById('progress-percent').textContent = Math.round(progress) + '%';

  const area = document.getElementById('question-area');
  let html = `<div class="question-card">`;
  html += `<div class="q-num">Q${q.id}</div>`;
  if (q.passage) {
    html += `<div class="q-passage">${q.passage}</div>`;
  }
  html += `<div class="q-text">${q.question}</div>`;
  html += `<div class="options" id="options">`;
  q.options.forEach((opt, idx) => {
    const num = ['①','②','③','④','⑤'][idx];
    html += `<button class="option" onclick="selectOption(${idx})" data-idx="${idx}">
      <span class="option-num">${num}</span>
      <span class="option-text">${opt}</span>
    </button>`;
  });
  html += `</div>`;
  html += `<div id="feedback-area"></div>`;
  html += `</div>`;
  
  area.innerHTML = html;
  state.answered = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectOption(idx) {
  if (state.answered) return;
  state.answered = true;
  
  const q = QUIZ_DATA[state.current];
  const isCorrect = idx === q.answer;
  
  state.answers.push({
    questionId: q.id,
    selected: idx,
    correct: isCorrect
  });

  // 옵션 표시
  document.querySelectorAll('.option').forEach((el, i) => {
    el.disabled = true;
    if (i === q.answer) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
  });

  // 피드백
  const fbArea = document.getElementById('feedback-area');
  const fbClass = isCorrect ? 'correct' : 'wrong';
  const fbIcon = isCorrect ? '✓' : '✗';
  const fbTitle = isCorrect ? '정답입니다!' : '오답입니다';
  
  fbArea.innerHTML = `
    <div class="feedback ${fbClass}">
      <div class="feedback-title">${fbIcon} ${fbTitle}</div>
      <div class="feedback-body">${q.explanation}</div>
    </div>
    <button class="next-btn" onclick="nextQuestion()">
      ${state.current === QUIZ_DATA.length - 1 ? '결과 보기 →' : '다음 문제 →'}
    </button>
  `;
  
  // 피드백 영역으로 부드럽게 스크롤
  setTimeout(() => {
    fbArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function nextQuestion() {
  if (state.current < QUIZ_DATA.length - 1) {
    state.current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  const screen = document.getElementById('screen-result');
  screen.style.display = 'block';

  const correctCount = state.answers.filter(a => a.correct).length;
  const wrongCount = state.answers.length - correctCount;
  const total = QUIZ_DATA.length;
  const percent = Math.round((correctCount / total) * 100);

  let grade, emoji, msg;
  if (percent >= 90) { grade = 'A+'; emoji = '🏆'; msg = '완벽해요! 최고의 실력입니다'; }
  else if (percent >= 80) { grade = 'A'; emoji = '🎉'; msg = '훌륭해요! 잘 이해하고 있어요'; }
  else if (percent >= 70) { grade = 'B'; emoji = '👍'; msg = '잘했어요! 조금만 더 복습해요'; }
  else if (percent >= 60) { grade = 'C'; emoji = '💪'; msg = '괜찮아요! 틀린 부분 다시 봐요'; }
  else if (percent >= 40) { grade = 'D'; emoji = '📚'; msg = '복습이 필요해요. 다시 도전!'; }
  else { grade = 'F'; emoji = '🔥'; msg = '꼼꼼히 복습한 후 다시 풀어봐요'; }

  let html = `
    <div class="result-emoji">${emoji}</div>
    <h2 class="result-title">${msg}</h2>
    <div class="result-grade">${grade}</div>
    <div class="result-score"><b>${correctCount}</b> / ${total} 정답 (${percent}%)</div>
    
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-num correct-c">${correctCount}</div>
        <div class="stat-label">정답</div>
      </div>
      <div class="stat">
        <div class="stat-num wrong-c">${wrongCount}</div>
        <div class="stat-label">오답</div>
      </div>
      <div class="stat">
        <div class="stat-num total-c">${total}</div>
        <div class="stat-label">전체</div>
      </div>
    </div>

    <div class="review-section">
      <div class="review-title">📋 문항별 결과 (탭하여 다시 보기)</div>
      <div class="review-grid">`;
  
  state.answers.forEach((a, i) => {
    const cls = a.correct ? 'correct' : 'wrong';
    html += `<div class="review-item ${cls}" onclick="reviewQuestion(${i})">${a.questionId}</div>`;
  });
  
  html += `</div></div>
    <button class="retry-btn" onclick="startQuiz()">🔄 다시 도전하기</button>
  `;
  
  screen.innerHTML = html;
}

function reviewQuestion(idx) {
  const ans = state.answers[idx];
  const q = QUIZ_DATA.find(qq => qq.id === ans.questionId);
  if (!q) return;
  
  const numChars = ['①','②','③','④','⑤'];
  let html = '';
  if (q.passage) html += `<div class="q-passage" style="margin-bottom:12px;">${q.passage}</div>`;
  html += `<div class="q-text" style="margin-bottom:12px;">${q.question}</div>`;
  html += `<div class="options" style="margin-bottom:12px;">`;
  q.options.forEach((opt, i) => {
    let cls = 'option';
    if (i === q.answer) cls += ' correct';
    else if (i === ans.selected && !ans.correct) cls += ' wrong';
    html += `<div class="${cls}"><span class="option-num">${numChars[i]}</span><span class="option-text">${opt}</span></div>`;
  });
  html += `</div>`;
  html += `<div class="feedback ${ans.correct ? 'correct' : 'wrong'}">
    <div class="feedback-title">${ans.correct ? '✓ 정답' : '✗ 오답'} · 해설</div>
    <div class="feedback-body">${q.explanation}</div>
  </div>`;
  
  document.getElementById('modal-title').textContent = `Q${q.id} 다시 보기`;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('review-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('review-modal').classList.remove('show');
}
</script>
