<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fce4ec">
<title>예은이의 영어 어법 노트 · 올림포스 영독기본1 Unit 03</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,500&family=Noto+Serif+KR:wght@300;400;500;600;700;900&family=Gowun+Batang:wght@400;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fdf6f0;
    --blush:#fce4ec;
    --petal:#fad1dc;
    --rose:#e89bb1;
    --rose-dark:#c9667c;
    --deep-rose:#9b3d5d;
    --plum:#3d2030;
    --plum-soft:#5a3548;
    --gold:#c8956d;
    --gold-light:#e0bd9b;
    --sage:#8eb098;
    --coral:#d97a7a;
    --paper:#fffaf6;
    --ink:#2a1622;
    --shadow-rose: 0 12px 40px -12px rgba(155, 61, 93, 0.25);
    --shadow-soft: 0 6px 20px -8px rgba(155, 61, 93, 0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{
    background: linear-gradient(135deg, #fdf4f0 0%, #fce4ec 35%, #fad1dc 100%);
    background-attachment: fixed;
    min-height:100vh;
    font-family:'Noto Serif KR','Gowun Batang',serif;
    color:var(--ink);
    overflow-x:hidden;
  }
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.55), transparent 28%),
      radial-gradient(circle at 88% 78%, rgba(232,155,177,.35), transparent 32%),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,.15), transparent 60%);
    pointer-events:none;z-index:0;
  }
  body::after{
    content:'';
    position:fixed;inset:0;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.4  0 0 0 0 0.5  0 0 0 .04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    pointer-events:none;z-index:1;opacity:.55;mix-blend-mode:multiply;
  }
  #app{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:24px 18px 48px;min-height:100vh}

  /* ───── 시작 화면 ───── */
  .start{
    text-align:center;
    padding:36px 24px 40px;
    margin-top:8vh;
    position:relative;
    background: rgba(255,250,246,.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius:28px;
    border:1px solid rgba(255,255,255,.6);
    box-shadow:var(--shadow-rose);
  }
  .ornament{
    width:60px;height:60px;margin:0 auto 18px;
    color:var(--rose-dark);
  }
  .start .gift-tag{
    display:inline-block;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:14px;
    letter-spacing:.18em;
    color:var(--rose-dark);
    text-transform:uppercase;
    padding:6px 16px;
    border:1px solid var(--rose);
    border-radius:999px;
    margin-bottom:18px;
    background:rgba(255,255,255,.4);
  }
  .start h1{
    font-family:'Playfair Display','Noto Serif KR',serif;
    font-weight:600;
    font-size:30px;
    letter-spacing:-.02em;
    line-height:1.25;
    color:var(--plum);
    margin-bottom:6px;
  }
  .start h1 .accent{
    font-style:italic;
    color:var(--rose-dark);
    font-weight:500;
  }
  .start .sub{
    font-family:'Cormorant Garamond',serif;
    font-size:17px;
    color:var(--plum-soft);
    font-style:italic;
    margin-bottom:22px;
    letter-spacing:.02em;
  }
  .meta-card{
    background:linear-gradient(135deg, rgba(252,228,236,.7), rgba(253,244,240,.7));
    border:1px solid rgba(232,155,177,.35);
    border-radius:18px;
    padding:18px 16px;
    margin:20px 0 26px;
    text-align:left;
  }
  .meta-card .row{
    display:flex;justify-content:space-between;align-items:center;
    padding:7px 0;
    font-size:13.5px;
    color:var(--plum-soft);
    font-family:'Noto Serif KR',serif;
  }
  .meta-card .row + .row{border-top:1px dashed rgba(155,61,93,.2)}
  .meta-card .row .label{color:var(--plum);font-weight:500;letter-spacing:.02em}
  .meta-card .row .value{color:var(--rose-dark);font-weight:500;font-family:'Cormorant Garamond',serif;font-size:15px}

  .name-input{
    width:100%;padding:14px 18px;
    border:1.5px solid rgba(232,155,177,.4);
    background:rgba(255,255,255,.7);
    border-radius:14px;
    font-family:'Noto Serif KR',serif;
    font-size:16px;color:var(--plum);
    text-align:center;
    margin-bottom:18px;
    outline:none;
    transition:.25s;
  }
  .name-input:focus{
    border-color:var(--rose-dark);
    background:rgba(255,255,255,.9);
    box-shadow:0 0 0 4px rgba(232,155,177,.15);
  }
  .name-input::placeholder{color:rgba(155,61,93,.4)}

  .btn{
    display:inline-block;width:100%;
    padding:16px 24px;
    border:none;cursor:pointer;
    border-radius:999px;
    font-family:'Playfair Display','Noto Serif KR',serif;
    font-weight:500;font-size:16px;letter-spacing:.04em;
    background:linear-gradient(135deg, var(--rose-dark), var(--deep-rose));
    color:#fff8f1;
    box-shadow:0 8px 22px -8px rgba(155,61,93,.55);
    transition:.25s;
    position:relative;overflow:hidden;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px -8px rgba(155,61,93,.65)}
  .btn:active{transform:translateY(0)}
  .btn .arrow{font-style:italic;font-family:'Cormorant Garamond',serif;margin-left:6px}

  .signature{
    margin-top:22px;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:13px;
    color:var(--rose-dark);
    letter-spacing:.06em;
    opacity:.85;
  }
  .signature::before, .signature::after{
    content:'·';margin:0 10px;color:var(--gold);
  }

  /* ───── 진행바 ───── */
  .progress-wrap{
    position:sticky;top:0;
    background:linear-gradient(180deg, rgba(253,244,240,.95) 0%, rgba(253,244,240,.75) 80%, transparent 100%);
    backdrop-filter:blur(8px);
    padding:14px 4px 18px;
    margin:-24px -18px 18px;
    z-index:10;
  }
  .progress-top{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:0 18px 8px;
  }
  .progress-num{
    font-family:'Playfair Display',serif;
    font-size:17px;color:var(--plum);font-weight:500;
  }
  .progress-num .current{color:var(--rose-dark);font-style:italic;font-size:22px;font-weight:600}
  .progress-num .of{color:var(--plum-soft);font-size:14px;margin:0 4px;font-style:italic}
  .progress-stats{
    font-family:'Cormorant Garamond',serif;
    font-size:14px;color:var(--plum-soft);
    letter-spacing:.04em;
  }
  .progress-stats .ok{color:var(--sage)}
  .progress-stats .ng{color:var(--coral)}
  .progress-bar{
    margin:0 18px;height:4px;
    background:rgba(232,155,177,.2);
    border-radius:99px;overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--rose), var(--rose-dark), var(--deep-rose));
    border-radius:99px;
    transition:width .4s cubic-bezier(.4,0,.2,1);
  }

  /* ───── 문제 카드 ───── */
  .question-card{
    background:rgba(255,250,246,.85);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.7);
    border-radius:24px;
    padding:24px 22px 22px;
    box-shadow:var(--shadow-soft);
    margin-bottom:14px;
    position:relative;
    overflow:hidden;
  }
  .question-card::before{
    content:'';position:absolute;
    top:-40px;right:-40px;width:120px;height:120px;
    background:radial-gradient(circle, rgba(232,155,177,.18), transparent 70%);
    pointer-events:none;
  }

  .q-tag{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'Cormorant Garamond',serif;
    font-size:12px;letter-spacing:.16em;
    color:var(--rose-dark);
    text-transform:uppercase;
    margin-bottom:14px;
    font-style:italic;
  }
  .q-tag .dot{width:5px;height:5px;border-radius:50%;background:var(--rose-dark)}
  .q-tag .passage-num{
    color:var(--gold);
    font-style:normal;
    font-family:'Playfair Display',serif;
    font-weight:500;
  }
  .q-instruction{
    font-family:'Noto Serif KR',serif;
    font-size:14.5px;
    color:var(--plum-soft);
    margin-bottom:14px;
    padding-bottom:14px;
    border-bottom:1px dashed rgba(155,61,93,.2);
    letter-spacing:.01em;
    line-height:1.6;
  }
  .q-instruction .em{color:var(--deep-rose);font-weight:500}

  .q-prompt{
    font-family:'Lora','Noto Serif KR',serif;
    font-size:16px;line-height:1.85;
    color:var(--ink);
    letter-spacing:.005em;
    margin-bottom:20px;
  }
  .q-prompt .blank{
    display:inline-block;
    min-width:60px;
    padding:1px 14px;
    margin:0 2px;
    background:linear-gradient(180deg, transparent 60%, rgba(232,155,177,.35) 60%);
    color:var(--rose-dark);
    font-style:italic;
    font-weight:500;
    letter-spacing:.04em;
  }
  .q-prompt .marker{
    display:inline-block;
    color:var(--rose-dark);
    font-weight:600;
    font-family:'Playfair Display',serif;
    font-style:italic;
    margin-right:2px;
  }
  .q-prompt .marked{
    text-decoration:underline;
    text-decoration-color:rgba(232,155,177,.6);
    text-decoration-thickness:2px;
    text-underline-offset:4px;
  }

  /* 선택지 */
  .options{display:flex;flex-direction:column;gap:10px}
  .option{
    background:rgba(255,255,255,.65);
    border:1.5px solid rgba(232,155,177,.3);
    border-radius:14px;
    padding:14px 16px 14px 18px;
    font-family:'Lora','Noto Serif KR',serif;
    font-size:15.5px;
    color:var(--plum);
    cursor:pointer;
    text-align:left;
    transition:.2s ease;
    display:flex;align-items:center;gap:10px;
    line-height:1.45;
    width:100%;
  }
  .option:hover:not(:disabled){
    background:rgba(255,255,255,.85);
    border-color:var(--rose);
    transform:translateX(2px);
  }
  .option .marker-circle{
    flex-shrink:0;
    width:24px;height:24px;
    border-radius:50%;
    background:linear-gradient(135deg,#fff, #fce4ec);
    border:1px solid rgba(232,155,177,.5);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:600;
    font-size:13px;
    color:var(--rose-dark);
  }
  .option.correct{
    background:linear-gradient(135deg, rgba(142,176,152,.18), rgba(142,176,152,.05));
    border-color:var(--sage);
    color:#3a5e44;
  }
  .option.correct .marker-circle{
    background:var(--sage);color:#fff;border-color:var(--sage);
  }
  .option.wrong{
    background:linear-gradient(135deg, rgba(217,122,122,.16), rgba(217,122,122,.04));
    border-color:var(--coral);
    color:#7a3535;
  }
  .option.wrong .marker-circle{
    background:var(--coral);color:#fff;border-color:var(--coral);
  }
  .option:disabled{cursor:not-allowed;opacity:.6}
  .option.correct:disabled, .option.wrong:disabled{opacity:1}

  /* 해설 */
  .explanation{
    margin-top:18px;
    padding:18px 16px;
    background:linear-gradient(135deg, rgba(252,228,236,.55), rgba(253,244,240,.5));
    border-left:3px solid var(--rose-dark);
    border-radius:8px 14px 14px 8px;
    animation:slideIn .35s ease;
  }
  @keyframes slideIn{
    from{opacity:0;transform:translateY(-8px)}
    to{opacity:1;transform:translateY(0)}
  }
  .explanation .ex-title{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:13px;letter-spacing:.16em;
    color:var(--rose-dark);
    text-transform:uppercase;
    margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .explanation .ex-title .grammar-tag{
    margin-left:auto;
    background:var(--rose-dark);
    color:#fff8f1;
    padding:3px 10px;
    border-radius:99px;
    font-size:11px;
    letter-spacing:.06em;
    font-style:normal;
    font-family:'Noto Serif KR',serif;
    font-weight:500;
  }
  .explanation .ex-body{
    font-family:'Noto Serif KR',serif;
    font-size:14px;
    color:var(--plum);
    line-height:1.78;
    letter-spacing:.005em;
  }
  .explanation .ex-body .hl{
    background:linear-gradient(180deg, transparent 65%, rgba(232,155,177,.4) 65%);
    color:var(--deep-rose);
    font-weight:500;
    padding:0 2px;
  }
  .explanation .ex-body .quote{
    display:block;
    font-family:'Lora',serif;
    font-style:italic;
    font-size:13.5px;
    color:var(--plum-soft);
    background:rgba(255,255,255,.5);
    padding:10px 14px;
    border-radius:8px;
    margin:8px 0;
    line-height:1.65;
  }
  .explanation .ex-body strong{color:var(--deep-rose);font-weight:600}

  .next-btn{
    margin-top:14px;width:100%;
    padding:13px;border:none;cursor:pointer;
    background:rgba(255,255,255,.7);
    color:var(--rose-dark);
    border:1px solid var(--rose);
    border-radius:99px;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:15px;letter-spacing:.04em;
    transition:.2s;
  }
  .next-btn:hover{background:var(--rose-dark);color:#fff8f1}

  /* ───── 결과 화면 ───── */
  .result{
    background:rgba(255,250,246,.85);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.7);
    border-radius:28px;
    padding:32px 24px 28px;
    text-align:center;
    box-shadow:var(--shadow-rose);
    margin-top:6vh;
  }
  .result .crown{
    font-family:'Playfair Display',serif;
    font-style:italic;
    color:var(--gold);
    font-size:13px;letter-spacing:.2em;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .result h2{
    font-family:'Playfair Display','Noto Serif KR',serif;
    font-size:26px;font-weight:600;
    color:var(--plum);
    line-height:1.3;
    margin-bottom:6px;
  }
  .result h2 .name{
    font-style:italic;
    color:var(--rose-dark);
  }
  .result .subtitle{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:15px;
    color:var(--plum-soft);
    margin-bottom:24px;
    letter-spacing:.04em;
  }
  .score-display{
    display:flex;align-items:baseline;justify-content:center;gap:6px;
    margin:18px 0 10px;
  }
  .score-display .num{
    font-family:'Playfair Display',serif;
    font-size:64px;font-weight:600;font-style:italic;
    background:linear-gradient(180deg, var(--rose-dark), var(--deep-rose));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    line-height:1;
  }
  .score-display .total{
    font-family:'Cormorant Garamond',serif;
    font-size:24px;color:var(--plum-soft);
    font-style:italic;
  }
  .score-display .pct{
    font-family:'Cormorant Garamond',serif;
    font-size:18px;color:var(--gold);
    font-style:italic;
    margin-left:4px;
  }
  .grade-badge{
    display:inline-block;
    padding:6px 18px;
    margin-bottom:24px;
    border:1px solid var(--rose);
    border-radius:99px;
    font-family:'Cormorant Garamond',serif;
    font-size:14px;color:var(--rose-dark);
    font-style:italic;letter-spacing:.1em;
    background:rgba(255,255,255,.5);
  }
  .result-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .result-btn{
    padding:14px 20px;border:none;cursor:pointer;
    border-radius:99px;
    font-family:'Playfair Display',serif;font-weight:500;
    font-size:15px;letter-spacing:.04em;
    transition:.25s;
  }
  .result-btn.kakao{
    background:#fee500;
    color:#3c1e1e;
    box-shadow:0 6px 18px -6px rgba(254,229,0,.5);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .result-btn.kakao:hover{transform:translateY(-2px)}
  .result-btn.review{
    background:rgba(255,255,255,.5);
    color:var(--rose-dark);
    border:1px solid var(--rose);
  }
  .result-btn.review:hover{background:var(--rose-dark);color:#fff8f1}
  .result-btn.retry{
    background:linear-gradient(135deg, var(--rose-dark), var(--deep-rose));
    color:#fff8f1;
  }
  .result-btn.retry:hover{transform:translateY(-2px)}

  /* 오답 리뷰 */
  .review-section{margin-top:24px}
  .review-section h3{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:18px;color:var(--plum);
    margin-bottom:14px;text-align:center;
  }
  .review-section h3::before, .review-section h3::after{
    content:'❦';color:var(--gold);font-size:14px;margin:0 10px;
  }
  .review-empty{
    text-align:center;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-size:15px;
    color:var(--sage);
    padding:18px;
  }
  .review-empty::before{content:'❀ ';color:var(--rose-dark)}
  .review-empty::after{content:' ❀';color:var(--rose-dark)}
  .review-item{
    background:rgba(255,250,246,.7);
    border:1px solid rgba(232,155,177,.3);
    border-radius:14px;
    padding:14px 14px;margin-bottom:10px;
    text-align:left;
  }
  .review-item .ri-num{
    font-family:'Playfair Display',serif;
    font-style:italic;font-size:13px;
    color:var(--rose-dark);margin-bottom:6px;
  }
  .review-item .ri-prompt{
    font-family:'Lora',serif;
    font-size:13.5px;color:var(--plum);
    line-height:1.6;margin-bottom:8px;
  }
  .review-item .ri-prompt .blank{
    background:linear-gradient(180deg,transparent 60%, rgba(232,155,177,.35) 60%);
    color:var(--rose-dark);font-style:italic;padding:0 6px;
  }
  .review-item .ri-answers{
    display:flex;flex-direction:column;gap:4px;
    font-family:'Noto Serif KR',serif;
    font-size:13px;
  }
  .review-item .your{color:var(--coral)}
  .review-item .your::before{content:'✗ ';font-family:'Cormorant Garamond',serif}
  .review-item .right{color:var(--sage)}
  .review-item .right::before{content:'✓ ';font-family:'Cormorant Garamond',serif}

  /* 토스트 */
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--plum);color:#fff8f1;
    padding:12px 20px;
    border-radius:99px;
    font-family:'Noto Serif KR',serif;
    font-size:13.5px;
    box-shadow:var(--shadow-rose);
    z-index:99;
    opacity:0;pointer-events:none;
    transition:.3s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

  .hidden{display:none !important}

  /* 작은 화면 보정 */
  @media (max-width:380px){
    .start h1{font-size:25px}
    .q-prompt{font-size:15px}
    .option{font-size:14.5px;padding:12px 14px}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ───────── 시작 화면 ───────── -->
  <section id="start-screen" class="start">
    <svg class="ornament" viewBox="0 0 60 60" fill="none">
      <path d="M30 8 C 24 14, 20 22, 30 32 C 40 22, 36 14, 30 8 Z" fill="currentColor" opacity=".25"/>
      <path d="M30 32 C 22 30, 14 32, 14 40 C 14 46, 22 48, 30 42" stroke="currentColor" stroke-width="1.2" fill="none" opacity=".55"/>
      <path d="M30 32 C 38 30, 46 32, 46 40 C 46 46, 38 48, 30 42" stroke="currentColor" stroke-width="1.2" fill="none" opacity=".55"/>
      <circle cx="30" cy="42" r="2.5" fill="currentColor"/>
      <path d="M30 44 L 30 52" stroke="currentColor" stroke-width="1" opacity=".4"/>
    </svg>
    <span class="gift-tag">A Gift for You · 예은</span>
    <h1>예은이의<br>영어 어법 <span class="accent">노트</span></h1>

/* ═══════════════════════════════════════════════════════════
   QUIZ ENGINE
   ═══════════════════════════════════════════════════════════ */
const els = {
  start: document.getElementById('start-screen'),
  quiz: document.getElementById('quiz-screen'),
  result: document.getElementById('result-screen'),
  startBtn: document.getElementById('start-btn'),
  nameInput: document.getElementById('name-input'),
  qContainer: document.getElementById('question-container'),
  curNum: document.getElementById('cur-num'),
  totalNum: document.getElementById('total-num'),
  okCount: document.getElementById('ok-count'),
  ngCount: document.getElementById('ng-count'),
  progFill: document.getElementById('progress-fill'),
  resName: document.getElementById('result-name'),
  resScore: document.getElementById('result-score'),
  resPct: document.getElementById('result-pct'),
  resGrade: document.getElementById('result-grade'),
  kakaoBtn: document.getElementById('kakao-btn'),
  toggleReview: document.getElementById('toggle-review'),
  retryBtn: document.getElementById('retry-btn'),
  reviewSection: document.getElementById('review-section'),
  reviewList: document.getElementById('review-list'),
  toast: document.getElementById('toast'),
};

let state = {
  studentName: '예은',
  questions: [],
  index: 0,
  correct: 0,
  wrong: 0,
  wrongList: [],
  answered: false,
};

/* Fisher-Yates shuffle */
function shuffleArray(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleQuestions(){
  // 문제 순서는 그대로 두고, 각 문제의 선택지 순서만 랜덤화
  state.questions = QUESTIONS.map(q => {
    const indices = [0,1,2,3];
    const shuffled = shuffleArray(indices);
    const newOptions = shuffled.map(i => q.options[i]);
    const newAnswerIndex = shuffled.indexOf(q.answer);
    return {
      ...q,
      options: newOptions,
      answer: newAnswerIndex,
      _origAnswer: q.options[q.answer],
    };
  });
}

function showToast(msg){
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  clearTimeout(els.toast._t);
  els.toast._t = setTimeout(() => els.toast.classList.remove('show'), 2000);
}

/* Start */
els.startBtn.addEventListener('click', () => {
  const name = els.nameInput.value.trim() || '예은';
  state.studentName = name;
  state.index = 0;
  state.correct = 0;
  state.wrong = 0;
  state.wrongList = [];
  shuffleQuestions();
  els.start.classList.add('hidden');
  els.quiz.classList.remove('hidden');
  els.totalNum.textContent = state.questions.length;
  renderQuestion();
});

/* Render question */
function renderQuestion(){
  state.answered = false;
  const q = state.questions[state.index];
  const num = state.index + 1;
  els.curNum.textContent = num;
  els.okCount.textContent = state.correct;
  els.ngCount.textContent = state.wrong;
  els.progFill.style.width = ((num - 1) / state.questions.length * 100) + '%';

  const typeLabel = q.type === 'find-incorrect' ? '틀린 것 찾기' : '어법 선택';

  const optionMarkers = ['A','B','C','D'];
  const optionsHtml = q.options.map((opt, i) => `
    <button class="option" data-idx="${i}">
      <span class="marker-circle">${optionMarkers[i]}</span>
      <span class="opt-text">${opt}</span>
    </button>
  `).join('');

  els.qContainer.innerHTML = `
    <div class="question-card">
      <div class="q-tag">
        <span class="dot"></span>
        <span>${typeLabel}</span>
        <span class="passage-num">· passage ${q.p}</span>
      </div>
      <div class="q-instruction">${q.instruction}</div>
      <div class="q-prompt">${q.prompt}</div>
      <div class="options" id="options-${state.index}">
        ${optionsHtml}
      </div>
      <div id="ex-slot"></div>
    </div>
  `;

  const optBtns = els.qContainer.querySelectorAll('.option');
  optBtns.forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx)));
  });

  // 부드러운 스크롤
  window.scrollTo({top:0, behavior:'smooth'});
}

function handleAnswer(picked){
  if(state.answered) return;
  state.answered = true;
  const q = state.questions[state.index];
  const correctIdx = q.answer;
  const isCorrect = picked === correctIdx;

  const optBtns = els.qContainer.querySelectorAll('.option');
  optBtns.forEach((btn, i) => {
    btn.disabled = true;
    if(i === correctIdx) btn.classList.add('correct');
    if(i === picked && !isCorrect) btn.classList.add('wrong');
  });

  if(isCorrect){
    state.correct++;
    els.okCount.textContent = state.correct;
    // 정답이면 0.5초 후 자동으로 다음 문제로
    setTimeout(() => goNext(), 500);
  } else {
    state.wrong++;
    els.ngCount.textContent = state.wrong;
    state.wrongList.push({
      index: state.index,
      q: q,
      yourAnswer: q.options[picked],
      correctAnswer: q.options[correctIdx],
    });
    // 오답이면 해설 표시 + Next 버튼
    showExplanation();
  }
}

function showExplanation(){
  const q = state.questions[state.index];
  const isLast = state.index === state.questions.length - 1;
  document.getElementById('ex-slot').innerHTML = `
    <div class="explanation">
      <div class="ex-title">
        <span>Explanation</span>
        <span class="grammar-tag">${q.tag}</span>
      </div>
      <div class="ex-body">${q.explanation}</div>
    </div>
    <button class="next-btn" id="next-btn">${isLast ? '결과 보기 ›' : '다음 문제 ›'}</button>
  `;
  document.getElementById('next-btn').addEventListener('click', goNext);
}

function goNext(){
  state.index++;
  if(state.index >= state.questions.length){
    showResult();
  } else {
    renderQuestion();
  }
}

/* ───── Result ───── */
function gradeFor(pct){
  if(pct >= 95) return '✦ Outstanding · 완벽해요!';
  if(pct >= 85) return '✦ Excellent · 정말 잘했어요';
  if(pct >= 75) return '✦ Good Work · 잘 풀었어요';
  if(pct >= 60) return '✦ Keep Going · 조금만 더!';
  return '✦ Practice More · 다시 한번';
}

function showResult(){
  els.quiz.classList.add('hidden');
  els.result.classList.remove('hidden');
  els.progFill.style.width = '100%';

  const total = state.questions.length;
  const pct = Math.round(state.correct / total * 100);
  els.resName.textContent = state.studentName;
  els.resScore.textContent = state.correct;
  els.resPct.textContent = pct + '%';
  els.resGrade.textContent = gradeFor(pct);

  // 오답 리스트
  if(state.wrongList.length === 0){
    els.reviewList.innerHTML = `<div class="review-empty">완벽해요! 모든 문제를 다 맞혔어요</div>`;
  } else {
    els.reviewList.innerHTML = state.wrongList.map(item => `
      <div class="review-item">
        <div class="ri-num">No. ${item.index + 1} · passage ${item.q.p} · ${item.q.tag}</div>
        <div class="ri-prompt">${item.q.prompt}</div>
        <div class="ri-answers">
          <span class="your">너의 선택: ${item.yourAnswer}</span>
          <span class="right">정답: ${item.correctAnswer}</span>
        </div>
      </div>
    `).join('');
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

/* 오답 토글 */
els.toggleReview.addEventListener('click', () => {
  const hidden = els.reviewSection.classList.toggle('hidden');
  els.toggleReview.textContent = hidden ? '오답 다시 보기' : '오답 닫기';
  if(!hidden){
    setTimeout(() => els.reviewSection.scrollIntoView({behavior:'smooth', block:'start'}), 100);
  }
});

/* 다시 풀기 */
els.retryBtn.addEventListener('click', () => {
  state.index = 0;
  state.correct = 0;
  state.wrong = 0;
  state.wrongList = [];
  shuffleQuestions();
  els.result.classList.add('hidden');
  els.reviewSection.classList.add('hidden');
  els.toggleReview.textContent = '오답 다시 보기';
  els.quiz.classList.remove('hidden');
  els.totalNum.textContent = state.questions.length;
  renderQuestion();
});

/* 카카오톡 공유 */
function buildShareMessage(){
  const total = state.questions.length;
  const pct = Math.round(state.correct / total * 100);
  let msg = `🎀 ${state.studentName}이의 영어 어법 결과 🎀\n`;
  msg += `📚 올림포스 영독기본 1 · Unit 03\n`;
  msg += `\n`;
  msg += `✿ 점수: ${state.correct} / ${total} (${pct}%)\n`;
  msg += `✓ 맞은 개수: ${state.correct}개\n`;
  msg += `✗ 틀린 개수: ${state.wrong}개\n`;
  if(state.wrongList.length > 0){
    msg += `\n— 틀린 문제 —\n`;
    state.wrongList.forEach((item, i) => {
      msg += `\n${i+1}. (${item.q.tag})\n`;
      msg += `   너의 답: ${item.yourAnswer}\n`;
      msg += `   정답: ${item.correctAnswer}\n`;
    });
  } else {
    msg += `\n🌹 모두 다 맞혔어요! 완벽! 🌹\n`;
  }
  msg += `\n— 진아쌤 ❤︎`;
  return msg;
}

els.kakaoBtn.addEventListener('click', async () => {
  const msg = buildShareMessage();
  // Web Share API 시도 (모바일에서 카카오톡 등 선택 가능)
  if(navigator.share){
    try{
      await navigator.share({
        title: `${state.studentName}이의 어법 퀴즈 결과`,
        text: msg,
      });
      return;
    }catch(e){
      // 사용자가 취소한 경우 등 → fallback
      if(e.name === 'AbortError') return;
    }
  }
  // Fallback: 클립보드 복사
  try{
    await navigator.clipboard.writeText(msg);
    showToast('결과가 복사됐어요! 카카오톡에 붙여넣기 해주세요 ✿');
  }catch(e){
    // 마지막 fallback: textarea + execCommand
    const ta = document.createElement('textarea');
    ta.value = msg;
    ta.style.position='fixed';ta.style.left='-9999px';
    document.body.appendChild(ta);
    ta.select();
    try{
      document.execCommand('copy');
      showToast('결과가 복사됐어요! 카카오톡에 붙여넣기 해주세요 ✿');
    }catch(err){
      showToast('복사에 실패했어요. 결과를 직접 확인해주세요.');
    }
    document.body.removeChild(ta);
  }
});
